# Dependabot — proposes dependency-bump PRs (security + version updates).
#
# Complements, does not replace, the component watch (ADR-050): the registry
# (security/components.yaml) + ledger (security/cve-ledger.yaml) remain the
# source of truth for tiering and CVE waivers; Dependabot is the automation
# that opens the actual bump PRs for application dependencies. Security updates
# are always on; version updates are grouped weekly to keep PR noise low.
version: 2

updates:
  # ── npm (single root workspace: backend, both panels, packages/*) ──
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types: [minor, patch]
    ignore:
      # TypeScript 7 (the new native compiler) is deferred 2026-07-24:
      # typescript-eslint 8.65 (latest) caps its TS peer below 7, so
      # adopting it forces a split install — TS 6 at root for the linter,
      # TS 7 nested per workspace for builds — meaning lint would parse
      # with a different compiler than the one compiling. Drop this
      # ignore once typescript-eslint supports TS 7.
      - dependency-name: typescript
        update-types: ["version-update:semver-major"]
    labels: ["dependencies", "security-watch"]

  # ── Go modules (first-party reconcilers + sftp-gateway) ──
  - package-ecosystem: gomod
    directory: /images/firewall-reconciler
    schedule: { interval: weekly }
    groups: { gomod: { update-types: [minor, patch] } }
    labels: ["dependencies", "security-watch"]
  - package-ecosystem: gomod
    directory: /images/host-config-reconciler
    schedule: { interval: weekly }
    groups: { gomod: { update-types: [minor, patch] } }
    labels: ["dependencies", "security-watch"]
  - package-ecosystem: gomod
    directory: /images/security-probe
    schedule: { interval: weekly }
    groups: { gomod: { update-types: [minor, patch] } }
    labels: ["dependencies", "security-watch"]
  - package-ecosystem: gomod
    directory: /images/sftp-gateway
    schedule: { interval: weekly }
    groups: { gomod: { update-types: [minor, patch] } }
    labels: ["dependencies", "security-watch"]
  # file-manager was missing from this list (added 2026-07-24) — its
  # go.mod deps (x/crypto for sftp/ssh) went unwatched by Dependabot.
  - package-ecosystem: gomod
    directory: /images/file-manager
    schedule: { interval: weekly }
    groups: { gomod: { update-types: [minor, patch] } }
    labels: ["dependencies", "security-watch"]

  # ── Rust (RocksDB checkpoint helper) ──
  - package-ecosystem: cargo
    directory: /images/rocksdb-secondary-checkpoint
    schedule: { interval: weekly }
    # librocksdb-sys is intentionally pinned (=0.17.3) to Stalwart's RocksDB
    # version — Dependabot may propose, but review against ADR-046 before merge.
    labels: ["dependencies", "security-watch"]

  # ── GitHub Actions (CI toolchain) ──
  - package-ecosystem: github-actions
    directory: "/"
    schedule: { interval: weekly }
    groups: { actions: { update-types: [minor, patch] } }
    labels: ["dependencies", "ci"]
