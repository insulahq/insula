name: File-Manager CI

on:
  push:
    branches: [development]
    paths: ['images/file-manager/**', '.github/workflows/ci-file-manager.yml']
  pull_request:
    branches: [development, main]
    paths: ['images/file-manager/**', '.github/workflows/ci-file-manager.yml']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}/file-manager

jobs:
  test:
    name: Unit tests (node --test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run server unit + security tests
        working-directory: images/file-manager
        run: node --test

  build:
    name: Build + Scan + Push
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=
            # Gate on `development`, NOT {{is_default_branch}}: ADR-053 made
            # `development` the branch that builds, but the repo's DEFAULT branch
            # is still `main` — so is_default_branch is FALSE here and NEITHER tag
            # was emitted. Unlike ci-sftp-gateway (which had an extract-tag step
            # that exit 1'd, so it failed loudly), this workflow just SUCCEEDED
            # while silently publishing nothing but the sha tag. Both overlays
            # pin `file-manager:latest`, so `latest` has been frozen at its
            # pre-cutover build since 2026-06-22 and no file-manager change has
            # reached a cluster since. Caught while cutting the RC that ships the
            # sftp-serve jail rewrite — which would have been inert on staging.
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/development' }}
            type=raw,value={{date 'YYYYMMDDHHmmss'}}-{{sha}},enable=${{ github.ref == 'refs/heads/development' }}

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: images/file-manager
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          # Use the first tag from metadata-action, not github.sha.
          # docker/metadata-action emits a short (7-char) sha by default,
          # whereas github.sha is the full 40-char commit — the long form
          # was never pushed, so Trivy always died with "manifest unknown".
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
        if: github.event_name != 'pull_request'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: github.event_name != 'pull_request'
        with:
          sarif_file: trivy-results.sarif
          category: file-manager
