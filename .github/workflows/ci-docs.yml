name: Docs CI

# No path filter on purpose: references to docs/ paths can rot from any
# file class (code comments, scripts, manifests, markdown). The guard is
# a sub-second grep sweep — cheap enough to run on every PR.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  manual-impact:
    name: Manual freshness (report-only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: ./scripts/ci-manual-impact-check.sh
        # Flip to enforcing (~2 weeks after introduction):
        # env:
        #   DOCS_MANUAL_IMPACT_ENFORCE: '1'

  docs-link-check:
    name: Docs link integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify every referenced docs/ path exists
        run: ./scripts/ci-docs-link-check.sh
