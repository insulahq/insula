name: Pin Lag Check

# Catch "orphaned image" state at PR time and via hourly cron instead
# of at "where's my deploy?" time. The Build Images workflow's auto-pin
# step has its own concurrency-group + reset-and-reapply recovery (see
# .github/workflows/build-deploy.yml :: update-development-version), but in
# the rare case where a pin still doesn't land — e.g. cross-workflow
# collision, a force-push, or a buggy future workflow that touches the
# pin files — the previous pin lingers and the just-built image becomes
# a permanent GHCR orphan. This guard surfaces that state.

on:
  pull_request:
    branches: [development, main]
    paths:
      # Avoid running on every PR — only when it could matter. The
      # guard is checking origin/main's pin state, not the PR diff, so
      # in theory it could fire on any PR. In practice we only care if
      # the PR touches anything that lands on main (code or k8s), so
      # we exclude pure-doc PRs. The path list intentionally mirrors
      # the build-deploy.yml positive triggers.
      - 'backend/**'
      - 'frontend/**'
      - 'packages/**'
      - 'k8s/**'
      - 'images/**'
      - '.github/workflows/**'
      - '.github/scripts/**'
  schedule:
    # Hourly sweep so a lag introduced outside the PR/push path
    # (force-push, manual edit) gets caught within an hour.
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-pin-lag:
    name: Verify development pin is current
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Always verify the `development` branch's pin. Per ADR-053 development
          # is the auto-pinned integration branch — build-deploy pins it on every
          # code push, so it is the ONLY branch where the development-overlay pin
          # is live. main carries an inert promote-snapshot of that pin (no cluster
          # tracks main), so checking it on main false-flagged after every
          # promote/release (the `chore(release)`/`chore(promote)` commits count as
          # "code commits" but never carry a development auto-pin).
          ref: development
          # 100 commits ≫ the auto-pin churn rate; the script looks at
          # most ~10 commits back before giving up.
          fetch-depth: 100

      - name: Run check
        run: ./.github/scripts/check-pin-lag.sh
