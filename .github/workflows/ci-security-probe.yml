name: Security-Probe CI

on:
  push:
    branches: [main]
    paths:
      - 'images/security-probe/**'
      - '.github/workflows/ci-security-probe.yml'
  pull_request:
    branches: [main]
    paths:
      - 'images/security-probe/**'
      - '.github/workflows/ci-security-probe.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}/security-probe

jobs:
  build:
    name: Build + Test + Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # cosign keyless image signing (sign step gated to main, non-PR)
    outputs:
      timestamp_tag: ${{ steps.tag.outputs.timestamp_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: images/security-probe/go.sum

      - name: go mod download
        working-directory: images/security-probe
        run: go mod download

      - name: go vet
        working-directory: images/security-probe
        run: go vet ./...

      - name: go test
        working-directory: images/security-probe
        run: go test -race -count=1 ./...

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value={{date 'YYYYMMDDHHmmss'}}-{{sha}},enable=${{ github.ref == 'refs/heads/main' }}

      - id: build
        uses: docker/build-push-action@v5
        with:
          context: images/security-probe
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Cosign keyless-sign the pushed image by digest (main only). Mirrors
      # ci-backup-rclone.yml — a transparency-log attestation for the internal
      # image. Gated to non-PR (fork PRs get a read-only token anyway).
      - uses: sigstore/cosign-installer@v3
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
      - name: Sign image (keyless, OCI 1.1 referrers)
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            --registry-referrers-mode=oci-1-1 \
            "${{ env.IMAGE }}@${DIGEST}"

      - id: tag
        name: Extract immutable timestamp tag (for the dev-overlay pin)
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          ALL_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          ts_tag=$(echo "$ALL_TAGS" | grep -oE ':[0-9]{14}-[0-9a-f]{7,}' | head -1 | sed 's/^://')
          [ -n "$ts_tag" ] || { echo "::error::no timestamp tag in $ALL_TAGS"; exit 1; }
          echo "timestamp_tag=$ts_tag" >> "$GITHUB_OUTPUT"
          echo "security-probe → $ts_tag"

  # Pin the dev overlay to the immutable tag just pushed (no `:latest` pull-race).
  pin:
    name: Pin dev image tag
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && needs.build.outputs.timestamp_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: pin-development-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: .github/scripts/pin-image-tag.sh security-probe "${{ needs.build.outputs.timestamp_tag }}"
