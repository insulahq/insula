name: rocksdb-secondary-checkpoint CI

# Tiny Rust binary that opens a live Stalwart RocksDB primary as a SECONDARY
# instance (no LOCK conflict) and creates a hard-linked Checkpoint. Used as
# the initContainer in mail-archive Jobs to enable zero-downtime app-level
# archives via `stalwart -e` against the checkpoint dir.
#
# Mirrors ci-tenant-backup-tools.yml exactly — same registry, same tagging
# scheme, same Trivy gate.

on:
  push:
    branches: [development]
    paths:
      - 'images/rocksdb-secondary-checkpoint/**'
      - '.github/workflows/ci-rocksdb-secondary-checkpoint.yml'
  pull_request:
    branches: [development, main]
    paths:
      - 'images/rocksdb-secondary-checkpoint/**'
      - '.github/workflows/ci-rocksdb-secondary-checkpoint.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}/rocksdb-secondary-checkpoint

jobs:
  build:
    name: Build + Scan + Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=
            # Gate on `development`, NOT {{is_default_branch}}: ADR-053 made
            # `development` the branch that builds, but the repo's DEFAULT branch
            # is still `main`, so is_default_branch is FALSE here and NEITHER tag
            # was emitted — every consumer pulls :latest, which therefore froze at
            # its pre-cutover build on 2026-06-22. Fixed across all image
            # workflows; see ci-sftp-gateway (bc278063) and ci-file-manager
            # (5c30f200) for the two that were caught first.
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/development' }}
            type=raw,value={{date 'YYYYMMDDHHmmss'}}-{{sha}},enable=${{ github.ref == 'refs/heads/development' }}

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: images/rocksdb-secondary-checkpoint
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # BuildKit cache via GitHub Actions cache backend. The Dockerfile
          # has separate FROM build / FROM runtime stages with a `cargo
          # fetch` step before `cargo build` — both layers cache cleanly
          # when only src/main.rs changes (~30s rebuilds vs ~8min cold).
          # `mode=max` caches every intermediate layer including the
          # librocksdb-sys vendored C++ compile output.
          cache-from: type=gha,scope=rocksdb-secondary-checkpoint
          cache-to: type=gha,mode=max,scope=rocksdb-secondary-checkpoint

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: sarif
          output: trivy-results.sarif
          severity: 'CRITICAL,HIGH'
          # Don't fail the build on findings — same policy as tenant-backup-tools.
          # The image is internal-only (initContainer in a privileged Job)
          # and the binary is a static rocksdb glue; surface area is tiny.
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
