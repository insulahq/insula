name: Mail-Backup-Tools CI

on:
  push:
    branches: [main]
    paths: ['images/mail-backup-tools/**', '.github/workflows/ci-mail-backup-tools.yml']
  pull_request:
    branches: [main]
    paths: ['images/mail-backup-tools/**', '.github/workflows/ci-mail-backup-tools.yml']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}/mail-backup-tools

jobs:
  build:
    name: Build + Scan + Push
    runs-on: ubuntu-latest
    outputs:
      timestamp_tag: ${{ steps.tag.outputs.timestamp_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDDHHmmss'}}-{{sha}},enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: images/mail-backup-tools
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          # ignore-unfixed: true — upstream Debian CVEs without an
          # available fix (libgnutls/libexpat/libnghttp2 in trixie-slim
          # as of 2026-05) cannot be remediated at our layer. They
          # still land in the SARIF upload to GitHub Security so an
          # operator gets a per-image report; we only CI-gate on
          # actionable CVEs (where bumping a package version would
          # close them). Tracked as a follow-up: switch base to a
          # distroless variant when Phase 2 JMAP code lands.
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always() && github.event_name != 'pull_request'
        with:
          sarif_file: trivy-results.sarif
          category: mail-backup-tools

      - id: tag
        name: Extract immutable timestamp tag (for the dev-overlay pin)
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          ALL_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          ts_tag=$(echo "$ALL_TAGS" | grep -oE ':[0-9]{14}-[0-9a-f]{7,}' | head -1 | sed 's/^://')
          [ -n "$ts_tag" ] || { echo "::error::no timestamp tag in $ALL_TAGS"; exit 1; }
          echo "timestamp_tag=$ts_tag" >> "$GITHUB_OUTPUT"
          echo "mail-backup-tools → $ts_tag"

  # Pin the dev overlay to the immutable tag just pushed. mail-backup-tools is
  # shared by bulwark + stalwart (deployment, snapshot-cronjob, standby-replicate
  # DaemonSet) — the single images: entry re-pins all of them at once, replacing
  # the standby-replicate deploy-rev bump (no `:latest` pull-race).
  pin:
    name: Pin dev image tag
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && needs.build.outputs.timestamp_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: pin-development-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: .github/scripts/pin-image-tag.sh mail-backup-tools "${{ needs.build.outputs.timestamp_tag }}"
