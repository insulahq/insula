name: Admin Panel CI

on:
  push:
    branches: [development]
    paths: ['frontend/admin-panel/**', 'packages/api-contracts/**', 'packages/ui-restore-cart/**', '.github/workflows/ci-admin-panel.yml']
  pull_request:
    branches: [development, main]
    paths: ['frontend/admin-panel/**', 'packages/api-contracts/**', 'packages/ui-restore-cart/**', '.github/workflows/ci-admin-panel.yml']

jobs:
  lint-typecheck-test-build:
    name: Lint, Typecheck, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -w @insula/api-contracts
      - run: npm run build -w @insula/ui-restore-cart
      - run: npm run lint -w @insula/admin-panel
      - run: npm run typecheck -w @insula/admin-panel
      - run: npm run test -w @insula/admin-panel
      - run: npm run build -w @insula/admin-panel
