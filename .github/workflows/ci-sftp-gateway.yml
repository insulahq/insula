name: SFTP Gateway CI

on:
  push:
    branches: [development]
    paths: ['images/sftp-gateway/**', '.github/workflows/ci-sftp-gateway.yml']
  pull_request:
    branches: [development, main]
    paths: ['images/sftp-gateway/**', '.github/workflows/ci-sftp-gateway.yml']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}/sftp-gateway

jobs:
  test:
    name: Go unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: images/sftp-gateway/go.mod
      - name: go vet
        working-directory: images/sftp-gateway
        run: go vet ./...
      - name: go test (race)
        working-directory: images/sftp-gateway
        # Covers confineHome()/buildCommand() chroot path confinement
        # (session_test.go) — the SFTP start-directory contract.
        run: go test -race ./...

  build:
    name: Build + Scan + Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write   # Trivy SARIF upload
      id-token: write          # cosign keyless image signing (sign step gated to main, non-PR)
    outputs:
      timestamp_tag: ${{ steps.tag.outputs.timestamp_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=
            # Gate on `development`, NOT {{is_default_branch}}: ADR-053 made
            # `development` the branch that builds+pins, but the repo's DEFAULT
            # branch is still `main` — so is_default_branch is FALSE here and
            # emitted neither tag. The "Extract immutable timestamp tag" step
            # then found nothing and exit 1'd, failing the build job and
            # skipping the pin. Every development run of this workflow had
            # failed since the 2026-06-22 cutover, so the sftp-gateway image
            # was last pinned 2026-06-10. The sibling image workflows
            # (ci-security-probe, ci-firewall-reconciler, ci-backup-rclone,
            # ci-host-config-reconciler) were all migrated to this gate at the
            # cutover; this one was missed. Nothing surfaced it because tenant
            # SFTP was unreachable anyway, so a stale gateway had no symptom.
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/development' }}
            type=raw,value={{date 'YYYYMMDDHHmmss'}}-{{sha}},enable=${{ github.ref == 'refs/heads/development' }}

      # Build to local cache for PR scanning; push only on development
      - uses: docker/build-push-action@v7
        id: build
        with:
          context: images/sftp-gateway
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # SLSA provenance + SBOM attestations — gated to non-PR: PR builds use
          # `load: true` (docker exporter), which is incompatible with buildkit
          # attestations, so they'd fail. On main (push: true) they attach.
          provenance: ${{ github.event_name != 'pull_request' }}
          sbom: ${{ github.event_name != 'pull_request' }}

      # Cosign keyless-sign the pushed image by digest (main only). Mirrors
      # ci-backup-rclone.yml. Gated to non-PR (fork PRs get a read-only token).
      - uses: sigstore/cosign-installer@v3
        if: github.ref == 'refs/heads/development' && github.event_name != 'pull_request'
      - name: Sign image (keyless, OCI 1.1 referrers)
        if: github.ref == 'refs/heads/development' && github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            --registry-referrers-mode=oci-1-1 \
            "${{ env.IMAGE }}@${DIGEST}"

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          # docker/metadata-action tags with type=sha,prefix= use the
          # short (7-char) sha by default, but github.sha is the full
          # 40-char sha — so the previous ${env.IMAGE}:${github.sha}
          # referenced a tag that was never pushed and every Trivy run
          # died with "manifest unknown". Use the first tag emitted by
          # metadata-action instead.
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
        if: github.event_name != 'pull_request'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: github.event_name != 'pull_request'
        with:
          sarif_file: trivy-results.sarif
          category: sftp-gateway

      - id: tag
        name: Extract immutable timestamp tag (for the dev-overlay pin)
        if: github.ref == 'refs/heads/development' && github.event_name != 'pull_request'
        env:
          ALL_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          ts_tag=$(echo "$ALL_TAGS" | grep -oE ':[0-9]{14}-[0-9a-f]{7,}' | head -1 | sed 's/^://')
          [ -n "$ts_tag" ] || { echo "::error::no timestamp tag in $ALL_TAGS"; exit 1; }
          echo "timestamp_tag=$ts_tag" >> "$GITHUB_OUTPUT"
          echo "sftp-gateway → $ts_tag"

  # Pin the dev overlay to the immutable tag just pushed (no `:latest` pull-race).
  pin:
    name: Pin dev image tag
    needs: build
    if: github.ref == 'refs/heads/development' && github.event_name != 'pull_request' && needs.build.outputs.timestamp_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: pin-development-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: .github/scripts/pin-image-tag.sh sftp-gateway "${{ needs.build.outputs.timestamp_tag }}"
