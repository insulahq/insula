name: SFTP Gateway CI

on:
  push:
    branches: [main]
    paths: ['images/sftp-gateway/**', '.github/workflows/ci-sftp-gateway.yml']
  pull_request:
    branches: [main]
    paths: ['images/sftp-gateway/**', '.github/workflows/ci-sftp-gateway.yml']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}/sftp-gateway

jobs:
  build:
    name: Build + Scan + Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write   # Trivy SARIF upload
      id-token: write          # cosign keyless image signing (sign step gated to main, non-PR)
    outputs:
      timestamp_tag: ${{ steps.tag.outputs.timestamp_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDDHHmmss'}}-{{sha}},enable={{is_default_branch}}

      # Build to local cache for PR scanning; push only on main
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: images/sftp-gateway
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # Cosign keyless-sign the pushed image by digest (main only). Mirrors
      # ci-backup-rclone.yml. Gated to non-PR (fork PRs get a read-only token).
      - uses: sigstore/cosign-installer@v3
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
      - name: Sign image (keyless, OCI 1.1 referrers)
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            --registry-referrers-mode=oci-1-1 \
            "${{ env.IMAGE }}@${DIGEST}"

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          # docker/metadata-action tags with type=sha,prefix= use the
          # short (7-char) sha by default, but github.sha is the full
          # 40-char sha — so the previous ${env.IMAGE}:${github.sha}
          # referenced a tag that was never pushed and every Trivy run
          # died with "manifest unknown". Use the first tag emitted by
          # metadata-action instead.
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
        if: github.event_name != 'pull_request'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: github.event_name != 'pull_request'
        with:
          sarif_file: trivy-results.sarif
          category: sftp-gateway

      - id: tag
        name: Extract immutable timestamp tag (for the dev-overlay pin)
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          ALL_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          ts_tag=$(echo "$ALL_TAGS" | grep -oE ':[0-9]{14}-[0-9a-f]{7,}' | head -1 | sed 's/^://')
          [ -n "$ts_tag" ] || { echo "::error::no timestamp tag in $ALL_TAGS"; exit 1; }
          echo "timestamp_tag=$ts_tag" >> "$GITHUB_OUTPUT"
          echo "sftp-gateway → $ts_tag"

  # Pin the dev overlay to the immutable tag just pushed (no `:latest` pull-race).
  pin:
    name: Pin dev image tag
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && needs.build.outputs.timestamp_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: pin-development-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: .github/scripts/pin-image-tag.sh sftp-gateway "${{ needs.build.outputs.timestamp_tag }}"
