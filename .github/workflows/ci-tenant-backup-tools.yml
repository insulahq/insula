name: Tenant-Backup-Tools CI

on:
  push:
    branches: [development]
    paths: ['images/tenant-backup-tools/**', '.github/workflows/ci-tenant-backup-tools.yml']
  pull_request:
    branches: [development, main]
    paths: ['images/tenant-backup-tools/**', '.github/workflows/ci-tenant-backup-tools.yml']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}/tenant-backup-tools

jobs:
  build:
    name: Build + Scan + Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write   # Trivy SARIF upload
      id-token: write          # cosign keyless image signing (sign step gated to main, non-PR)
    outputs:
      timestamp_tag: ${{ steps.tag.outputs.timestamp_tag }}
    steps:
      - uses: actions/checkout@v4

      # Fast script-level guard before the (slow) image build. Catches the
      # Plesk-migration reshape regression where unread new/ messages were
      # dropped (imap-restore reads only cur/).
      - name: Reshape script tests
        run: python3 images/tenant-backup-tools/test-plesk-maildir-reshape.py

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=
            # Gate on `development`, NOT {{is_default_branch}}: ADR-053 made
            # `development` the branch that builds, but the repo's DEFAULT branch
            # is still `main`, so is_default_branch is FALSE here and NEITHER tag
            # was emitted — every consumer pulls :latest, which therefore froze at
            # its pre-cutover build on 2026-06-22. Fixed across all image
            # workflows; see ci-sftp-gateway (bc278063) and ci-file-manager
            # (5c30f200) for the two that were caught first.
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/development' }}
            type=raw,value={{date 'YYYYMMDDHHmmss'}}-{{sha}},enable=${{ github.ref == 'refs/heads/development' }}

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: images/tenant-backup-tools
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # SLSA provenance + SBOM attestations — gated to non-PR: PR builds use
          # `load: true` (docker exporter), which is incompatible with buildkit
          # attestations, so they'd fail. On main (push: true) they attach.
          provenance: ${{ github.event_name != 'pull_request' }}
          sbom: ${{ github.event_name != 'pull_request' }}

      # Cosign keyless-sign the pushed image by digest (main only). Mirrors
      # ci-backup-rclone.yml. Gated to non-PR (fork PRs get a read-only token).
      - uses: sigstore/cosign-installer@v3
        if: github.ref == 'refs/heads/development' && github.event_name != 'pull_request'
      - name: Sign image (keyless, OCI 1.1 referrers)
        if: github.ref == 'refs/heads/development' && github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            --registry-referrers-mode=oci-1-1 \
            "${{ env.IMAGE }}@${DIGEST}"

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          # ignore-unfixed: true — upstream Debian CVEs without an
          # available fix (libgnutls/libexpat/libnghttp2 in trixie-slim
          # as of 2026-05) cannot be remediated at our layer. They
          # still land in the SARIF upload to GitHub Security so an
          # operator gets a per-image report; we only CI-gate on
          # actionable CVEs (where bumping a package version would
          # close them). Tracked as a follow-up: switch base to a
          # distroless variant when Phase 2 JMAP code lands.
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always() && github.event_name != 'pull_request'
        with:
          sarif_file: trivy-results.sarif
          category: tenant-backup-tools

      - id: tag
        name: Extract immutable timestamp tag (for the dev-overlay pin)
        if: github.ref == 'refs/heads/development' && github.event_name != 'pull_request'
        env:
          ALL_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          ts_tag=$(echo "$ALL_TAGS" | grep -oE ':[0-9]{14}-[0-9a-f]{7,}' | head -1 | sed 's/^://')
          [ -n "$ts_tag" ] || { echo "::error::no timestamp tag in $ALL_TAGS"; exit 1; }
          echo "timestamp_tag=$ts_tag" >> "$GITHUB_OUTPUT"
          echo "tenant-backup-tools → $ts_tag"

  # Pin the dev overlay to the immutable tag just pushed. tenant-backup-tools is
  # shared by bulwark + stalwart (deployment, snapshot-cronjob, standby-replicate
  # DaemonSet) — the single images: entry re-pins all of them at once, replacing
  # the standby-replicate deploy-rev bump (no `:latest` pull-race).
  pin:
    name: Pin dev image tag
    needs: build
    if: github.ref == 'refs/heads/development' && github.event_name != 'pull_request' && needs.build.outputs.timestamp_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: pin-development-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: .github/scripts/pin-image-tag.sh tenant-backup-tools "${{ needs.build.outputs.timestamp_tag }}"
