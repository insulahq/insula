name: Build Images

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/admin-panel/**'
      - 'frontend/tenant-panel/**'
      - 'packages/api-contracts/**'
      - 'images/firewall-reconciler/**'
      # mail-backup-tools changes need to advance the deploy-rev for
      # the mail-stack-standby-replicate DaemonSet (which uses :latest
      # + Always, but Pods only restart when the deploy-rev annotation
      # bumps). Build-* jobs paths-filter to noop when only
      # mail-backup-tools changed; only update-staging-version runs.
      - 'images/mail-backup-tools/**'
      - '.github/workflows/build-deploy.yml'
      # Infra-only commits also need to reach staging via Flux. Without
      # these paths, k8s/** changes (LimitRanges, manifests) and scripts/**
      # changes never hit the update-staging-version job, so origin/staging
      # never fast-forwards and Flux can't see them. Build-* jobs gate on
      # their own dorny/paths-filter so this is cheap when no images need
      # building — only update-staging-version actually runs to advance
      # staging.
      - 'k8s/**'
      - 'scripts/**'
      # Exclude the files that update-staging-version itself rewrites.
      # Without these `!` patterns the auto-pin commit (which only
      # touches these three files) would re-trigger build-deploy →
      # rebuild → new auto-pin → infinite loop. Previously prevented by
      # `[skip ci]` in the auto-pin commit message, but that also skipped
      # sync-staging, leaving the pin stranded on main. With these path
      # exclusions, the auto-pin commit no longer fires build-deploy and
      # we can drop `[skip ci]`, so sync-staging propagates the pin.
      - '!k8s/overlays/staging/kustomization.yaml'
      - '!k8s/overlays/staging/platform-version-patch.yaml'
      - '!k8s/overlays/staging/deploy-rev-patch.yaml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/insulahq/hosting-platform

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      admin_panel: ${{ steps.filter.outputs.admin_panel }}
      tenant_panel: ${{ steps.filter.outputs.tenant_panel }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'packages/api-contracts/**'
            admin_panel:
              - 'frontend/admin-panel/**'
              - 'packages/api-contracts/**'
              - 'packages/ui-restore-cart/**'
            tenant_panel:
              - 'frontend/tenant-panel/**'
              - 'packages/api-contracts/**'
              - 'packages/ui-restore-cart/**'

  build-backend:
    name: Build Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      timestamp_tag: ${{ steps.tag.outputs.timestamp_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/backend
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value={{date 'YYYYMMDDHHmmss'}}-{{sha}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - id: tag
        name: Extract timestamp tag (for kustomization.yaml pin)
        env:
          ALL_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          # Pick the YYYYMMDDHHmmss-SHA tag (skip "latest" + bare-sha).
          # Pattern: ${IMG}:<14 digits>-<7+ hex chars>
          ts_tag=$(echo "$ALL_TAGS" | grep -oE ':[0-9]{14}-[0-9a-f]{7,}' | head -1 | sed 's/^://')
          if [[ -z "$ts_tag" ]]; then
            echo "::error::could not extract timestamp tag from: $ALL_TAGS"; exit 1
          fi
          echo "timestamp_tag=${ts_tag}" >> "$GITHUB_OUTPUT"
          echo "backend timestamp tag → ${ts_tag}"

  build-admin-panel:
    name: Build Admin Panel
    needs: changes
    if: needs.changes.outputs.admin_panel == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      timestamp_tag: ${{ steps.tag.outputs.timestamp_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/admin-panel
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value={{date 'YYYYMMDDHHmmss'}}-{{sha}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/admin-panel/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - id: tag
        name: Extract timestamp tag
        env:
          ALL_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          ts_tag=$(echo "$ALL_TAGS" | grep -oE ':[0-9]{14}-[0-9a-f]{7,}' | head -1 | sed 's/^://')
          [[ -z "$ts_tag" ]] && { echo "::error::no timestamp tag in $ALL_TAGS"; exit 1; }
          echo "timestamp_tag=${ts_tag}" >> "$GITHUB_OUTPUT"
          echo "admin-panel timestamp tag → ${ts_tag}"

  build-tenant-panel:
    name: Build Tenant Panel
    needs: changes
    if: needs.changes.outputs.tenant_panel == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      timestamp_tag: ${{ steps.tag.outputs.timestamp_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/tenant-panel
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value={{date 'YYYYMMDDHHmmss'}}-{{sha}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/tenant-panel/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - id: tag
        name: Extract timestamp tag
        env:
          ALL_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          ts_tag=$(echo "$ALL_TAGS" | grep -oE ':[0-9]{14}-[0-9a-f]{7,}' | head -1 | sed 's/^://')
          [[ -z "$ts_tag" ]] && { echo "::error::no timestamp tag in $ALL_TAGS"; exit 1; }
          echo "timestamp_tag=${ts_tag}" >> "$GITHUB_OUTPUT"
          echo "tenant-panel timestamp tag → ${ts_tag}"

  # Tag strategy:
  # - SHA:          for traceability (e.g., a1b2c3d)
  # - latest:       consumed by dev environment
  # - timestamp-SHA: consumed by staging Flux Image Automation
  #                  (matches image-policies.yaml regex pattern)
  #
  # Production uses pinned semver tags from release.yml — never :latest.
  #
  # Per-job path filters via dorny/paths-filter mean a frontend-only change
  # no longer rebuilds the backend image (and vice versa). api-contracts
  # changes still trigger all three since they're a shared dependency.

  # ─────────────────────────────────────────────────────────────────────
  # Commit the resolved short-SHA into platform-version-patch.yaml on
  # the staging overlay, so the backend's /api/v1/admin/platform/version
  # endpoint returns the real running version instead of "unknown".
  #
  # Runs after images are pushed, only on main. Loop prevention is now
  # the responsibility of the negative-path filter on the workflow's
  # `on.push.paths` (the auto-pin commit only modifies the three
  # staging-overlay files, which are excluded). `[skip ci]` was removed
  # from the commit message so sync-staging propagates the pin onto
  # the staging branch — otherwise Flux keeps reconciling the previous
  # image tag.
  update-staging-version:
    name: Update staging platform-version
    runs-on: ubuntu-latest
    needs: [build-backend, build-admin-panel, build-tenant-panel]
    # Serialize concurrent pin commits. Two main-branch pushes within
    # the same ~5-min build window both end up here trying to overwrite
    # the same three lines in the same three files with DIFFERENT values
    # (the per-commit short-SHA and per-image timestamp tag). git rebase
    # cannot 3-way-merge those — the conflict is genuine, not a
    # transient race. Queueing this job (NOT cancelling) lets each
    # commit's pin land in turn against a clean parent. Image builds
    # above us still run in parallel; only the ~2s pin commit serializes.
    # See project_backups_real_bugs_fixed_2026_05_22 + the 2026-05-26
    # 2a3e9fd3 incident for the failure mode this prevents.
    concurrency:
      group: pin-staging-${{ github.ref }}
      cancel-in-progress: false
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      !contains(github.event.head_commit.message, '[skip version]')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version
        id: version
        run: |
          # Use short-sha of the commit that triggered this build.
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          # Pull the latest semver tag reachable from HEAD. When no tag
          # exists yet (brand-new repo) git describe returns empty — the
          # `|| echo` fallback doesn't fire on empty stdout, only on
          # non-zero exit. Default via parameter expansion instead.
          LAST_TAG=$(git describe --tags --abbrev=0 --match 'v*.*.*' 2>/dev/null | sed 's/^v//')
          : "${LAST_TAG:=0.0.0}"
          VERSION="${LAST_TAG}-${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Staging version → ${VERSION}"

      - name: Apply staging pin
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BRANCH: ${{ github.ref_name }}
          BACKEND_TAG: ${{ needs.build-backend.outputs.timestamp_tag }}
          ADMIN_TAG: ${{ needs.build-admin-panel.outputs.timestamp_tag }}
          TENANT_TAG: ${{ needs.build-tenant-panel.outputs.timestamp_tag }}
        run: |
          # All three pin files are written by a single idempotent script
          # so the Commit + push step can re-invoke it after a rebase
          # reset (see that step's recovery loop for why we don't try to
          # git-rebase the pin commit).
          ./.github/scripts/apply-staging-pin.sh

      - name: Commit + push (with reset-and-reapply on race)
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BRANCH: ${{ github.ref_name }}
          BACKEND_TAG: ${{ needs.build-backend.outputs.timestamp_tag }}
          ADMIN_TAG: ${{ needs.build-admin-panel.outputs.timestamp_tag }}
          TENANT_TAG: ${{ needs.build-tenant-panel.outputs.timestamp_tag }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          stage_and_commit() {
            if git diff --quiet k8s/overlays/staging/; then
              echo "No change — skipping commit."
              return 1   # caller treats this as a clean exit-0 from the loop
            fi
            git add \
              k8s/overlays/staging/platform-version-patch.yaml \
              k8s/overlays/staging/deploy-rev-patch.yaml \
              k8s/overlays/staging/kustomization.yaml
            # No [skip ci] — loop prevention is on the workflow's path
            # filter (the auto-pin commit only touches the three excluded
            # files). Dropping [skip ci] lets sync-staging fire and
            # propagate the pin to the staging branch.
            git commit -m "chore(staging): pin platform-version to ${VERSION}"
            return 0
          }

          # Race-recovery loop.
          #
          # The auto-pin commit overwrites three files with values that
          # are a pure function of (VERSION, image timestamp tags), both
          # known up-front for this workflow run. So if our push loses a
          # race to a concurrent auto-pin job, we don't try to git-rebase
          # our commit onto the new HEAD (that would conflict on every
          # rewritten line — same base byte, two different new values).
          # Instead: `git reset --hard origin/main`, re-run the pin
          # script against the new HEAD, recommit, and retry the push.
          # The pin is idempotent, so this always converges.
          #
          # Concurrency-group on this job (see job-level `concurrency:`)
          # already serializes the common case; this loop is a belt-and-
          # braces for cross-workflow collisions (workflow_dispatch reruns,
          # human edits to the three files, etc.).
          set +e
          stage_and_commit
          had_changes=$?
          if [[ $had_changes -ne 0 ]]; then exit 0; fi

          for attempt in 1 2 3 4; do
            git push origin HEAD:main
            push_rc=$?
            if [[ $push_rc -eq 0 ]]; then
              echo "push succeeded on attempt $attempt"
              exit 0
            fi
            echo "push attempt $attempt rejected (rc=$push_rc) — reset to origin/main + re-apply pin"
            git fetch origin main
            git reset --hard origin/main
            ./.github/scripts/apply-staging-pin.sh
            stage_and_commit
            had_changes=$?
            if [[ $had_changes -ne 0 ]]; then
              # After reset+reapply, our pin is already on origin/main
              # (another job landed an identical-content pin first, or
              # this commit's images are already pinned from a prior
              # workflow_dispatch). Either way, we're done.
              echo "after reset+reapply the pin matches origin/main — nothing to push"
              exit 0
            fi
          done
          echo "::error::push failed after 4 attempts with reset-and-reapply — main is moving faster than we can land the auto-pin. Check for a build-deploy loop or a runaway pusher."
          exit 1
          # main → staging propagation is owned by sync-staging.yml.
          # That workflow does a real merge (not fast-forward) and fails
          # loudly on conflict, so we don't silently drop infra-only
          # commits anymore. The previous `git push origin HEAD:staging
          # || true` here masked divergence — see project_cluster_resource_audit_2026_05_09.
