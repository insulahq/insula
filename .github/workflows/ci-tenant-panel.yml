name: Tenant Panel CI

on:
  push:
    branches: [main]
    paths: ['frontend/tenant-panel/**', 'packages/api-contracts/**', 'packages/ui-restore-cart/**']
  pull_request:
    branches: [main]
    paths: ['frontend/tenant-panel/**', 'packages/api-contracts/**', 'packages/ui-restore-cart/**']

jobs:
  lint-typecheck-test-build:
    name: Lint, Typecheck, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -w @insula/api-contracts
      - run: npm run build -w @insula/ui-restore-cart
      - run: npm run lint -w @insula/tenant-panel
      - run: npm run typecheck -w @insula/tenant-panel
      - run: npm run test -w @insula/tenant-panel
      - run: npm run build -w @insula/tenant-panel
