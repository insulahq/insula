name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # The tag MUST match platform/VERSION at the tagged commit (ADR-045
      # Decision 5 — cut-release.sh keeps them in lockstep). Refuse a mismatch
      # so a hand-pushed tag can never ship a version the code doesn't claim.
      - name: Validate tag matches platform/VERSION
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION=$(tr -d '[:space:]' < platform/VERSION)
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} != platform/VERSION ($FILE_VERSION) — use scripts/cut-release.sh"
            exit 1
          fi
          echo "tag matches platform/VERSION: $FILE_VERSION"

      # Build all 3 images with semver tag only (no :latest — that's build-deploy.yml's job)
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/backend:${{ steps.version.outputs.version }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/admin-panel/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/admin-panel:${{ steps.version.outputs.version }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/tenant-panel/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/tenant-panel:${{ steps.version.outputs.version }}

      # Release notes = the matching CHANGELOG section (curated by cut-release.sh),
      # not auto-generated commit logs.
      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Literal prefix match (index, not regex) so the version's dots are not
          # treated as wildcards — `## [2026.6.1]` must not match `## [2026.6.10]`.
          awk -v v="$VERSION" '
            index($0, "## [" v "]") == 1 {f=1; next}
            f && /^## \[/ {f=0}
            f {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::warning::no CHANGELOG section for ${VERSION}"
            printf 'Release %s\n' "$GITHUB_REF_NAME" > RELEASE_NOTES.md
          fi

      # Create GitHub Release
      - uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
