name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # The tag MUST match platform/VERSION at the tagged commit (ADR-045
      # Decision 5 — cut-release.sh keeps them in lockstep). Refuse a mismatch
      # so a hand-pushed tag can never ship a version the code doesn't claim.
      - name: Validate tag matches platform/VERSION
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION=$(tr -d '[:space:]' < platform/VERSION)
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} != platform/VERSION ($FILE_VERSION) — use scripts/cut-release.sh"
            exit 1
          fi
          echo "tag matches platform/VERSION: $FILE_VERSION"

      # Build all 3 images with semver tag only (no :latest — that's build-deploy.yml's job)
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/backend:${{ steps.version.outputs.version }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/admin-panel/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/admin-panel:${{ steps.version.outputs.version }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/tenant-panel/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/tenant-panel:${{ steps.version.outputs.version }}

      # platform-ops operator CLI (ADR-045 / W17): build the self-contained Node
      # SEA binary for both arches and cosign-sign each (key-based, OFFLINE — no
      # Rekor upload, matching the bootstrap verify path). Uploaded as Release
      # assets that bootstrap.sh fetches + verifies. If COSIGN_PRIVATE_KEY is not
      # set the binaries ship UNSIGNED and the bootstrap auto-install stays
      # dormant (fail-closed) — see scripts/lib/bootstrap-phases.sh.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - uses: sigstore/cosign-installer@v3
      - name: Build & sign platform-ops binaries
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # arm64 cross-build: inject the (arch-independent) SEA blob into a
          # downloaded target-arch Node runtime. That runtime IS the binary we
          # ship + cosign-sign, so verify its integrity against Node's official
          # SHA256 manifest (TLS-authenticated nodejs.org) BEFORE extracting —
          # the cosign signature only attests the output, never its inputs.
          # (Follow-up hardening: GPG-verify SHASUMS256.txt.asc against Node's
          # release keyset for full provenance.)
          NODE_VER="$(node -p 'process.version')"
          TARBALL="node-${NODE_VER}-linux-arm64.tar.xz"
          curl -fsSL "https://nodejs.org/dist/${NODE_VER}/${TARBALL}" -o "/tmp/${TARBALL}"
          curl -fsSL "https://nodejs.org/dist/${NODE_VER}/SHASUMS256.txt" -o /tmp/SHASUMS256.txt
          ( cd /tmp && grep " ${TARBALL}\$" SHASUMS256.txt | sha256sum -c - )
          mkdir -p /tmp/node-arm64 && tar -xJf "/tmp/${TARBALL}" -C /tmp/node-arm64 --strip-components=1
          ./scripts/build-platform-ops.sh --version "$VERSION" --arch amd64
          ./scripts/build-platform-ops.sh --version "$VERSION" --arch arm64 --node-binary /tmp/node-arm64/bin/node
          if [ -n "${COSIGN_PRIVATE_KEY:-}" ]; then
            for a in amd64 arm64; do
              cosign sign-blob --key env://COSIGN_PRIVATE_KEY --tlog-upload=false --yes \
                "dist-platform-ops/platform-ops-linux-${a}" > "dist-platform-ops/platform-ops-linux-${a}.sig"
            done
            echo "platform-ops: signed amd64 + arm64"
          else
            echo "::warning::COSIGN_PRIVATE_KEY not set — uploading UNSIGNED platform-ops binaries; bootstrap auto-install stays dormant (fail-closed)."
          fi

      # Release notes = the matching CHANGELOG section (curated by cut-release.sh),
      # not auto-generated commit logs.
      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Literal prefix match (index, not regex) so the version's dots are not
          # treated as wildcards — `## [2026.6.1]` must not match `## [2026.6.10]`.
          awk -v v="$VERSION" '
            index($0, "## [" v "]") == 1 {f=1; next}
            f && /^## \[/ {f=0}
            f {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::warning::no CHANGELOG section for ${VERSION}"
            printf 'Release %s\n' "$GITHUB_REF_NAME" > RELEASE_NOTES.md
          fi

      # Create GitHub Release (with the platform-ops binaries + signatures as
      # assets; .sig files are absent when unsigned → don't fail on unmatched).
      - uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: false
          files: |
            dist-platform-ops/platform-ops-linux-amd64
            dist-platform-ops/platform-ops-linux-amd64.sig
            dist-platform-ops/platform-ops-linux-arm64
            dist-platform-ops/platform-ops-linux-arm64.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
