name: Documentation Site

# Strict build gate only. The manual is PUBLISHED by the separate
# `insulahq/insulahq.github.io` repo, which pulls this repo's `documentation/`
# on a schedule and deploys to the org-root Pages site
# (https://insulahq.github.io/). This repo no longer hosts its own Pages.
on:
  pull_request:
    branches: [main]
    paths:
      - 'documentation/**'
      - '.github/workflows/docs-site.yml'
      - 'CHANGELOG.md' # transcluded into the manual's changelog page
  push:
    branches: [main]
    paths:
      - 'documentation/**'
      - '.github/workflows/docs-site.yml'
      - 'CHANGELOG.md'

permissions:
  contents: read

concurrency:
  group: docs-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build manual (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: documentation/requirements.txt
      - run: pip install -r documentation/requirements.txt
      - name: Generate changelog body
        run: python3 documentation/gen/changelog.py
      - name: Build (broken nav/links fail)
        run: mkdocs build --strict -f documentation/mkdocs.yml
