name: Firewall-Reconciler CI

on:
  push:
    branches: [main]
    paths:
      - 'images/firewall-reconciler/**'
      - '.github/workflows/ci-firewall-reconciler.yml'
  pull_request:
    branches: [main]
    paths:
      - 'images/firewall-reconciler/**'
      - '.github/workflows/ci-firewall-reconciler.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}/firewall-reconciler

jobs:
  build:
    name: Build + Test + Push
    runs-on: ubuntu-latest
    outputs:
      timestamp_tag: ${{ steps.tag.outputs.timestamp_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: images/firewall-reconciler/go.sum

      - name: go mod download
        working-directory: images/firewall-reconciler
        run: go mod download

      - name: go vet
        working-directory: images/firewall-reconciler
        run: go vet ./...

      - name: go test
        working-directory: images/firewall-reconciler
        run: go test -race -count=1 ./...

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value={{date 'YYYYMMDDHHmmss'}}-{{sha}},enable=${{ github.ref == 'refs/heads/main' }}

      - uses: docker/build-push-action@v5
        with:
          context: images/firewall-reconciler
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - id: tag
        name: Extract immutable timestamp tag (for the dev-overlay pin)
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          ALL_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          ts_tag=$(echo "$ALL_TAGS" | grep -oE ':[0-9]{14}-[0-9a-f]{7,}' | head -1 | sed 's/^://')
          [ -n "$ts_tag" ] || { echo "::error::no timestamp tag in $ALL_TAGS"; exit 1; }
          echo "timestamp_tag=$ts_tag" >> "$GITHUB_OUTPUT"
          echo "firewall-reconciler → $ts_tag"

  # Pin the dev overlay to the immutable tag just pushed, so Flux rolls to a tag
  # that is GUARANTEED to exist (no `:latest` pull-race). Shares build-deploy's
  # pin concurrency group so all pin commits across workflows serialize.
  pin:
    name: Pin dev image tag
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && needs.build.outputs.timestamp_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: pin-development-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: .github/scripts/pin-image-tag.sh firewall-reconciler "${{ needs.build.outputs.timestamp_tag }}"
