name: Infrastructure CI

on:
  push:
    branches: [main]
    paths:
      - 'k8s/**'
      - 'scripts/**'
      - 'security/**'
  pull_request:
    branches: [main]
    paths:
      - 'k8s/**'
      - 'scripts/**'
      - 'security/**'

jobs:
  kustomize-build:
    name: Kustomize Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "Building base..."
          kubectl kustomize k8s/base
          echo "Building dev overlay..."
          kubectl kustomize k8s/overlays/dev
          echo "Building development overlay..."
          kubectl kustomize k8s/overlays/development
          echo "Building production overlay..."
          kubectl kustomize k8s/overlays/production

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          # shellcheck is pre-installed on ubuntu-latest runners. The
          # previous `sudo apt-get install -y` step intermittently failed
          # on repo mirror hash mismatches — skip it unless the tool is
          # genuinely missing (and update the lists first if it is).
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y shellcheck
          fi
          shellcheck --version
          # --severity=error fails CI only on SC1xxx parse errors
          # (genuine bugs that prevent the script from running). SC2xxx
          # warnings (SC2034 unused vars, SC2155 declare-and-assign,
          # SC2087 heredoc-quoting, etc.) are reported as advisory by
          # shellcheck locally but don't fail the job.
          #
          # Note: a prior version of this comment said "--severity=warning
          # skips info-level findings". That was wrong — shellcheck's
          # --severity is a minimum threshold, so --severity=warning
          # reports warnings AND errors. Use --severity=error to gate
          # only on parse-level errors.
          shellcheck --severity=error scripts/*.sh

  # Self-contained shell test harnesses — regression guards for the logic in
  # scripts/ (image-org fork-safety, release cutting). No DinD / root needed.
  shell-unit-tests:
    name: Shell unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/test-image-org.sh
      - run: ./scripts/test-cut-release.sh
      - run: ./scripts/test-ci-no-cluster-push.sh
      - run: ./scripts/test-platform-ops-install.sh
      - run: ./scripts/test-ci-migration-coverage.sh
      - run: ./scripts/test-new-host-migration.sh
      - run: ./scripts/test-cut-release-audit.sh
      - run: ./.github/scripts/test-pin-image-tag.sh
      # Runs in a container with NET_ADMIN so the nft operations (and the
      # `flush ruleset` in its fixtures) are isolated from the runner's own
      # networking. Proves the firewall-blacklist host-migration is surgical
      # (the marker-canary table must survive) + idempotent.
      - name: host-migration firewall-blacklist (nftables, containerised)
        run: |
          docker run --rm --cap-add=NET_ADMIN -v "$PWD":/src -w /src debian:trixie-slim \
            sh -c 'apt-get update -qq && apt-get install -y -qq nftables >/dev/null && bash scripts/test-host-migration-blacklist-nft.sh'

  # platform-ops SEA build (Holistic plan W17): prove the binary build pipeline
  # stays green on every PR — bundles the backend graph, the binary runs, and a
  # real cosign sign→verify→install roundtrip succeeds through the bootstrap code.
  platform-ops-binary:
    name: platform-ops binary build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - uses: sigstore/cosign-installer@v3
      - run: ./scripts/test-build-platform-ops.sh
        env:
          PLATFORM_OPS_COSIGN_BIN: cosign

  # No-push-to-cluster guard (Holistic plan W7): CI builds images + commits git
  # pins — it never mutates a live cluster (pull model).
  no-cluster-push:
    name: No push-to-cluster guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/ci-no-cluster-push.sh

  admin-auth-gate-check:
    name: Admin-auth gate guardrail
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yq
        run: |
          # mikefarah/yq v4 — exact syntax used in scripts/ci-admin-auth-check.sh.
          # Ubuntu's apt yq is Python-based and incompatible.
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version
      - name: Verify admin-only Ingresses have an auth gate
        run: ./scripts/ci-admin-auth-check.sh

  firewall-check:
    name: Firewall-rule guardrail
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify bootstrap.sh firewall rules
        run: ./scripts/ci-firewall-check.sh

  migration-coverage-guard:
    name: Migration coverage (firewall shape → host-migration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the guard can diff the PR against origin/main to
          # detect an added host-migration / refreshed baseline / waiver.
          fetch-depth: 0
      - name: Ensure base ref is available
        run: git fetch origin main --depth=200 || true
      - name: Verify a bootstrap firewall-shape change ships a host-migration
        run: ./scripts/ci-migration-coverage.sh

  nginx-real-ip-check:
    name: Nginx real_ip template guardrail
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify admin/tenant panel nginx.conf.template has real_ip directives
        run: ./scripts/ci-nginx-real-ip-check.sh

  system-tenant-guard:
    name: SYSTEM tenant protection guardrail (ADR-040)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify SYSTEM tenant scheduler filters + DB invariants
        run: ./scripts/ci-system-tenant-check.sh

  platform-migration-guard:
    name: Platform-migration registry discipline (ADR-045 W9)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify migration registry consistency + idempotency discipline
        run: ./scripts/ci-migration-idempotency.sh

  version-poller-guard:
    name: Version-poller invariants (ADR-045 W11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify cosign-signed manifest + baked key + hourly CronJob + no cosign binary
        run: ./scripts/ci-version-poller-check.sh

  host-config-guard:
    name: Host-config host-side model (ADR-045 W10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify no privileged enforcer pod + observe stays locked + deny-list
        run: ./scripts/ci-host-config-check.sh

  host-migrations-guard:
    name: Host-migration runner + catalog discipline (ADR-045 W10c)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Verify runner validation + embedding + per-script authoring contract
        run: ./scripts/ci-host-migrations-check.sh

  system-upgrade-guard:
    name: system-upgrade-controller integration (ADR-045 W12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify no committed Plan + pinned+hardened SUC + skip-a-minor refusal
        run: ./scripts/ci-system-upgrade-check.sh

  upgrade-repin-guard:
    name: Platform upgrade re-pin invariants (ADR-045 W13)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify dry-run-default + resolved-source + clean-tag + decision gates
        run: ./scripts/ci-upgrade-repin-check.sh

  no-dex-in-production:
    name: Dex must not ship in production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version
      - name: Verify production overlay does not deploy Dex
        run: ./scripts/ci-no-dex-in-production.sh

  no-pinned-domains:
    name: No hard-coded apex domains in K8s manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan k8s/ for pinned apex literals
        run: ./scripts/ci-no-pinned-domains.sh

  no-hardcoded-ips:
    name: No hard-coded public IPs in K8s manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan k8s/ for literal IPv4 addresses
        # 2026-05-16: testing.example.test re-bootstrap revealed an
        # IP literal hardcoded inside an inline kustomize patch for the
        # mail Service externalIPs. Per-cluster IPs MUST come from the
        # platform-cluster-config ConfigMap and be resolved by Flux
        # postBuild substituteFrom. This guard fails the build on a
        # regression. See scripts/ci-no-hardcoded-ips.sh header.
        run: ./scripts/ci-no-hardcoded-ips.sh

  k8s-patch-check:
    name: K8s client patchNamespaced* Content-Type guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify every patch call has an explicit middleware shim
        run: ./scripts/ci-k8s-patch-check.sh

  job-ttl-check:
    name: Job ttlSecondsAfterFinished guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify every Job spec declares ttlSecondsAfterFinished
        # Completed Jobs (and their Pods) stay forever without
        # ttlSecondsAfterFinished, accumulating etcd objects and Pod
        # log inodes. The job-gc CronJob is a defensive backup for
        # Jobs from sources we don't control (Longhorn, operators);
        # this guard ensures everything we *do* control self-expires.
        run: ./scripts/ci-job-ttl-check.sh

  flux-escape-check:
    name: Flux postBuild ${VAR} escape guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify CronJob/Job inline shell escapes ${VAR} as $${VAR}
        # Flux postBuild.substituteFrom expands every ${VAR} against
        # platform-cluster-config before kubectl apply. Bash locals
        # and pod-env vars get stripped to empty strings, silently
        # breaking the inline script. The 2026-05-10 job-gc E2E
        # caught one live instance; the same class affected 7 other
        # CronJobs across k8s/base/. This guard prevents regression.
        run: ./scripts/ci-flux-escape-check.sh

  task-helper-coverage:
    name: Task Tracker helper coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify long-running surfaces register with the Task Tracker helper
        run: ./scripts/ci-task-helper-coverage.sh

  snapshot-restore-not-fake:
    name: CNPG snapshot Restore is wired to the real PITR endpoint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify SystemSnapshotsModal posts to /admin/postgres-restore
        # Phase 1 (2026-05-22) — operator pushback: the CNPG snapshot
        # Restore button used to navigate to /backups/disaster-recovery
        # shell instructions instead of actually restoring. This guard
        # blocks reintroduction.
        run: ./scripts/ci-snapshot-restore-not-fake.sh

  cnpg-backup-catalogue-check:
    name: CNPG backup catalogue invariants (graceful degradation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify catalogue auth gate + S3-direct + unavailable-on-failure
        # Phase 2 (2026-05-22) — the catalogue exists for graceful
        # degradation when the CNPG operator is dead. Any regression
        # that makes it throw on failure paths would defeat the entire
        # purpose. This guard locks in the invariants.
        run: ./scripts/ci-cnpg-backup-catalogue-check.sh

  postgres-barman-restore-check:
    name: Barman-cloud restore invariants (source-safety + plugin-shape)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify barman-restore module gates source mutation + plugin parameter shape
        # Phase 3 (2026-05-22) — this module spawns Cluster CRs from
        # off-cluster archives. The two regressions that would matter
        # most are: (a) source-cluster mutation via mistyped name and
        # (b) plugin parameter drift (RFC: barmanObjectName, not
        # objectStoreName — drift caught 2026-05-20). This guard
        # blocks both.
        run: ./scripts/ci-postgres-barman-restore-check.sh

  flux-envsubst-check:
    name: Flux postBuild envsubst safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify no malformed ${...} sequences in rendered overlays
        # Catches the parse-error class that crashed the 2026-05-04
        # staging cutover apply (`${'`, `${ `, `${{` etc.) — Flux's
        # drone/envsubst aborts the kustomization with "unable to
        # parse variable name" and the cluster freezes mid-cutover.
        run: ./scripts/ci-flux-envsubst-check.sh

  empty-cluster-issuer-check:
    name: Empty cluster-issuer guardrail
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install python3 + PyYAML
        run: |
          python3 -m pip install --user pyyaml
      - name: Verify no Ingress with TLS + empty/unresolved cluster-issuer
        # Catches the silent-broken-cert class spotted on 2026-05-07:
        # webmail.staging.example.test was serving the nginx-
        # ingress fake self-signed cert because the staging overlay
        # used `${CLUSTER_ISSUER_NAME}` but platform-cluster-config
        # didn't define that key, so Flux postBuild rendered an empty
        # annotation. cert-manager skipped the cert; nginx fell back.
        # ci-flux-envsubst-check only catches MALFORMED `${...`, not
        # unresolved-variable patterns.
        run: ./scripts/ci-empty-cluster-issuer-check.sh

  system-affinity-check:
    name: System node-affinity guardrail
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yq
        run: |
          # Same binary as admin-auth-gate-check — kept as a separate step
          # so this job can fail independently when yq drifts.
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version
      - name: Verify system workloads carry role=server nodeAffinity
        run: ./scripts/ci-system-affinity-check.sh

  # 2026-05-14 streamline: mail-subsystem static probes promoted to
  # required gates. These detect classes of regression that have
  # repeatedly slipped through the existing tests:
  #   - mail-sdk-shape:    catches v0-positional @kubernetes/client-node
  #                        casts that silently fail on the v1 SDK
  #                        (real bug: migration.ts:84 "Node not found"
  #                        while node was healthy).
  #   - no-longhorn-in-mail: enforces the local-path-only decision in
  #                        project_mail_architecture_streamline_2026_05_14.md.
  mail-sdk-shape:
    name: Mail-admin SDK v0/v1 shape
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - run: ./scripts/ci-mail-sdk-shape.sh

  no-longhorn-in-mail:
    name: No Longhorn refs in mail subsystem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/ci-no-longhorn-in-mail.sh

  mail-arch-regressions:
    name: Mail architecture regression guards (Phase 1/2 streamline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/ci-mail-arch-regressions.sh

  # Image-org fork-safety (Holistic plan W2): overlays stay canonical, workflows
  # derive their push org from github.repository, preflight constant agrees.
  image-org:
    name: Image-org fork-safety guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/ci-image-org-check.sh

  # R-X5: universal backup-rclone-shim invariants. 8 checks: super_admin
  # gate, SHIM_CLASSES locked, STATE_ERROR self-heal, consumer-kind
  # coverage, migration 0016 CHECK constraint, registry-membership of
  # every shim-consumer kind, drain_timeout_seconds CHECK, lazy
  # buildK8sClients factory.
  backup-rclone-shim:
    name: Backup-rclone-shim invariants (R-X1..R-X5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/ci-backup-rclone-shim-check.sh

  # DR safety: every backup write/delete callsite must call
  # requireWritableTarget() OR carry a RO-EXEMPT annotation, so a
  # freshly restored DR cluster cannot overwrite/prune the repo it
  # just restored from. Enforces 8 registered sites; flags any new
  # write-path additions under the watched subtrees.
  backup-target-readonly:
    name: Backup target read_only enforcement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/ci-backup-target-ro-check.sh

  # A2 DR-bundle sidecar drift guard: a contributor adding a column to
  # backup_configurations must also extend dr-rows.json's serialiser +
  # the Zod schema. Without this, Unit B's restore importer silently
  # misses fields. Also enforces DR_BUNDLE_VERSION=1 (bumps must be
  # explicit) + the critical-Secret list.
  dr-bundle-drift:
    name: DR bundle sidecar drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/ci-dr-bundle-check.sh

  component-watch-guard:
    name: Component watch registry/ledger (ADR-050)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install python3 + PyYAML
        run: python3 -m pip install --user pyyaml
      - name: Verify registry schema + drift + k8s/bootstrap coverage + ledger SLA
        # The security/components.yaml registry is the single source of truth for
        # the component CVE/version watch. This guard fails if a pinned version
        # drifts from its pin_source, if a k8s image / bootstrap pin is untracked,
        # or if an open KEV/critical ledger item is past SLA without a mitigation.
        run: ./scripts/ci-component-watch-check.sh

