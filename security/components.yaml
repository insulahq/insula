# Insula component watch registry — SINGLE SOURCE OF TRUTH for the CVE/version watch.
#
# Guarded by scripts/ci-component-watch-check.sh (wired into Infrastructure CI):
#   * schema     — every entry has the required fields with valid enum values
#   * drift      — for pin_check:true entries the `pinned` literal MUST be present
#                  in `pin_source` (so this file can never silently rot)
#   * coverage   — every distinct image:/imageName: under k8s/ AND every chart/
#                  binary pin in scripts/bootstrap.sh maps to a component here
#                  (a new component can't be added without registering it)
#   * SLA        — open KEV/critical ledger items past their tier SLA must carry
#                  a mitigation (see security/cve-ledger.yaml)
#
# Process, tiering rubric, and how a fix flows to a release:
#   docs/operations/COMPONENT_WATCH.md   (ADR-050)
#
# Field reference:
#   id          stable kebab-case key (used by the ledger `component` field)
#   tier        "0" critical | "1" high | "2" moderate | "3" low | "C" catalog | "X" external
#   kind        chart | image | binary | plugin | npm | go | rust | external
#   pinned      the exact version/tag/digest we run (drift-checked against pin_source)
#   app_version (optional) upstream app version when `pinned` is a chart version
#   pin_source  file that holds the pin (path only — guard greps the file, no line nums)
#   pin_check   true = drift-guard the literal; false = first-party/floating (scan instead)
#   watch       {type, repo, advisories} — where to look for new versions + advisories
#   scan        how CVEs surface: trivy | osv | govulncheck | cargo-audit | manual | none
#   deps        (first-party) lockfiles/modules the dep scanners read
#   owner       platform | catalog | external
#   dev_only    true = dev/test fixture, not part of a production install
#   notes       free text

meta:
  schema_version: 1
  updated: "2026-06-08"
  adr: ADR-050
  runbook: docs/operations/COMPONENT_WATCH.md

tiers:
  "0": "Critical — internet-facing AND (auth/crypto/secret/data OR platform-wide blast)"
  "1": "High — privileged/host or platform-wide, OR internet-facing single subsystem"
  "2": "Moderate — cluster-internal, namespaced, authenticated"
  "3": "Low — build-time toolchain / base + utility images (covered transitively by image scan)"
  "C": "Catalog — tenant-facing runtime images, per-tenant blast (rebuild + tenant redeploy)"
  "X": "External — consumed, not patched by us; watch advisories, coordinate, document"

# Time-to-remediate a confirmed, reachable CVE (also encoded in the SLA guard).
slas:
  "0": { critical_kev: "48h", high: "7d", medium: "next-release" }
  "1": { critical_kev: "7d",  high: "30d", medium: "next-release" }
  "2": { critical_kev: "30d", high: "next-release", medium: "best-effort" }
  "3": { critical_kev: "next-release", high: "best-effort", medium: "best-effort" }
  "C": { critical_kev: "7d",  high: "30d", medium: "best-effort" }
  "X": { critical_kev: "notify+document", high: "notify", medium: "-" }

