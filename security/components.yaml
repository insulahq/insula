    pinned: "v1.33.10+k3s1"
    pin_source: scripts/bootstrap.sh
    pin_check: true
    watch: { type: github_releases, repo: k3s-io/k3s, advisories: kubernetes/kubernetes }
    scan: manual
    owner: platform
    notes: >-
      Control plane + node runtime. Bundles CoreDNS, metrics-server, kube-proxy,
      local-path (disabled), Traefik (we replace via Helm). Upgrades are SEQUENTIAL
      (one minor at a time) via system-upgrade-controller Plans. Track k8s CVEs +
      the embedded containerd/runc.

