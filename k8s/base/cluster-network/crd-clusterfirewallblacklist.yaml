# ClusterFirewallBlacklist — operator-curated PERMANENT firewall ban of an
# IP or CIDR. Converged onto every node's nft sets `blacklist_v{4,6}` by
# firewall-reconciler and dropped on ALL ports, BEFORE any accept rule
# (but AFTER `ct state established,related accept`, so an operator who
# bans their own session's IP keeps that session — the connection is
# already established). Cluster-scoped: firewall bans are cluster-wide.
#
# Distinct from CrowdSec L4 bans (`crowdsec_blocklist_v{4,6}`): those are
# TTL'd, automatic, and fed from the CrowdSec LAPI. Blacklist entries are
# permanent and operator-initiated — e.g. a fail2ban repeat-offender the
# operator promotes from a 1h jail to a forever host-firewall drop.
#
# Lifecycle:
#   - Operator creates via Settings → Network Trust → Blacklist (admin
#     panel) or from the SSH Lockdown fail2ban modal "Ban permanently".
#   - Reconciler reads spec.cidr, normalizes (/32 or /128 implied for
#     bare IPs), and ensures the entry is present in the local nft set.
#     The SAME self-protect exclusion belt as the CrowdSec reconciler
#     applies — an entry that would drop a node IP / cluster peer /
#     trusted range / the pod+service CIDR is REFUSED at reconcile and a
#     Failed condition is written (defense in depth; the platform-api
#     also refuses such writes up-front).
#   - Deletion removes the drop from nft on every node.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusterfirewallblacklists.networking.insula.host
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: cluster-network
spec:
  group: networking.insula.host
  scope: Cluster
  names:
    plural: clusterfirewallblacklists
    singular: clusterfirewallblacklist
    kind: ClusterFirewallBlacklist
    shortNames:
      - cfb
      - blacklist
    categories:
      - hosting-platform
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - cidr
              properties:
                cidr:
                  type: string
                  description: |
                    Source range to DROP. Accepts bare IPv4/IPv6 (→ /32
                    or /128 implied) or CIDR. The pattern bounds the v4
                    prefix 8..32 and v6 prefix 16..128 — wider prefixes
                    (a /0 allow-all-the-internet ban, or an accidental
                    /1) are rejected at admission. The reconciler does
                    authoritative net/netip validation + self-protect
                    intersection checks on top.
                  pattern: '^(([0-9]{1,3}\.){3}[0-9]{1,3}(/([89]|[12][0-9]|3[0-2]))?|[0-9a-fA-F:]+(/(1[6-9]|[2-9][0-9]|1[01][0-9]|12[0-8]))?)$'
                  maxLength: 64
                  x-kubernetes-validations:
                    - rule: "!self.endsWith('/0')"
                      message: "CIDR /0 (ban-the-internet) is not permitted."
                description:
                  type: string
                  description: 'Operator-readable reason. e.g. "SSH brute-force from VPS farm", "repeated WAF 930120 hits".'
                  maxLength: 200
                addedBy:
                  type: string
                  description: 'Subject (user email or system actor) that created this entry. Set by the platform-api on POST.'
                  maxLength: 200
                source:
                  type: string
                  description: 'How the entry was created — "manual" or "fail2ban-promote" (from the SSH Lockdown modal).'
                  enum:
                    - manual
                    - fail2ban-promote
            status:
              type: object
              properties:
                normalizedCidr:
                  type: string
                  maxLength: 64
                family:
                  type: string
                  enum:
                    - v4
                    - v6
                lastSyncedAt:
                  type: string
                  format: date-time
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys:
                    - type
                  items:
                    type: object
                    required:
                      - type
                      - status
                    properties:
                      type:
                        type: string
                        maxLength: 64
                      status:
                        type: string
                        enum:
                          - 'True'
                          - 'False'
                          - Unknown
                      reason:
                        type: string
                        maxLength: 128
                      message:
                        type: string
                        maxLength: 1024
                      lastTransitionTime:
                        type: string
                        format: date-time
      additionalPrinterColumns:
        - name: CIDR
          type: string
          jsonPath: .spec.cidr
        - name: Family
          type: string
          jsonPath: .status.family
        - name: Reason
          type: string
          jsonPath: .spec.description
          priority: 1
        - name: Synced
          type: date
          jsonPath: .status.lastSyncedAt
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
