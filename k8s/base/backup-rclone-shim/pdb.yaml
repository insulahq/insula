# PodDisruptionBudget. maxUnavailable=1 means a voluntary disruption
# (node drain, DaemonSet rolling update) walks one pod at a time.
# On HA-3 control-plane clusters this means at most one node loses
# its shim at any given moment — backups on the other nodes continue
# unimpaired.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backup-rclone-shim
  namespace: platform
  labels:
    app: backup-rclone-shim
    app.kubernetes.io/part-of: hosting-platform
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: backup-rclone-shim
