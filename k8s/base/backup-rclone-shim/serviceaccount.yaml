# Minimal ServiceAccount for the shim DaemonSet. The shim itself does
# NOT need k8s API access — its only inputs are the mounted ConfigMap +
# Secret. We mint a dedicated SA (instead of `default`) so we can drop
# all auto-mounted API access via `automountServiceAccountToken: false`
# in the Pod template.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup-rclone-shim
  namespace: platform
  labels:
    app: backup-rclone-shim
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: backup
automountServiceAccountToken: false
