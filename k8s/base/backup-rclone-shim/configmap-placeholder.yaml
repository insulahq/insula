# Initial ConfigMap with launcher.sh.
#
# R-X20 — always-combined rclone-serve-s3 architecture (2026-05-21):
#   - One `rclone serve s3` per pod, ALWAYS in `combined:` mode
#   - The full rclone.conf is rendered by platform-api in TypeScript
#     (rclone-config.ts) with passwords obscured via the canonical
#     rclone AES-CTR — stored in the credentials Secret at
#     /etc/rclone-credentials/rclone.conf
#   - The launcher just sources shim creds from upstream.env, then
#     execs rclone serve s3 against `combined:`. No per-protocol
#     dispatch logic — the [combined] section in rclone.conf encodes
#     all routing.
#   - All upstream protocols (S3 / SFTP / SMB) supported uniformly.
#     Each class can target a different backup_configurations row;
#     the renderer emits N per-target sections + N class aliases.
#   - Pod runs fully unprivileged: runAsUser:65534, drop:[ALL] caps.
#     No FUSE, no kernel mounts, no CAP_SYS_ADMIN, no /dev/fuse.
#
# Memory tuning (v3-tuned per 2026-05-21 bench, holds for R-X20):
#   - GOGC=20 + GOMEMLIMIT=200MiB (aggressive Go GC + soft cap)
#   - --s3-disable-http2 (HTTP/1.1 = parallel TCP, no HoL blocking)
#   - --s3-upload-concurrency 3 (upstream is the bottleneck; ~15 MiB
#     in-flight buffer per stream is the memory price for parallelism)
#   - --buffer-size 2M (smaller per-file read buffer)
#   - --s3-memory-pool-flush-time 30s (idle pool returns memory faster)
#
# Owned at runtime by platform-api's backup-rclone-shim/reconciler.ts:
# operator assigns a target to a class → reconciler MERGE-patches
# `data.classes.txt` here + writes `data.upstream.env` and
# `data.rclone.conf` into the Secret + bumps DaemonSet annotation
# hash → rolling restart.
apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-rclone-shim-config
  namespace: platform
  labels:
    app: backup-rclone-shim
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: backup
  annotations:
    insula.host/managed-by: backup-rclone-shim/config-renderer
    # Flux must use merge-patch (not full SSA) on this ConfigMap so
    # `data.classes.txt` isn't reset to "" each tick when the
    # reconciler has populated it. Without this annotation, every Flux
    # reconcile wipes the runtime state.
    kustomize.toolkit.fluxcd.io/ssa: merge
data:
  # classes.txt is INTENTIONALLY ABSENT here so Flux doesn't claim
  # ownership of the field. The reconciler creates + maintains it
  # with one line per bound class (system, tenant, mail).

  # The shim's entrypoint. Reads classes.txt + upstream.env + the
  # rendered rclone.conf; if any is missing / empty, sleeps so the pod
  # stays Ready=false (Service routes nothing to it; clients get
  # connection-refused).
  launcher.sh: |
    #!/bin/sh
    set -eu

    UPSTREAM_ENV=/etc/rclone-credentials/upstream.env
    RCLONE_CONF=/etc/rclone-credentials/rclone.conf
    CLASSES_FILE=/etc/rclone-static/classes.txt
    ADDR=":9000"

    log() { printf '[backup-rclone-shim] %s\n' "$*" >&2; }

    # ─── Pre-flight: env file + rclone.conf + classes.txt must exist ─
    if [ ! -f "$UPSTREAM_ENV" ]; then
      log "$UPSTREAM_ENV missing — reconciler has not rendered yet."
      while :; do sleep 30; done
    fi
    if [ ! -f "$RCLONE_CONF" ]; then
      log "$RCLONE_CONF missing — reconciler has not rendered yet."
      while :; do sleep 30; done
    fi
    # Validate that the conf has actual content (a [combined] section).
    # A comment-only placeholder would let the launcher proceed to
    # `rclone serve s3 combined:` which would fail-fast (remote not
    # found), crashlooping the pod. Sleep on partial-materialise.
    if ! grep -q '^\[combined\]' "$RCLONE_CONF"; then
      log "$RCLONE_CONF has no [combined] section — partial materialise. Sleeping."
      while :; do sleep 30; done
    fi
    if [ ! -s "$CLASSES_FILE" ]; then
      log "$CLASSES_FILE empty — no class-target assignments."
      while :; do sleep 30; done
    fi

    # ─── Validate classes.txt against strict allowlist ────────────────
    # Each line must be exactly one of: system / tenant / mail.
    # Defends against:
    #   - shell-meta injection (`; rm -rf /`, $(curl ...), backticks)
    #   - argument injection (`--config /tmp/evil`, extra flags)
    #   - IFS / whitespace pathology
    CLASSES_OK=""
    LINE=""
    while IFS= read -r LINE || [ -n "$LINE" ]; do
      LINE=$(printf '%s' "$LINE" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
      [ -z "$LINE" ] && continue
      case "$LINE" in
        system|tenant|mail) ;;
        *) log "FATAL: classes.txt contains invalid class: '$LINE'"; exit 2 ;;
      esac
      # Flux postBuild substituteFrom escape: `$$` keeps literal `$`
      # past envsubst.
      CLASSES_OK="$${CLASSES_OK}$${LINE} "
    done < "$CLASSES_FILE"
    if [ -z "$CLASSES_OK" ]; then
      log "$CLASSES_FILE present but yielded zero valid classes — sleeping."
      while :; do sleep 30; done
    fi

    # ─── Load shim creds from env file (HKDF-derived ROOT_*) ──────────
    # upstream.env carries only ROOT_ACCESS_KEY + ROOT_SECRET_KEY now —
    # all upstream credentials live in rclone.conf, rendered by the
    # platform-api with passwords obscured at render time.
    set -a
    . "$UPSTREAM_ENV"
    set +a

    if [ -z "$${ROOT_ACCESS_KEY:-}" ] || [ -z "$${ROOT_SECRET_KEY:-}" ]; then
      log "FATAL: ROOT_ACCESS_KEY / ROOT_SECRET_KEY missing from upstream.env"
      while :; do sleep 30; done
    fi

    log "shim launcher: classes='$${CLASSES_OK}' rendering rclone.conf-driven combined: remote"

    # ─── Go runtime memory tuning ─────────────────────────────────────
    # GOMEMLIMIT is a SOFT cap — Go will exceed it but trigger more
    # frequent GC. The pod's memory limit is the hard ceiling. The
    # combined remote with N upstreams adds ~50 MiB per additional
    # upstream type to RSS; the soft cap accommodates 2-3 upstreams
    # before the pod limit becomes the constraint.
    export GOGC="$${GOGC:-20}"
    export GOMEMLIMIT="$${GOMEMLIMIT:-200MiB}"
    export HOME=/tmp

    # ─── VFS cache dir (only used when --vfs-cache-mode != off) ───────
    # Mounted at /var/cache/rclone-shim from the daemonset's
    # rclone-cache emptyDir volume. SFTP/SMB upstreams need writes
    # cached locally; S3 upstreams pass through directly.
    CACHE_DIR=/var/cache/rclone-shim
    mkdir -p "$CACHE_DIR"

    # ─── exec rclone serve s3 against combined: ──────────────────────
    # rclone serves the `combined:` remote — clients see N buckets
    # (one per bound class) and writes route to the per-class upstream
    # backend (S3/SFTP/SMB) via the [combined] section's `upstreams =`
    # mapping.
    #
    # --vfs-cache-mode writes is needed because the combined: root may
    # include POSIX-backed (SFTP/SMB) upstreams. For S3-only operators,
    # the cache is effectively unused (vfs-write-back 0s flushes
    # immediately; cache files are evicted within seconds).
    log "launching rclone serve s3 combined:"
    exec rclone serve s3 \
      --config "$RCLONE_CONF" \
      --addr "$ADDR" \
      --auth-key "$${ROOT_ACCESS_KEY},$${ROOT_SECRET_KEY}" \
      --vfs-cache-mode writes \
      --vfs-cache-max-size 512M \
      --vfs-cache-max-age 24h \
      --vfs-cache-poll-interval 1m \
      --vfs-write-back 0s \
      --vfs-read-ahead 0 \
      --buffer-size 2M \
      --no-modtime \
      --no-checksum \
      --s3-chunk-size 5M \
      --s3-upload-concurrency 3 \
      --s3-memory-pool-flush-time 30s \
      --s3-disable-http2 \
      --cache-dir "$CACHE_DIR" \
      --log-level NOTICE \
      combined:
