# Stalwart RocksDB backup CronJob — uses restic to back up the raw data directory.
#
# WHY direct restic rather than `stalwart -e`:
#   `stalwart -e` opens the RocksDB database, which:
#   (a) requires write access (RocksDB writes LOG.old on open even read-only), and
#   (b) would conflict with the LOCK file held by the live Stalwart process.
#   Restic reads the SST files + WAL at the filesystem level — no DB open needed.
#   RocksDB's WAL replay on restore handles partial-write state, identical to
#   crash recovery, so this produces a consistent backup.
#
# UPLOAD FLOW:
#   Single container runs snapshot-upload.sh which:
#   1. Exits 0 if RESTIC_REPOSITORY is not configured (upload is optional).
#   2. Runs `restic backup /var/lib/stalwart/data` with `--exclude LOCK`.
#   3. Runs `restic forget --keep-last 48 --prune` to limit repo growth.
#   4. Reports totalSnapshotSizeBytes + snapshotCount to the platform API.
#
# RESTORE FLOW:
#   The restore-state initContainer in deployment.yaml checks for the
#   CURRENT sentinel file. When absent, the restic Secret is present,
#   and allow-restore annotation is "true", it runs `restic restore
#   latest --target /restore-tmp` then copies the files into place.
#   The backup path /var/lib/stalwart/data is preserved in the snapshot,
#   so restored files land at /restore-tmp/var/lib/stalwart/data/.
#
# NODE AFFINITY:
#   preferredDuringScheduling inter-pod affinity on
#   app.kubernetes.io/component=stalwart places this Job on the same node
#   as the Stalwart pod. The local-path PVC (stalwart-rocksdb-data) is
#   node-local, so the Job must land on the correct node to mount it.
#   preferred (not required) so the Job is not blocked when Stalwart is down.
#
# FLUX postBuild NOTE:
#   All $$ in inline shell are Flux-postBuild-escaped ($$VAR → $VAR after
#   Flux render). Do NOT change to single $ — Flux would substitute them.
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: stalwart-snapshot
  namespace: mail
  labels:
    app.kubernetes.io/component: stalwart-snapshot
  annotations:
    # backup-coverage: excluded:cluster-infrastructure
    ttlSecondsAfterFinished: "3600"
    # 2026-06-10 (re-verified live on a v1.8.5 kustomize-controller):
    # the previous value `IgnoreConflicts` is NOT a valid ssa policy —
    # Flux's documented set is Override | Merge | IfNotPresent | Ignore,
    # and an unknown value silently falls back to Override, which is
    # exactly the "Flux steals spec.schedule back every reconcile"
    # behaviour this annotation was supposed to prevent (the 2026-05-29
    # "E2E confirmed" claim was a false positive). `Merge` is the
    # strongest valid policy here, but per the Flux docs fields present
    # in the manifest STILL override under Merge — and spec.schedule is
    # REQUIRED on create, so it cannot be removed from the manifest
    # (a schedule-less apply pins the platform Kustomization at
    # Ready=False on fresh bootstrap; see the /spec/suspend strip in
    # bootstrap.sh for the field that CAN be removed).
    #
    # The operative contract is therefore EVENTUAL consistency:
    # every Flux reconcile reverts spec.schedule to the manifest
    # default below, and the 5-minute snapshot-cronjob scheduler
    # (snapshot-cronjob-scheduler.ts) re-asserts the operator value
    # from backup_schedules.mail.cron_expression. Operator overrides
    # win within ≤5 min of any Flux pass. A structural fix (moving
    # schedule fully out of Flux's apply) needs a create-vs-update
    # split and is tracked as a roadmap follow-up.
    kustomize.toolkit.fluxcd.io/ssa: Merge
spec:
  # Default cadence 30min — Flux re-asserts this on every reconcile;
  # operator overrides (PATCH /admin/backups/schedules/mail, SSA-owned
  # by platform-api.snapshot-settings) are re-applied within ≤5 min by
  # the snapshot-cronjob scheduler. See the annotation comment above.
  schedule: "*/30 * * * *"
  # Ships SUSPENDED. A restic backup with no target is pointless churn —
  # the mail-snapshot reconciler (snapshot-cronjob-reconciler.ts) flips
  # suspend=false only once a mail backup target is configured
  # (system_settings.mail_snapshot_backup_store_id). Flux strips
  # /spec/suspend so it never re-suspends an operator-enabled job.
  suspend: true
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/component: stalwart-snapshot
        spec:
          restartPolicy: Never
          serviceAccountName: default
          securityContext:
            runAsNonRoot: false
          affinity:
            podAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/component: stalwart
                    topologyKey: kubernetes.io/hostname
                    namespaces:
                      - mail
          containers:
            - name: upload
              image: ghcr.io/insulahq/insula/mail-backup-tools:latest # {"$imagepolicy": "flux-system:mail-backup-tools"}
              imagePullPolicy: Always
              command: ["/usr/local/bin/snapshot-upload.sh"]
              envFrom:
                - secretRef:
                    name: stalwart-snapshot-restic-repo
                    optional: true
                # Retention policy comes from a ConfigMap that the
                # platform-api applyMailSnapshotRetention reconciler
                # owns + updates on every backup_schedules[mail] write.
                # ConfigMap is intentionally NOT part of the Flux kustomize
                # tree — if Flux owned it, every reconcile cycle would
                # revert the operator's retention to manifest defaults
                # (caught 2026-05-27 — strategic-merge patch on the
                # CronJob env array got overwritten by kustomize-controller).
                # optional:true so a fresh cluster without the ConfigMap
                # falls back to snapshot-upload.sh's --keep-last 48 default.
                - configMapRef:
                    name: mail-snapshot-retention
                    optional: true
              env:
                - name: PLATFORM_API_URL
                  value: "http://platform-api.platform.svc.cluster.local:3000"
                - name: PLATFORM_API_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: platform-api-sa-token
                      key: token
                      optional: true
              volumeMounts:
                # A2.5 (2026-05-25): mount the consolidated mail-stack
                # PVC root (no subPath) so both stalwart/ + bulwark/
                # subtrees end up in the same restic snapshot. The
                # snapshot-upload.sh script reads DATA_DIR=/var/lib/mail-stack
                # by default, with a legacy fallback to /var/lib/stalwart/data
                # for pre-A2.5 clusters.
                - name: stalwart-data
                  mountPath: /var/lib/mail-stack
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
          volumes:
            - name: stalwart-data
              persistentVolumeClaim:
                # A2.5 (2026-05-25): consolidated PVC.
                claimName: mail-stack-data
