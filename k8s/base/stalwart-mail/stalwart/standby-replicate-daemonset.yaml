# mail-stack-standby-replicate DaemonSet.
#
# Pre-stages the latest mail data on standby-labelled nodes every
# 5 minutes so failover can promote a node WITHOUT paying any
# restore latency at takeover time.
#
# A5 (2026-05-25): switched from restic-restore to rsync-pull from
# the in-cluster mail-stack-rsyncd Service (sidecar on the active
# stalwart-mail Pod). Failover now works WITHOUT restic. Restic
# remains an independent optional offsite-backup CronJob, decoupled
# from the failover hot path.
#
# WHY DaemonSet (not CronJob — original A3 design corrected mid-flight):
#   A single CronJob fires one Pod per tick, kube-scheduler picks ONE
#   of the N labelled nodes. The other (N-1) standby nodes' data
#   would fall behind unpredictably. A DaemonSet runs one Pod PER
#   labelled node, so EVERY standby refreshes on its OWN cadence.
#
# Node selection: any node with label
#   platform.phoenix-host.net/mail-standby=true
# Set by platform-api's ensureMailStackPlacementApplied reconciler.
# A4 wired the failover hot-path to consume `/var/lib/mail-stack-standby/`
# via the FAST PATH restore-state init containers on stalwart-mail +
# bulwark Deployments.
#
# Failure mode: the script (standby-replicate.sh) always returns 0
# from its inner run_once() function. The outer loop sleeps then
# retries, so transient rsync failures roll up as one stale generation
# rather than a Pod restart storm. The .standby-complete sentinel is
# cleared at iteration start + re-written only on rsync success, so
# failover readers never see a partial generation.
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: mail-stack-standby-replicate
  namespace: mail
  labels:
    app: mail-stack-standby-replicate
    app.kubernetes.io/component: mail-stack-standby-replicate
    app.kubernetes.io/part-of: hosting-platform
spec:
  selector:
    matchLabels:
      app: mail-stack-standby-replicate
  template:
    metadata:
      labels:
        app: mail-stack-standby-replicate
        app.kubernetes.io/component: mail-stack-standby-replicate
        app.kubernetes.io/part-of: hosting-platform
    spec:
      # Only run on standby-labelled nodes. With no candidate, the
      # DaemonSet schedules zero pods — that's the correct quiescent
      # state when HA hasn't been configured.
      nodeSelector:
        platform.phoenix-host.net/mail-standby: "true"
      tolerations:
        - key: platform.phoenix-host.net/server-only
          operator: Equal
          value: "true"
          effect: NoSchedule
      terminationGracePeriodSeconds: 10
      # A5 (2026-05-25): switched from restic-restore to rsync-pull
      # from the in-cluster mail-stack-rsyncd Service. restic Secret
      # envFrom removed — failover now works WITHOUT restic. Restic
      # remains an independent optional offsite-backup CronJob.
      containers:
        - name: replicate
          image: ghcr.io/phoenixtechnam/hosting-platform/mail-backup-tools:latest # {"$imagepolicy": "flux-system:mail-backup-tools"}
          imagePullPolicy: Always
          command: ["/usr/local/bin/standby-replicate.sh"]
          env:
            - name: LOOP_INTERVAL_SECONDS
              # 300 = 5 min cadence. Matches the user-chosen RPO.
              value: "300"
            - name: PUBLISHER_RSYNC_URL
              # rsyncd sidecar on the active stalwart-mail Pod. Service
              # endpoint follows the active node on every failover via
              # selector match on app=stalwart-mail.
              value: "rsync://mail-stack-rsyncd.mail.svc.cluster.local/mail-stack/"
            - name: PLATFORM_API_URL
              value: "http://platform-api.platform.svc.cluster.local:3000"
            - name: PLATFORM_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: platform-api-sa-token
                  key: token
                  optional: true
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: standby-data
              mountPath: /standby-data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: standby-data
          hostPath:
            path: /var/lib/mail-stack-standby
            type: DirectoryOrCreate
