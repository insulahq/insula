# Stalwart 0.16 Deployment.
#
# WHY Deployment (not StatefulSet):
#   With RocksDB on a local-path PVC the pod is inherently pinned to the
#   node that owns the PVC. A Deployment still enables proper rolling
#   updates — maxSurge=0/maxUnavailable=1 kills the old pod first, then
#   the new pod binds the same PVC on the same node.
#
# CONFIG (direct ConfigMap mount):
#   RocksDB config.json is static — no PG credentials, no env-var
#   substitution. The ConfigMap is mounted DIRECTLY at /etc/stalwart.
#   No initContainer needed for config rendering.
#
# BOOTSTRAP FLOW:
#   On first deploy the RocksDB data directory is empty. The restore-state
#   initContainer checks for /var/lib/stalwart/data/CURRENT (RocksDB
#   sentinel). If absent AND stalwart-snapshot-restic-repo is configured,
#   it downloads the latest snapshot via restic restore and copies the
#   raw RocksDB files into place. Otherwise Stalwart starts with an empty DataStore.
#   STALWART_RECOVERY_ADMIN env var provides a temporary HTTP-Basic
#   credential so stalwart-cli can POST the bootstrap plan before any
#   permanent admin exists.
#
# RELOADER:
#   Stakater Reloader rolls the Deployment when stalwart-config
#   ConfigMap or stalwart-admin-creds or stalwart-snapshot-restic-repo
#   Secret changes.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stalwart-mail
  namespace: mail
  labels:
    app: stalwart-mail
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: mail-server
  annotations:
    # Stakater Reloader: roll on config or credentials change.
    # stalwart-snapshot-restic-repo: rolling on backup-target change
    # ensures restore-state on next pod start picks up new credentials.
    configmap.reloader.stakater.com/reload: "stalwart-config,mail-stack-rsyncd-config"
    secret.reloader.stakater.com/reload: "stalwart-admin-creds,stalwart-snapshot-restic-repo"
    # Field-ownership note (Phase 1 streamline, 2026-05-15):
    #
    # Three fields on this Deployment are mutated at runtime by
    # platform-api and are intentionally NOT declared in this manifest:
    #   - `template.spec.containers[stalwart].ports[*].hostPort`
    #       owned by `platform-api.port-exposure` — toggled when
    #       switching between thisNodeOnly / allServerNodes modes.
    #   - `template.spec.affinity.nodeAffinity`
    #       owned by `platform-api.migration` — set on every migration
    #       to pin the pod to the target node.
    #   - `metadata.annotations[mail.platform/allow-restore]`
    #       owned by `platform-api.migration` — set during migration to
    #       trigger the `restore-state` initContainer.
    #
    # Because none of these are in the manifest, Flux's non-force SSA
    # reconcile never includes them in its apply body — no conflict, no
    # revert. The `kustomize.toolkit.fluxcd.io/ssa: merge` annotation
    # that used to live here was REMOVED on 2026-05-15: testing showed
    # the annotation's actual effect is "force-conflicts=true regardless
    # of Kustomization.spec.force", which IS the opposite of its name.
spec:
  # Rolling-update strategy: kill the old pod BEFORE scheduling the new
  # one. Stalwart binds 6 hostPorts (25/465/587/143/993/4190); k8s default
  # `RollingUpdate{maxSurge:1,maxUnavailable:0}` would schedule the new
  # pod first — on a single-node cluster it stays Pending forever because
  # the old pod still owns the hostPorts, classic deadlock. On multi-node
  # HA, this still rolls one pod at a time (replicas-1 keep serving SMTP
  # / IMAP). Recreate strategy would briefly drop *all* replicas and is
  # rejected for that reason. See project_testing_bootstrap_2026_05_08.md.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  # stalwart-rocksdb-ha (2026-05-12): replicas pinned to 1 because
  # the RocksDB DataStore lives on a local-path PVC (ReadWriteOnce,
  # node-local). Multiple replicas would leave additional pods Pending
  # with Multi-Attach errors. DR is handled via snapshot+restore
  # migration (see backend/src/modules/mail-admin/migration.ts) +
  # auto-failover (dr-watcher.ts), not via replica count.
  # stalwart-mail was removed from STATELESS_DEPLOYMENTS in the
  # platform-storage-policy reconciler so HA toggle no longer touches it.
  replicas: 1
  selector:
    matchLabels:
      app: stalwart-mail
  template:
    metadata:
      labels:
        app: stalwart-mail
        app.kubernetes.io/part-of: hosting-platform
        app.kubernetes.io/component: stalwart
      annotations:
        # Declarative hostPort manifest read by firewall-reconciler:
        # each port listed here is added to the host's nft `tenant_ports_tcp`
        # set when this pod is scheduled onto that node, and removed when
        # it leaves. Static bootstrap.sh rules already accept these
        # ports unconditionally (lines 877-884) so this annotation is
        # belt-and-suspenders, but it keeps the runtime-firewall view of
        # the cluster consistent.
        insula.host/firewall-tcp-ports: "25,465,587,143,993,4190"
    spec:
      terminationGracePeriodSeconds: 300
      # Spread Stalwart pods one-per-node so any node IP that lands
      # external mail traffic has a local pod to receive it. Combined
      # with hostPort=containerPort below, traffic to <any-node>:25/587/etc
      # is bound directly by the local Stalwart process — no kube-proxy
      # DNAT round-trip across nodes (which can't work for hostPort anyway).
      #
      # DoNotSchedule (changed from ScheduleAnyway 2026-05-07): the
      # hostPort binding makes ScheduleAnyway strictly worse here. With
      # ScheduleAnyway + replicas=3 on a 2-node cluster, K8s places two
      # pods on one node — the second pod's hostPort=25/etc bind
      # collides with the first and the pod CrashLoopBackOffs. With
      # DoNotSchedule, the orphan pod stays Pending (visible alarm)
      # until a third node returns. Apply HA scaling 1↔3 still works:
      # K8s schedules as many pods as fit, the rest sit Pending — no
      # deadlock, just a transparent under-scaled service. On a fully
      # populated 3-node cluster, behavior is identical to ScheduleAnyway.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: stalwart-mail
      securityContext:
        runAsNonRoot: false  # Stalwart 0.16 binds port 25 — needs root or CAP_NET_BIND_SERVICE
      initContainers:
        # protect-from-silent-data-loss (2026-05-28): refuse to start
        # Stalwart with an empty PVC when the platform DB still
        # references Stalwart-side principal IDs. Without this guard,
        # a fresh-PVC + allow-restore=false combination silently boots
        # Stalwart with NO accounts → tenant Domains, mailboxes, DKIM
        # keys all orphaned with no warning. This has happened TWICE in
        # dev (2026-05-25 + 2026-05-28).
        #
        # The guard queries platform-api's
        # /internal/mail/stalwart-data-expectation endpoint (anonymous
        # — no sensitive data, network-policy-gated) and compares
        # `expectedPrincipals` to the PVC inventory. If DB says we have
        # mailboxes but PVC is empty, refuse with a clear operator
        # message + remediation instructions.
        #
        # Fail-OPEN on platform-api unreachable: better to allow a
        # legitimate fresh-start than to brick the cluster on a
        # transient backend outage. The case we're catching here is
        # the DELIBERATE-looking-but-actually-accidental wipe.
        - name: protect-from-silent-data-loss
          image: curlimages/curl:8.10.1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -e
              ALLOW_RESTORE=$$(cat /podinfo/allow-restore 2>/dev/null || echo "false")
              ALLOW_FRESH_START=$$(cat /podinfo/allow-fresh-start 2>/dev/null || echo "false")
              if [ "$$ALLOW_RESTORE" = "true" ] || [ "$$ALLOW_FRESH_START" = "true" ]; then
                echo "protect-from-silent-data-loss: override annotation set — bypassing guard"
                exit 0
              fi
              # 2026-05-29 fix: the volumeMount uses subPath=stalwart so
              # /var/lib/stalwart/data IS the RocksDB DataStore directory
              # (not the consolidated PVC root which also hosts bulwark/).
              # The canonical "RocksDB exists" sentinel is the CURRENT
              # MANIFEST file; check it directly. Previous logic counted
              # entries at the PVC root without subPath and saw exactly
              # 2 dirs (bulwark+stalwart) on every healthy install — so
              # the >2 threshold mis-fired and bricked staging1 with
              # CrashLoopBackOff even though the DataStore was intact.
              if [ -f /var/lib/stalwart/data/CURRENT ]; then
                echo "protect-from-silent-data-loss: RocksDB CURRENT MANIFEST present — DataStore exists, skip check"
                exit 0
              fi
              # Belt-and-braces: any *.sst file also implies a real
              # DataStore (CURRENT may be momentarily absent during a
              # RocksDB recovery flush).
              if ls /var/lib/stalwart/data/*.sst >/dev/null 2>&1; then
                echo "protect-from-silent-data-loss: SST files present — DataStore exists, skip check"
                exit 0
              fi
              # PVC empty + no override. Check if DB has expected data.
              # Fail-open on backend unreachable (10s timeout) — bricking
              # the cluster on platform-api outage is worse than allowing
              # the accidental wipe we're guarding against.
              URL="http://platform-api.platform.svc.cluster.local:3000/api/v1/internal/mail/stalwart-data-expectation"
              echo "protect-from-silent-data-loss: empty PVC + no override — querying $$URL"
              RESP=$$(curl -sS --max-time 10 "$$URL" 2>/dev/null || echo "")
              if [ -z "$$RESP" ]; then
                echo "protect-from-silent-data-loss: WARNING — platform-api unreachable; allowing fresh-start (fail-open). Drift will be detected later by stalwart-principals-sync."
                exit 0
              fi
              # JSON parsing without jq: grep + sed. Response shape:
              # {"data":{"expectedPrincipals":N,"expectedDomains":M}}
              EXPECTED=$$(echo "$$RESP" | sed -n 's/.*"expectedPrincipals":[[:space:]]*\([0-9]*\).*/\1/p')
              EXPECTED=$${EXPECTED:-0}
              if [ "$$EXPECTED" -le 0 ]; then
                echo "protect-from-silent-data-loss: DB has 0 Stalwart-linked mailboxes — fresh-start safe"
                exit 0
              fi
              echo ""
              echo "═════════════════════════════════════════════════════════════════════════"
              echo "  REFUSING TO FRESH-START — TENANT ACCOUNTS WOULD BE LOST"
              echo ""
              echo "  Platform DB references $$EXPECTED mailbox principal(s), but the"
              echo "  Stalwart PVC at /var/lib/stalwart/data is empty."
              echo ""
              echo "  A fresh start here would PERMANENTLY orphan every mailbox + tenant"
              echo "  Domain. This guard exists because the same silent-loss event has"
              echo "  happened TWICE in dev (2026-05-25 + 2026-05-28)."
              echo ""
              echo "  TO RESTORE FROM RESTIC (recommended):"
              echo "    kubectl patch deploy -n mail stalwart-mail --type=merge -p \\\\"
              echo '      '"'"'{"spec":{"template":{"metadata":{"annotations":{"mail.platform/allow-restore":"true"}}}}}'"'"
              echo ""
              echo "  TO DELIBERATELY ACCEPT THE LOSS (e.g., greenfield install):"
              echo "    kubectl patch deploy -n mail stalwart-mail --type=merge -p \\\\"
              echo '      '"'"'{"spec":{"template":{"metadata":{"annotations":{"mail.platform/allow-fresh-start":"true"}}}}}'"'"
              echo ""
              echo "  Then scale the Deployment back up."
              echo "═════════════════════════════════════════════════════════════════════════"
              echo ""
              exit 1
          volumeMounts:
            - name: stalwart-data
              mountPath: /var/lib/stalwart/data
              # 2026-05-29 fix: subPath:stalwart matches the main container
              # and restore-state init. Without subPath, this container
              # sees the consolidated PVC root (bulwark/+stalwart/) and
              # the entry-count heuristic mis-fires on every healthy
              # install — bricking the pod with the "REFUSING TO FRESH
              # START" CrashLoop even though the DataStore is intact.
              subPath: stalwart
            - name: pod-annotations
              mountPath: /podinfo
        # restore-state: download + import the latest Stalwart DataStore
        # snapshot when the RocksDB data directory is empty AND the
        # stalwart-snapshot-restic-repo Secret is configured.
        #
        # SENTINEL CHECK: /var/lib/stalwart/data/CURRENT is the RocksDB
        #   MANIFEST file — its presence means a valid DataStore exists.
        #   If it exists, the restore is skipped unconditionally.
        #
        # RESTIC RESTORE: if RESTIC_REPOSITORY is set (from the
        #   stalwart-snapshot-restic-repo Secret), we restore the latest
        #   snapshot to /restore-tmp, then run `stalwart -i` to import it.
        #
        # EXIT POLICY:
        #   - Cold-start (allow-restore=false): exit 0 even when restic
        #     fails — operator hasn't authorised a restore, fresh-start
        #     is intentional for new clusters and lets the pod come up.
        #   - Restore-required (allow-restore=true OR FAST PATH path):
        #     exit 1 if all restore attempts fail. CrashLoopBackOff is
        #     CORRECT here: silent data loss is much worse than mail
        #     downtime, and the operator needs to fix the backup target
        #     (or accept data loss by clearing the allow-restore
        #     annotation manually) before Stalwart should start.
        #
        # 2026-05-27 (post-staging-tenant-domain-loss investigation):
        #   The original "ALWAYS exit 0" policy was the root cause of the
        #   2026-05-25 19:23 silent data-loss on staging. Single-attempt
        #   `restic restore` with no preflight + always-exit-0 meant any
        #   transient network blip during a failover wiped tenant data
        #   while the migration state machine happily marked state=done.
        #   See migration.ts:verifyRestoreContent for the corresponding
        #   post-condition check that catches drift if this path is ever
        #   bypassed.
        #
        # $$ ESCAPING: all shell variables use $$ (double-dollar) to
        #   survive Flux postBuild substituteFrom rendering. Flux collapses
        #   $$VAR → $VAR before applying the manifest; sh then expands.
        - name: restore-state
          image: ghcr.io/insulahq/insula/mail-backup-tools:latest # {"$imagepolicy": "flux-system:mail-backup-tools"}
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              set -e
              SENTINEL=/var/lib/stalwart/data/CURRENT
              APPLIED_MARKER=/var/lib/stalwart/data/.restore-applied-at
              ALLOW_RESTORE=$$(cat /podinfo/allow-restore 2>/dev/null || echo "false")
              # Diagnostic dump (2026-05-27): the downwardAPI propagation
              # has bitten us a few times — print what we actually see in
              # /podinfo so post-mortems don't require pod-still-alive logs.
              echo "restore-state DIAG: /podinfo contents:"
              for f in /podinfo/*; do
                [ -f "$$f" ] && echo "  $$f = '$$(cat "$$f")'"
              done
              echo "restore-state DIAG: PVC initial inventory:"
              ls /var/lib/stalwart/data 2>&1 | head -5
              echo "  ... ($$(ls /var/lib/stalwart/data 2>/dev/null | wc -l) entries)"
              # Per-snapshot restore (2026-05-27): the annotation may persist
              # on the pod template across many pod restarts. Make this
              # idempotent by recording the LAST applied snapshot id in a
              # sentinel inside the data dir. Restart sequence:
              #   • PRE_RESTORE_ID empty       → existing flow (FAST PATH /
              #                                  restic-latest / SENTINEL skip)
              #   • PRE_RESTORE_ID == applied  → no-op (already restored
              #                                  this id; just start Stalwart)
              #   • PRE_RESTORE_ID != applied  → wipe + restic restore <id>
              #                                  + write applied marker
              #
              # This means the migration NEVER needs to clear the
              # restore-snapshot-id annotation (which would trigger a
              # rollout churn — old pod killed, new pod created without the
              # annotation, init container short-circuits, etc.). The
              # annotation can live on the pod template forever; safety is
              # provided by the applied marker.
              PRE_RESTORE_ID=$$(cat /podinfo/restore-snapshot-id 2>/dev/null || echo "")
              APPLIED_ID=$$(cat "$$APPLIED_MARKER" 2>/dev/null | head -1 || echo "")
              if [ -n "$$PRE_RESTORE_ID" ] && [ "$$PRE_RESTORE_ID" = "$$APPLIED_ID" ]; then
                echo "restore-state: per-snapshot restore '$$PRE_RESTORE_ID' already applied on this DataStore — no-op"
                exit 0
              fi
              if [ -n "$$PRE_RESTORE_ID" ]; then
                echo "restore-state: per-snapshot restore requested (id='$$PRE_RESTORE_ID', last applied='$$APPLIED_ID') — wiping any existing DataStore before restic"
                # Remove every file + hidden file under the mount, but NOT
                # the mount itself (rm -rf /var/lib/stalwart/data would fail
                # on the mount point).
                find /var/lib/stalwart/data -mindepth 1 -delete 2>&1 || true
              elif [ -f "$$SENTINEL" ]; then
                echo "restore-state: DataStore exists — skipping restore"
                exit 0
              fi
              # A4 (2026-05-25): FAST PATH — if the standby DaemonSet
              # (A3) has pre-staged data on this node's hostPath, copy
              # from there instead of paying the restic-restore network
              # latency. Standby data is at most 5 min stale (DaemonSet
              # cadence). A failover that lands on a standby-labelled
              # node uses this path; cold-start failover to an
              # unlabelled node falls through to restic.
              #
              # FAST PATH runs BEFORE the allow-restore guard because
              # the .standby-complete marker is the local equivalent
              # of operator approval — the standby DaemonSet only
              # writes the marker after a successful restic pull, so
              # the data is already operator-vetted. Without this
              # ordering, a restore-based failover (which sets
              # mailActiveNode but does not stamp the allow-restore
              # annotation) would fresh-start with no data.
              STANDBY_STALWART=/standby-data/stalwart
              STANDBY_COMPLETE=/standby-data/.standby-complete
              # Gate on BOTH the CURRENT sentinel AND the
              # .standby-complete marker — the marker is only written
              # by the A3 DaemonSet after both stalwart+bulwark
              # subtrees finish copying, so a partial restore
              # (interrupted cp on either) is invisible here. Without
              # this gate, the init could copy a half-written tree
              # and Stalwart would crash on inconsistent RocksDB state.
              #
              # MAX-AGE GATE: the sentinel includes a date -Iseconds
              # written by standby-replicate.sh on success. Reject the
              # FAST PATH if the marker is older than 30 min (6× the
              # 5-min DaemonSet cadence). Catches the case where the
              # DaemonSet has been down for hours — better to take the
              # restic-restore latency than silently restore frozen
              # data. Honour FAST_PATH_MAX_AGE_SECONDS env override
              # (default 1800s = 30 min).
              # .standby-complete now contains epoch-seconds (since the
              # standby-replicate.sh refactor for alpine/debian
              # portability). `date +%s` works identically on both
              # BusyBox and GNU coreutils — no `date -d` parsing.
              STANDBY_MAX_AGE_SECONDS=$${FAST_PATH_MAX_AGE_SECONDS:-1800}
              standby_age_ok=true
              # Per-snapshot restore (2026-05-27): if the operator chose
              # a specific snapshot via /backups/mail, FAST PATH MUST be
              # skipped — standby data is the LIVE state, which is the
              # opposite of what the operator asked for. Detect the
              # annotation early and disable FAST PATH if present. The
              # downstream restic step honours the annotation.
              FAST_PATH_DISABLED_REASON=""
              PRE_RESTORE_ID=$$(cat /podinfo/restore-snapshot-id 2>/dev/null || echo "")
              if [ -n "$$PRE_RESTORE_ID" ]; then
                FAST_PATH_DISABLED_REASON="per-snapshot restore requested (id='$$PRE_RESTORE_ID') — FAST PATH would copy live data instead of chosen snapshot"
                standby_age_ok=false
              fi
              if [ -f "$$STANDBY_COMPLETE" ]; then
                sentinel_epoch=$$(cat "$$STANDBY_COMPLETE" 2>/dev/null | tr -dc 0-9)
                : $${sentinel_epoch:=0}
                now_epoch=$$(date +%s)
                age=$$((now_epoch - sentinel_epoch))
                if [ "$$sentinel_epoch" = "0" ] || [ "$$age" -gt "$$STANDBY_MAX_AGE_SECONDS" ]; then
                  echo "restore-state: standby marker is $${age}s old (limit $${STANDBY_MAX_AGE_SECONDS}s) — rejecting FAST PATH, falling through to restic"
                  standby_age_ok=false
                fi
              fi
              if [ -n "$$FAST_PATH_DISABLED_REASON" ]; then
                echo "restore-state: $$FAST_PATH_DISABLED_REASON"
              fi
              if [ "$$standby_age_ok" = "true" ] && [ -f "$$STANDBY_COMPLETE" ] && [ -d "$$STANDBY_STALWART" ] && [ -f "$$STANDBY_STALWART/CURRENT" ]; then
                echo "restore-state: FAST PATH — found pre-staged standby data at $$STANDBY_STALWART (complete marker present, age within limit)"
                mkdir -p /var/lib/stalwart/data
                if cp -a "$$STANDBY_STALWART/." /var/lib/stalwart/data/ 2>&1; then
                  echo "restore-state: standby-data copy complete ($(ls /var/lib/stalwart/data | wc -l) files) — skipping restic"
                  exit 0
                fi
                # FAST PATH cp failed — falling through to restic. This is
                # the failover-in-progress case: allow-restore is implicit
                # via the standby marker, so a subsequent restic failure
                # must also crash-loop (handled by RESTIC_REQUIRED below).
                echo "restore-state: standby-data copy failed — falling through to restic (RESTIC_REQUIRED=true since this is a failover landing)"
                RESTIC_REQUIRED=true
              fi
              if [ -z "$$RESTIC_REPOSITORY" ]; then
                if [ "$${RESTIC_REQUIRED:-false}" = "true" ]; then
                  echo "RESTORE-STATE-FATAL: RESTIC_REPOSITORY not set AND FAST PATH copy failed during failover — refusing to fresh-start because tenant data would be lost. Configure stalwart-snapshot-restic-repo Secret before retrying." >&2
                  exit 1
                fi
                echo "RESTORE-STATE-WARNING: RESTIC_REPOSITORY not set — Stalwart will FRESH-START with no data. Operator action required."
                echo "$$(date -Iseconds) reason=no-restic" > /var/lib/stalwart/data/.fresh-started-at
                exit 0
              fi
              if [ "$$ALLOW_RESTORE" != "true" ] && [ "$${RESTIC_REQUIRED:-false}" != "true" ]; then
                echo "RESTORE-STATE-WARNING: allow-restore annotation not set — Stalwart will FRESH-START with no data. Set mail.platform/allow-restore: \"true\" on the Deployment to enable restic restore."
                mkdir -p /var/lib/stalwart/data
                echo "$$(date -Iseconds) reason=allow-restore-not-set" > /var/lib/stalwart/data/.fresh-started-at
                exit 0
              fi
              # Per-snapshot restore (2026-05-27): if the operator triggered
              # a point-in-time restore from /backups/mail, the annotation
              # mail.platform/restore-snapshot-id holds the chosen restic
              # id. Otherwise use `latest` (the default failover path).
              # restic accepts EITHER the 8-char short id OR the 64-char
              # full id; both are whitelisted here. Anything else falls
              # back to `latest` so untrusted annotation values can never
              # reach the restic command line.
              RESTORE_ID=$$(cat /podinfo/restore-snapshot-id 2>/dev/null || echo "")
              case "$$RESTORE_ID" in
                ''|*[!0-9a-f]*) RESTORE_ID=latest ;;
                *)
                  ID_LEN=$$(printf %s "$$RESTORE_ID" | wc -c)
                  if [ "$$ID_LEN" -ne 8 ] && [ "$$ID_LEN" -ne 64 ]; then
                    RESTORE_ID=latest
                  fi
                  ;;
              esac
              echo "restore-state: empty DataStore + repo configured + (allow-restore=true OR failover-fallthrough) — restoring snapshot '$$RESTORE_ID'"
              mkdir -p /var/lib/stalwart/data /restore-tmp

              # Preflight: verify the backup target is reachable BEFORE
              # spending minutes on a restore that will time out. `restic
              # snapshots --latest 1` does a cheap LIST/HEAD on the repo
              # backend and exits in 1-5s on success or fails fast with
              # a clear error on DNS/auth/network/permission issues.
              # Without this, a misconfigured backup-target Secret manifests
              # as a confusing "restic restore failed" minutes later —
              # caught on staging 2026-05-25 19:23 (single-attempt restic
              # restore timed out, no diagnostic context).
              echo "restore-state: probing backup target reachability..."
              if ! restic snapshots --latest 1 --quiet 2>&1; then
                echo "RESTORE-STATE-FATAL: backup target unreachable (restic snapshots probe failed) — refusing to start with empty data because allow-restore=true. Check stalwart-snapshot-restic-repo Secret, BackupTarget Service, and DNS." >&2
                exit 1
              fi

              # Retry restic restore up to 3 times. Each restic invocation
              # has its own internal timeouts; a transient blip (rate
              # limit, brief outage, S3 5xx) often clears within 30s.
              # Pod-restart retries (via CrashLoopBackOff) cycle at 0/10/
              # 20/40/80/160/300s — coarse. In-container retry catches
              # the common transient case in <2 min.
              RESTORE_ATTEMPT=0
              RESTORE_OK=false
              while [ "$$RESTORE_ATTEMPT" -lt 3 ]; do
                RESTORE_ATTEMPT=$$((RESTORE_ATTEMPT + 1))
                echo "restore-state: restic restore attempt $${RESTORE_ATTEMPT}/3 (id=$$RESTORE_ID)..."
                if restic restore "$$RESTORE_ID" --target /restore-tmp 2>&1; then
                  RESTORE_OK=true
                  break
                fi
                echo "restore-state: attempt $${RESTORE_ATTEMPT} failed; cleaning /restore-tmp before retry"
                rm -rf /restore-tmp/* /restore-tmp/.* 2>/dev/null || true
                if [ "$$RESTORE_ATTEMPT" -lt 3 ]; then
                  echo "restore-state: sleeping 30s before retry..."
                  sleep 30
                fi
              done
              if [ "$$RESTORE_OK" != "true" ]; then
                echo "RESTORE-STATE-FATAL: restic restore failed after 3 attempts — refusing to fresh-start because tenant data would be silently lost. Pod will CrashLoopBackOff until operator fixes the backup target OR explicitly clears the allow-restore annotation to acknowledge data loss." >&2
                exit 1
              fi
              # Raw RocksDB backup: restic restores to /restore-tmp<original-path>.
              # A2.5 (2026-05-25): the snapshot CronJob now backs up
              # /var/lib/mail-stack/ (consolidated layout), so files land at
              # /restore-tmp/var/lib/mail-stack/stalwart/. Legacy snapshots
              # taken before A2.5 backed up /var/lib/stalwart/data — fall
              # back to that path for the ~7d retention window before all
              # retained snapshots are new-layout.
              RESTORED_NEW=/restore-tmp/var/lib/mail-stack/stalwart
              RESTORED_LEGACY=/restore-tmp/var/lib/stalwart/data
              if [ -d "$$RESTORED_NEW" ]; then
                RESTORED_DATA="$$RESTORED_NEW"
                echo "restore-state: detected NEW (post-A2.5) snapshot layout"
              elif [ -d "$$RESTORED_LEGACY" ]; then
                RESTORED_DATA="$$RESTORED_LEGACY"
                echo "restore-state: detected LEGACY (pre-A2.5) snapshot layout"
              else
                echo "RESTORE-STATE-FATAL: restic reported success but neither $$RESTORED_NEW nor $$RESTORED_LEGACY exists in restored tree — refusing to fresh-start. Snapshot is malformed; investigate the snapshot CronJob output before retrying." >&2
                exit 1
              fi
              if ! cp -a "$${RESTORED_DATA}/." /var/lib/stalwart/data/ 2>&1; then
                echo "RESTORE-STATE-FATAL: cp to /var/lib/stalwart/data failed after successful restic restore — refusing to fresh-start. Likely cause: PVC out of inodes or permission mismatch on local-path volume." >&2
                exit 1
              fi
              echo "restore-state: restore complete ($$(ls /var/lib/stalwart/data | wc -l) files)"
              # Idempotency marker: record WHICH snapshot id we just
              # restored. On the next pod restart (with the same
              # annotation still in place), this short-circuits the wipe
              # + restic at the top of the script. Empty when restic
              # restored 'latest' since 'latest' is not a stable id —
              # subsequent restarts will hit the SENTINEL skip instead.
              if [ "$$RESTORE_ID" != "latest" ]; then
                echo "$$RESTORE_ID" > /var/lib/stalwart/data/.restore-applied-at
              fi
          envFrom:
            - secretRef:
                name: stalwart-snapshot-restic-repo
                optional: true
          volumeMounts:
            - name: config
              mountPath: /etc/stalwart
              readOnly: true
            - name: stalwart-data
              mountPath: /var/lib/stalwart/data
              subPath: stalwart
            - name: pod-annotations
              mountPath: /podinfo
              readOnly: true
            # A4 (2026-05-25): mount the standby DaemonSet's hostPath
            # so the FAST PATH in restore-state can read pre-staged
            # data. The hostPath dir only exists on standby-labelled
            # nodes; the init container's `if [ -d ... ]` guard makes
            # the mount safe on other nodes (kubelet creates the empty
            # dir via DirectoryOrCreate, the guard sees no CURRENT
            # sentinel and falls through to restic).
            - name: standby-data
              mountPath: /standby-data
              readOnly: true
      containers:
        - name: stalwart
          image: docker.io/stalwartlabs/stalwart:v0.16.5
          imagePullPolicy: IfNotPresent
          # The upstream image ENTRYPOINT passes --config /etc/stalwart/config.json.
          # The ConfigMap is mounted directly at /etc/stalwart so Stalwart
          # picks up the fully-resolved config without any initContainer.
          # Mail ports — NO hostPort here. Phase 7 streamline (2026-05-14)
          # moved hostPort to a runtime-managed concern owned by
          # `platform-api.port-exposure`:
          #
          #   mode=thisNodeOnly  → platform-api SSA-applies hostPort=<port>
          #                        on every mail port (Stalwart binds the
          #                        node's external IP directly)
          #   mode=allServerNodes → platform-api SSA leaves hostPort unset
          #                        (haproxy DaemonSet on every server-node
          #                        binds the host ports + forwards to the
          #                        Stalwart Service via PROXY Protocol v2)
          #
          # The manifest must NOT declare hostPort because SSA can claim
          # fields but cannot UNSET fields owned by another manager.
          # If hostPort were here, kustomize-controller would re-claim it
          # on every reconcile (1-minute interval on staging), forcing
          # an unwanted Stalwart pod rollover and binding hostPort —
          # which conflicts with haproxy on the Stalwart-pod node in
          # allServerNodes mode. Live E2E (harness Phase C3/C4) caught
          # this on runs 2–8 before the manifest was rewritten.
          #
          # The mgmt-http (:8080) and http-acme (:80) container ports
          # remain in the manifest because they're cluster-internal —
          # no hostPort and no mode-flip needed.
          ports:
            - name: smtp
              containerPort: 25
              protocol: TCP
            - name: submissions
              containerPort: 465
              protocol: TCP
            - name: submission
              containerPort: 587
              protocol: TCP
            - name: imap
              containerPort: 143
              protocol: TCP
            - name: imaps
              containerPort: 993
              protocol: TCP
            - name: sieve
              containerPort: 4190
              protocol: TCP
            - name: mgmt-http
              containerPort: 8080
              protocol: TCP
            # HTTP listener for ACME HTTP-01 challenge responses
            # (2026-05-06 TLS-bootstrap rewrite). Cluster-internal —
            # no hostPort, no externalIPs. Traffic flows: LE →
            # Traefik `web` entrypoint :80 → ingress-acme.yaml
            # IngressRoute (path-prefix /.well-known/acme-challenge/*)
            # → this Service:80 → this pod:80 → Stalwart's `http-acme`
            # NetworkListener (configured in bootstrap-plan-cm.yaml).
            - name: http-acme
              containerPort: 80
              protocol: TCP
          env:
            # STALWART_RECOVERY_ADMIN provides a temporary HTTP-Basic credential
            # ("admin:<password>") so stalwart-cli can authenticate before the
            # permanent admin account is created via the bootstrap plan.
            # bootstrap.sh writes this value (format "admin:<recoveryPassword>")
            # into stalwart-admin-creds Secret key "recoveryAdmin" before applying
            # the overlay.  Optional so the Deployment can be applied before that
            # Secret exists (bootstrap.sh creates it during the bootstrap flow).
            - name: STALWART_RECOVERY_ADMIN
              valueFrom:
                secretKeyRef:
                  name: stalwart-admin-creds
                  key: recoveryAdmin
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /etc/stalwart
              readOnly: true
            - name: stalwart-data
              mountPath: /var/lib/stalwart/data
              subPath: stalwart
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              # 512Mi OOM-killed Stalwart during the 2026-06-05 20GB ingest
              # stress test (loaded RSS runs 600-850MB at 15GiB of mail).
              # Headroom per the stress report; see ADR-046 watch-items.
              memory: 1536Mi
          startupProbe:
            # exec probe: Stalwart 0.16 management API restricts remote
            # connections by default. httpGet from the kubelet comes from
            # the node's public IP (e.g. 192.0.2.56) which Stalwart
            # rejects with FIN/RST. exec runs inside the pod (127.0.0.1),
            # which Stalwart always accepts.
            exec:
              command: ["sh", "-c", "curl -sf http://127.0.0.1:8080/healthz/live"]
            # RocksDB startup is much faster than PG schema migration.
            # Keep 60*5s=300s grace for large DataStore replay on slow
            # nodes; in practice RocksDB opens in <5s.
            failureThreshold: 60
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "curl -sf http://127.0.0.1:8080/healthz/live"]
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["sh", "-c", "curl -sf http://127.0.0.1:8080/healthz/live"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
        # A5 (2026-05-25): rsyncd sidecar that serves the consolidated
        # mail-stack PVC read-only over the cluster network. Consumed
        # by the mail-stack-standby-replicate DaemonSet on standby
        # nodes for intra-cluster data replication WITHOUT requiring
        # restic / offsite backup. Consistency model is the same as
        # the legacy restic-based snapshot: filesystem-level read
        # while Stalwart is live; RocksDB's WAL replay handles any
        # partial-write state on restore. rsync's delta sync means
        # steady-state bandwidth per 5-min cycle is bounded by WAL
        # turnover, not DB size — even a multi-GB Stalwart only
        # transfers a few MB per cycle.
        - name: rsyncd
          # instrumentisto/rsync-ssh uses Alpine-versioned tags
          # (alpine3.23-r3), not upstream rsync versions (3.4.1).
          # The 3.x.x tag namespace does NOT exist on Docker Hub —
          # bootstrap test verified empty pull. Stick to the latest
          # stable Alpine tag.
          image: instrumentisto/rsync-ssh:alpine3.23-r3
          imagePullPolicy: IfNotPresent
          command: ["rsync"]
          args:
            - "--daemon"
            - "--no-detach"
            - "--config=/etc/rsyncd.conf"
            - "--port=873"
            - "--log-file=/dev/stdout"
          ports:
            - name: rsync
              containerPort: 873
              protocol: TCP
          volumeMounts:
            - name: stalwart-data
              mountPath: /data
              readOnly: true
            - name: rsyncd-config
              mountPath: /etc/rsyncd.conf
              subPath: rsyncd.conf
              readOnly: true
            # rsyncd writes its PID file to /tmp/rsyncd.pid (per the
            # rsyncd.conf). readOnlyRootFilesystem:true rejects writes
            # to the container rootfs, so /tmp needs its own emptyDir
            # otherwise rsyncd crashes with EROFS on startup
            # (code-review MUST-FIX, 2026-05-25).
            - name: rsyncd-tmp
              mountPath: /tmp
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534  # nobody
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: stalwart-config
        - name: stalwart-data
          persistentVolumeClaim:
            # A2.5 (2026-05-25): consolidated PVC. Stalwart subtree at
            # subPath=stalwart on the volumeMounts above. Legacy PVC
            # stalwart-rocksdb-data is kept in the cluster for 48-72h
            # safety period.
            claimName: mail-stack-data
        # A5 (2026-05-25): rsyncd config for the sidecar above.
        - name: rsyncd-config
          configMap:
            name: mail-stack-rsyncd-config
        # /tmp for rsyncd PID file — required because the sidecar runs
        # with readOnlyRootFilesystem:true.
        - name: rsyncd-tmp
          emptyDir:
            sizeLimit: 10Mi
        # A4 (2026-05-25): hostPath into the standby DaemonSet's
        # pre-staged data dir. The restore-state init container uses
        # this as a FAST PATH on failover; the main container does
        # NOT mount it (data has already been copied into the PVC by
        # then). DirectoryOrCreate so non-standby nodes don't fail
        # the mount — the init container's existence guard handles it.
        - name: standby-data
          hostPath:
            path: /var/lib/mail-stack-standby
            type: DirectoryOrCreate
        - name: pod-annotations
          downwardAPI:
            items:
              - path: allow-restore
                fieldRef:
                  fieldPath: metadata.annotations['mail.platform/allow-restore']
              # Per-snapshot restore (2026-05-27): when set by the
              # /backups/mail per-snapshot restore flow, the restore-state
              # init container reads this and runs `restic restore <id>`
              # instead of the default `restic restore latest`. Stamped
              # by migration.ts:applyDeploymentAffinity, cleared by
              # clearAllowRestoreAnnotation on success.
              - path: restore-snapshot-id
                fieldRef:
                  fieldPath: metadata.annotations['mail.platform/restore-snapshot-id']
