# NetworkPolicy for Stalwart 0.16.
#
# Ingress:
#   - Public mail ports (25/465/587/143/993/4190) — from anywhere
#   - Management HTTP (8080) — from same namespace + platform namespace
#     (platform-api JMAP proxying + ingress controller)
#
# Egress:
#   - DNS (kube-system port 53)
#   - Outbound SMTP (port 25) for direct MX delivery
#   - Outbound SMTP submission (465/587) for commercial relays
#   - HTTPS (443) for DNSBL, ACME, relay APIs
#
# NOTE (Phase 1 RocksDB migration): the egress rule for TCP 5432 to
# the mail namespace (mail-db PostgreSQL) has been removed. RocksDB is
# embedded on the local-path PVC — no outbound DB connection needed.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: stalwart-mail
  namespace: mail
  labels:
    app: stalwart-mail
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector:
    matchLabels:
      app: stalwart-mail
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Public mail ports — accept from anywhere
    - from: []
      ports:
        - protocol: TCP
          port: 25
        - protocol: TCP
          port: 465
        - protocol: TCP
          port: 587
        - protocol: TCP
          port: 143
        - protocol: TCP
          port: 993
        - protocol: TCP
          port: 4190
    # ACME HTTP-01 challenge (port 80) — from the nginx-ingress
    # controller pods. mail-acme-ingress.yaml routes
    # /.well-known/acme-challenge/* to Service:80 → this pod:80, where
    # Stalwart's `http-acme` NetworkListener responds with the LE
    # token. Same source-pattern as the 8080 mgmt rule (ingress-nginx
    # uses hostNetwork so the source IP is the node IP, which Linux
    # re-sources to a Calico VXLAN tunnel IP inside the pod CIDR).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
        - ipBlock:
            cidr: 10.42.0.0/16
      ports:
        - protocol: TCP
          port: 80
    # Management HTTP — open to all sources (from: []).
    # Rationale: the kubelet connects from the node's primary public IP
    # (e.g. 192.0.2.56) — NOT from the pod CIDR (10.42.0.0/16). A
    # namespace+podSelector or pod-CIDR ipBlock rule would silently block
    # startup/liveness/readiness probes, preventing the pod from ever
    # becoming Ready. Allowing 0.0.0.0/0 is safe because port 8080 is the
    # Stalwart management API which requires HTTP Basic auth for every
    # request; there is no unauthenticated surface on this port.
    # ingress-nginx still gates the admin Ingress with auth_request, so the
    # port is not directly routable from the internet anyway (no hostPort,
    # no externalIPs). See `project_calico_netpol_ipblock_fix.md`.
    - from: []
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Outbound SMTP (direct MX delivery)
    - to: []
      ports:
        - protocol: TCP
          port: 25
    # Outbound SMTP submission (commercial relays)
    - to: []
      ports:
        - protocol: TCP
          port: 465
        - protocol: TCP
          port: 587
    # HTTPS for DNSBL, ACME (LE directory + nonce), relay APIs
    - to: []
      ports:
        - protocol: TCP
          port: 443
    # HTTP for ACME (LE redirects /directory to HTTPS, but some
    # operations use plain HTTP) and DNSBL HTTP fallbacks.
    - to: []
      ports:
        - protocol: TCP
          port: 80
