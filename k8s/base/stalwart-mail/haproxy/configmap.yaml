# haproxy config for Stalwart PROXY-Protocol v2 forwarding.
# Deployed on every server-role node when mail port exposure mode is 'allServerNodes'.
# haproxy runs hostNetwork and binds the PUBLIC mail ports (25/465/587/143/993/4190)
# on each non-active node directly (the frontends below), so external mail reaches
# haproxy without any Service externalIP. Each backend forwards to Stalwart's
# DEDICATED PROXY-protocol listener (internal ports 12025/12465/12587/12143/12993/
# 14190 — see service.yaml) with 'send-proxy-v2'.
#
# WHY DEDICATED PROXY listeners (not the public mail ports):
#   The forward to stalwart-mail.mail.svc is cross-node, so Calico/WireGuard
#   masquerades the source to the origin node's pod-CIDR tunnel IP (10.42.x).
#   The `-proxy` listeners TRUST the pod CIDR (overrideProxyTrustedNetworks),
#   so Stalwart parses the PROXY-v2 header and recovers the REAL client IP
#   (SPF/DKIM/autoban work on real IPs). The standard mail listeners stay
#   PROXY-free for the active-node hostPort path + in-cluster direct clients.
#
# NOTE: the externalIP DNAT was REMOVED — kube-proxy's externalIP PREROUTING
#   DNAT preempted this hostNetwork socket entirely (haproxy got zero external
#   traffic) and the masquerade collapsed every client to one tunnel IP, which
#   Stalwart's portScanning then banned. platform-api now resolves externalIPs
#   to []. See backend/src/modules/mail-admin/port-exposure-modes.ts.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: stalwart-haproxy-config
  namespace: mail
  labels:
    app.kubernetes.io/component: stalwart-haproxy
    app.kubernetes.io/part-of: hosting-platform
data:
  haproxy.cfg: |
    global
      log stdout format raw local0
      maxconn 4096
      stats socket /tmp/haproxy.sock mode 600 level admin

    defaults
      log global
      mode tcp
      option tcplog
      timeout connect 5s
      timeout client  600s
      timeout server  600s

    frontend smtp_in
      bind *:25
      default_backend stalwart_smtp

    backend stalwart_smtp
      server stalwart stalwart-mail.mail.svc.cluster.local:12025 send-proxy-v2 check inter 10s

    frontend submission_in
      bind *:587
      default_backend stalwart_submission

    backend stalwart_submission
      server stalwart stalwart-mail.mail.svc.cluster.local:12587 send-proxy-v2 check inter 10s

    frontend smtps_in
      bind *:465
      default_backend stalwart_smtps

    backend stalwart_smtps
      server stalwart stalwart-mail.mail.svc.cluster.local:12465 send-proxy-v2 check inter 10s

    frontend imap_in
      bind *:143
      default_backend stalwart_imap

    backend stalwart_imap
      server stalwart stalwart-mail.mail.svc.cluster.local:12143 send-proxy-v2 check inter 10s

    frontend imaps_in
      bind *:993
      default_backend stalwart_imaps

    backend stalwart_imaps
      server stalwart stalwart-mail.mail.svc.cluster.local:12993 send-proxy-v2 check inter 10s

    frontend sieve_in
      bind *:4190
      default_backend stalwart_sieve

    backend stalwart_sieve
      server stalwart stalwart-mail.mail.svc.cluster.local:14190 send-proxy-v2 check inter 10s
