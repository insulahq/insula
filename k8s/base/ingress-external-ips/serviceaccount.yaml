# Service account + RBAC for the ingress-external-ips reconciler.
# It needs to:
#   - list Nodes (read .status.addresses[type=ExternalIP])
#   - patch one Service (traefik .spec.externalIPs)
#
# Phase 0 of the Traefik migration flipped the target namespace from
# `ingress-nginx` to `traefik` and the target Service from
# `ingress-nginx-controller` to `traefik`.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ingress-external-ips-reconciler
  namespace: traefik
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: ingress-external-ips
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ingress-external-ips-reconciler
  labels:
    app.kubernetes.io/part-of: hosting-platform
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ingress-external-ips-reconciler
  labels:
    app.kubernetes.io/part-of: hosting-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ingress-external-ips-reconciler
subjects:
  - kind: ServiceAccount
    name: ingress-external-ips-reconciler
    namespace: traefik
---
# Namespace-scoped patch right on the traefik Service.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ingress-external-ips-reconciler
  namespace: traefik
  labels:
    app.kubernetes.io/part-of: hosting-platform
rules:
  - apiGroups: [""]
    resources: ["services"]
    resourceNames: ["traefik"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ingress-external-ips-reconciler
  namespace: traefik
  labels:
    app.kubernetes.io/part-of: hosting-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ingress-external-ips-reconciler
subjects:
  - kind: ServiceAccount
    name: ingress-external-ips-reconciler
    namespace: traefik
