# Longhorn dashboard path routes on the ADMIN host (no dedicated
# subdomain) — operator decision 2026-06-12, same rationale as the
# vmsingle-ui route: one fewer public hostname + LE certificate.
#
#   https://admin.<apex>/longhorn/  →  longhorn-frontend (stripPrefix)
#   https://admin.<apex>/v1/…       →  longhorn-frontend (NO strip)
#
# Longhorn-ui does NOT support a context path upstream (longhorn#1745,
# longhorn#10667): its ASSETS are relative (./styles.css — these work
# under a stripped prefix), but the SPA hardcodes ABSOLUTE `/v1/...`
# API + websocket paths. The second route mounts that API surface at
# the admin origin, cookie-gated like everything else. Verified live
# on staging 2026-06-12 (assets relative, bundle greps show "/v1/…").
#
# ⚠ /v1 on the admin host now belongs to Longhorn. The platform API
#   lives under /api/v1 so there is no collision today — but no future
#   admin-host route may claim /v1.
#
# /longhorn (no trailing slash) must redirect to /longhorn/ — the
# relative asset URLs otherwise resolve against the host root.
#
# Both IngressRoutes carry the `admin-ui=true` label so the overlay's
# admin-auth-gate component provides the `admin-auth-cookie` Middleware
# (ci-admin-auth-check.sh enforces gate coverage on every labelled
# route). TLS rides the admin host's certificate via SNI; NO spec.tls —
# the websecure entrypoint carries http.tls=true, and an empty tls: {}
# is normalised to null by the Flux pipeline and rejected by the CRD
# (see vmui-ingressroute.yaml for the full story). The match assumes
# the DEFAULT admin host `admin.${DOMAIN}` — same caveat as vmsingle-ui.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: longhorn-ui-strip
  namespace: longhorn-system
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  stripPrefix:
    prefixes:
      - /longhorn
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: longhorn-ui-slash
  namespace: longhorn-system
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  redirectRegex:
    regex: "^(https?://[^/]+)/longhorn$"
    # $1 (not ${1}): Flux postBuild envsubst would eat ${1} — same
    # gotcha as relabel replacements in scrape-config.yaml. Go regexp
    # expansion accepts the brace-less form.
    replacement: "$1/longhorn/"
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: longhorn-ui
  namespace: longhorn-system
  labels:
    app.kubernetes.io/part-of: hosting-platform
    insula.host/admin-ui: "true"
spec:
  entryPoints:
    - websecure
  routes:
    - match: "Host(`admin.${DOMAIN}`) && (Path(`/longhorn`) || PathPrefix(`/longhorn/`))"
      kind: Rule
      priority: 100
      middlewares:
        - name: admin-auth-cookie
          namespace: traefik
        - name: longhorn-ui-slash
        - name: longhorn-ui-strip
        - name: compress
          namespace: traefik
      services:
        - name: longhorn-frontend
          namespace: longhorn-system
          port: 80
---
# The SPA's hardcoded absolute /v1 API + websocket surface (see header).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: longhorn-api
  namespace: longhorn-system
  labels:
    app.kubernetes.io/part-of: hosting-platform
    insula.host/admin-ui: "true"
spec:
  entryPoints:
    - websecure
  routes:
    - match: "Host(`admin.${DOMAIN}`) && (Path(`/v1`) || PathPrefix(`/v1/`))"
      kind: Rule
      priority: 100
      middlewares:
        - name: admin-auth-cookie
          namespace: traefik
      services:
        - name: longhorn-frontend
          namespace: longhorn-system
          port: 80
