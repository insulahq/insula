# SFTP Gateway — K8s Exec-based architecture (ADR-027)
#
# Accepts SFTP/SCP/rsync connections, authenticates against the platform
# backend, then execs sftp-server inside the tenant's file-manager pod via
# the K8s API. No PVC mounts needed — fully multi-node compatible.
#
# EXPOSURE: a DaemonSet with a hostPort on every control-plane server,
# mirroring the stalwart-haproxy mail DaemonSet — the platform's pattern for
# raw TCP. It is NOT a LoadBalancer Service: bootstrap runs k3s with
# `--disable=servicelb` and there is no cloud LB on self-managed VPS nodes, so
# a LoadBalancer Service sits at `EXTERNAL-IP <pending>` forever and NOTHING
# ever binds the port (which is exactly what shipped — tenant SFTP was
# unreachable on every real deployment). The firewall accept for the port
# lives in bootstrap.sh + a host-migration: firewall-reconciler only opens
# hostPorts for TENANT namespaces (client-*), not platform-system.
#
# Clients reach it at files.<apex>:23022 — a CNAME to the apex, whose A
# records already point at the control-plane servers, so DNS round-robins
# across exactly the nodes running this DaemonSet.
#
# FTPS was REMOVED: it never actually ran (the optional sftp-tls-certs Secret
# was never created, so the listener self-disabled on every deployment while
# the API still advertised it). Passive mode needs a 100-port firewall range
# and a per-node PublicIP a DaemonSet cannot supply; active mode is unusable
# behind NAT, and doubly so with TLS hiding PORT from nf_conntrack_ftp.
# SFTP/SCP/rsync over this same gateway cover the use case with better auth.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sftp-gateway
  namespace: platform-system
  labels:
    app: sftp-gateway
---
# Read-only ClusterRole: list/get pods across tenant-* namespaces to find
# file-manager pods. Does NOT grant exec — that is scoped per-namespace
# via Roles created by the provisioner when a tenant namespace is set up.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sftp-gateway-pod-reader
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sftp-gateway-pod-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sftp-gateway-pod-reader
subjects:
  - kind: ServiceAccount
    name: sftp-gateway
    namespace: platform-system
---
# Per-namespace exec Role — created automatically by the backend provisioner
# in k8s-lifecycle.ts when ensureFileManagerRunning() is called. Each tenant
# namespace gets its own Role+RoleBinding scoping pod/exec to that namespace
# only. No cluster-wide exec ClusterRole exists.
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: sftp-gateway
  namespace: platform-system
  labels:
    app: sftp-gateway
  annotations:
    # Restart the gateway when platform-secrets changes so the boot-time mirror
    # drift-guard (platform-api reconcilePlatformSecretsMirror) auto-loads a
    # healed internal-secret — otherwise a stale env keeps every SFTP auth 403ing.
    secret.reloader.stakater.com/reload: "platform-secrets"
spec:
  selector:
    matchLabels:
      app: sftp-gateway
  template:
    metadata:
      labels:
        app: sftp-gateway
    spec:
      serviceAccountName: sftp-gateway
      # Every control-plane server exposes the port. `insula.host/node-role`
      # is stamped by bootstrap.sh, so this needs no per-node opt-in label
      # (unlike stalwart-haproxy, where mail is deliberately placed).
      nodeSelector:
        insula.host/node-role: server
      tolerations:
        - key: insula.host/server-only
          operator: Exists
          effect: NoSchedule
      containers:
        - name: gateway
          image: ghcr.io/insulahq/insula/sftp-gateway:latest # {"$imagepolicy": "flux-system:sftp-gateway"}
          imagePullPolicy: IfNotPresent
          ports:
            # hostPort == containerPort so the node binds the advertised port
            # directly (no portmap remap). 23022 is deliberate: it must stay
            # BELOW 32768 (the ephemeral range 32768-60999 — a hostPort there
            # can collide with outbound source ports) and OUTSIDE 30000-32767
            # (the NodePort range), which leaves 1024-29999. It also keeps the
            # gateway off 22/2222, the ports bots sweep by default.
            - containerPort: 23022
              hostPort: 23022
              name: sftp
            # Health stays pod-local — no hostPort, nothing to firewall.
            - containerPort: 8080
              name: health
          env:
            - name: BACKEND_URL
              value: "http://platform-api.platform.svc.cluster.local:3000"
            - name: INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: internal-secret
            - name: SSH_HOST_KEY_PATH
              value: "/etc/ssh/keys/ssh_host_ed25519_key"
            - name: SSH_PORT
              value: "23022"
            - name: IDLE_TIMEOUT
              value: "15m"
            - name: MAX_CONNECTIONS
              value: "200"
          volumeMounts:
            - name: ssh-host-keys
              mountPath: /etc/ssh/keys
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
      volumes:
        - name: ssh-host-keys
          secret:
            secretName: sftp-host-keys
            defaultMode: 0444  # readable by nobody (65534); Secret is RBAC-protected
---
# ClusterIP only — external clients reach the gateway via the DaemonSet's
# hostPort on files.<apex>:23022, NOT through this Service. It exists for
# in-cluster callers (health probes from tests, future internal consumers).
# Deliberately NOT a LoadBalancer: see the exposure note at the top.
apiVersion: v1
kind: Service
metadata:
  name: sftp-gateway
  namespace: platform-system
spec:
  type: ClusterIP
  selector:
    app: sftp-gateway
  ports:
    - port: 23022
      targetPort: 23022
      name: sftp
    - port: 8080
      targetPort: 8080
      name: health
