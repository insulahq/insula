# vmsingle scrape configuration (Prometheus-compatible, consumed via
# -promscrape.config). Scrape budget is deliberately tiny: 60s interval,
# a hard metric allowlist on the only unbounded job (cadvisor), and only
# endpoints that already exist on the cluster — no exporter sidecars,
# no node-exporter, no kube-state-metrics (ADR-051; the platform's own
# node-health/cluster-health modules cover object state via the K8s API).
#
# ─── envsubst WARNING ────────────────────────────────────────────────
# Flux postBuild.substituteFrom runs envsubst over this rendered file.
# In relabel `replacement` fields ALWAYS write `$1`, NEVER `${1}` —
# `${1}` is eaten/crashed by envsubst (ci-flux-envsubst-check.sh guards
# the class), while a bare `$1` passes through untouched.
apiVersion: v1
kind: ConfigMap
metadata:
  name: vmsingle-scrape-config
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: hosting-platform
data:
  prometheus.yml: |
    global:
      scrape_interval: 60s
      scrape_timeout: 10s

    scrape_configs:
      # ── vmsingle self ────────────────────────────────────────────
      # -http.pathPrefix=/metrics moves vmsingle's own exposition
      # endpoint from /metrics to /metrics/metrics.
      - job_name: vmsingle
        metrics_path: /metrics/metrics
        static_configs:
          - targets: ['localhost:8428']

      # ── kubelet: container CPU/mem/fs (cadvisor) ─────────────────
      # Bearer-token authn against the kubelet's HTTPS port; the k3s
      # kubelet serving cert is not verifiable from the SA CA bundle,
      # so verification is skipped (authn stays cryptographic — same
      # posture kube-prometheus-stack ships on k3s).
      # CARDINALITY GUARD: cadvisor is the only job whose series count
      # grows with tenant count — keep ONLY what the SLO rule pack
      # reads. Extend the regex deliberately, never wholesale.
      - job_name: kubelet-cadvisor
        scheme: https
        metrics_path: /metrics/cadvisor
        kubernetes_sd_configs:
          - role: node
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        tls_config:
          insecure_skip_verify: true
        relabel_configs:
          - source_labels: [__meta_kubernetes_node_name]
            target_label: node
        metric_relabel_configs:
          # container_network_transmit_bytes_total: per-tenant bandwidth
          # metering (namespace-labelled; the backend sums per namespace via
          # increase(), which absorbs counter resets + pod churn). Bounded
          # extra cardinality (~pods×interfaces); everything else stays dropped.
          - source_labels: [__name__]
            regex: 'container_(memory_working_set_bytes|cpu_usage_seconds_total|fs_usage_bytes|network_transmit_bytes_total)|machine_memory_bytes|machine_cpu_cores'
            action: keep

      # ── kubelet: pod/container requests-level resource metrics ──
      - job_name: kubelet-resource
        scheme: https
        metrics_path: /metrics/resource
        kubernetes_sd_configs:
          - role: node
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        tls_config:
          insecure_skip_verify: true
        relabel_configs:
          - source_labels: [__meta_kubernetes_node_name]
            target_label: node

      # ── Traefik (entrypoint request/duration metrics, :9100) ────
      # The helm chart (40.x) serves prometheus metrics on the
      # `metrics` entrypoint by default; pod-level scrape, no Service
      # exposure needed.
      - job_name: traefik
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [traefik]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            regex: traefik
            action: keep
          - source_labels: [__address__]
            regex: '([^:]+)(?::\d+)?'
            replacement: '$1:9100'
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node

      # ── cert-manager (certificate expiry/readiness, :9402) ──────
      - job_name: cert-manager
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [cert-manager]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            regex: controller
            action: keep
          - source_labels: [__address__]
            regex: '([^:]+)(?::\d+)?'
            replacement: '$1:9402'
            target_label: __address__

      # ── Longhorn (volume/node storage metrics, :9500) ────────────
      - job_name: longhorn
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [longhorn-system]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: longhorn-manager
            action: keep
          - source_labels: [__address__]
            regex: '([^:]+)(?::\d+)?'
            replacement: '$1:9500'
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node

      # ── Flux controllers (reconcile health, :8080 http-prom) ─────
      - job_name: flux
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [flux-system]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: (source|kustomize|helm|notification)-controller
            action: keep
          - source_labels: [__address__]
            regex: '([^:]+)(?::\d+)?'
            replacement: '$1:8080'
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: controller

      # ── CNPG / system-db (postgres exporter, :9187) ──────────────
      # CNPG instance pods always serve metrics on 9187; scraped
      # directly — the Cluster CR's enablePodMonitor stays false
      # because the PodMonitor CRD (prometheus-operator) is
      # deliberately not installed (ADR-051).
      - job_name: cnpg
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [platform]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_cnpg_io_cluster]
            regex: .+
            action: keep
          - source_labels: [__address__]
            regex: '([^:]+)(?::\d+)?'
            replacement: '$1:9187'
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

      # ── platform-api (:9090 — ADR-051 phase 2) ───────────────────
      # First-party metrics: HTTP histogram, ACME order/renewal
      # counters (the #43 LE-storm canary), mail TLS expiry, Stalwart
      # task-queue depth. Dedicated port; netpol
      # allow-monitoring-to-platform-api-metrics scopes it to us.
      - job_name: platform-api
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [platform]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: platform-api
            action: keep
          - source_labels: [__address__]
            regex: '([^:]+)(?::\d+)?'
            replacement: '$1:9090'
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

      # ── CoreDNS (:9153) ──────────────────────────────────────────
      - job_name: coredns
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [kube-system]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_k8s_app]
            regex: kube-dns
            action: keep
          - source_labels: [__address__]
            regex: '([^:]+)(?::\d+)?'
            replacement: '$1:9153'
            target_label: __address__
