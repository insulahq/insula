apiVersion: v1
kind: ServiceAccount
metadata:
  name: host-config-reconciler
  namespace: platform-system
  labels:
    app: host-config-reconciler
    app.kubernetes.io/part-of: hosting-platform
---
# RBAC for the host-config-reconciler DaemonSet (observe mode).
#
# The reconciler READS the host-config-desired ConfigMap and WRITES one
# host-config-drift-<node> ConfigMap, both in platform-system. It reads its
# parent Node only to set an OwnerReference (ConfigMap GCs with the node).
#
# Intentionally narrow: NO secrets, NO write to any other resource, NO exec,
# NO cluster-wide list/watch.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: host-config-reconciler
rules:
  # `get` only — the pod fetches its own parent Node (downward API NODE_NAME)
  # for the OwnerReference UID. list/watch would let a compromised SA enumerate
  # every node cluster-wide; not needed.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: host-config-reconciler
  namespace: platform-system
rules:
  # get: read host-config-desired (policy). create/update: write this node's
  # host-config-drift-<node> snapshot. Scoped to platform-system. No `patch`
  # (the publisher only Gets/Creates/Updates). Write verbs cannot be
  # resourceName-restricted — the drift-CM name is per-node + the SA is shared.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: host-config-reconciler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: host-config-reconciler
subjects:
  - kind: ServiceAccount
    name: host-config-reconciler
    namespace: platform-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: host-config-reconciler
  namespace: platform-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: host-config-reconciler
subjects:
  - kind: ServiceAccount
    name: host-config-reconciler
    namespace: platform-system
