# Resource quota for the hosting namespace (tenant workloads)
apiVersion: v1
kind: ResourceQuota
metadata:
  name: hosting-quota
  namespace: hosting
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  hard:
    requests.cpu: "16"
    requests.memory: 32Gi
    limits.cpu: "32"
    limits.memory: 64Gi
    persistentvolumeclaims: "200"
    pods: "500"
    services: "200"
---
# LimitRange for hosting namespace — default per-pod limits
apiVersion: v1
kind: LimitRange
metadata:
  name: hosting-limit-range
  namespace: hosting
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "4"
        memory: 8Gi
      min:
        cpu: 50m
        memory: 64Mi
---
# Resource quota for platform namespace. Sized for 4 GB-RAM cluster
# servers (3-server HA = 12 GB total cluster RAM, ~4-6 GB available
# for the platform namespace after OS + k3s + Calico + Longhorn +
# cert-manager system overhead). limits.memory: 16Gi allows 2× over-
# commit since not all pods consume their limit simultaneously. No
# pods cap — CPU/memory quotas already bound resource consumption,
# and a numeric pod cap doesn't add protection that those don't cover.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: platform-quota
  namespace: platform
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  hard:
    # CPU *limits* are intentionally NOT tracked here. Platform pods are
    # high-priority infrastructure and run WITHOUT CPU limits (see
    # platform-limit-range below), so a limits.cpu quota would (a) reject
    # every limitless pod ("must specify limits.cpu") and (b) wedge rolling
    # updates on burst-ceiling accounting even while nodes sit near-idle —
    # which is exactly what stalled the platform-api rollout for a day
    # (2026-06-24). The real guardrails are requests.cpu + node capacity.
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.memory: 16Gi
---
# LimitRange for platform namespace — supplies default container
# resource limits/requests so pods that don't specify them (e.g.
# CNPG-managed bootstrap-controller / snapshot-recovery Job pods
# during postgres PITR, Longhorn-injected sidecars) still satisfy
# the platform-quota's requests.cpu/limits.cpu/requests.memory/
# limits.memory hard limits. Without this, the temp PITR cluster
# sits at "Setting up primary" forever because every recovery-Job
# pod is rejected with "must specify limits.cpu for: bootstrap-
# controller,snapshot-recovery". Defaults sized for 4 GB-RAM
# cluster servers — small enough that 5-10 PITR-bootstrap-style
# pods don't exhaust the namespace quota.
apiVersion: v1
kind: LimitRange
metadata:
  name: platform-limit-range
  namespace: platform
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  limits:
    - type: Container
      # No default/max CPU LIMIT: platform pods run without CPU limits
      # (high-priority infra — CPU limits cause CFS throttling, and the
      # platform-quota no longer tracks limits.cpu). A default CPU REQUEST
      # is still applied for scheduling, and memory default/max remain so
      # an unbounded pod can't OOM a node. Dropping default.cpu alone is
      # NOT enough — with `max.cpu` set, max becomes the implicit default
      # limit — so max.cpu is removed too. (2026-06-24)
      default:
        memory: 384Mi
      defaultRequest:
        cpu: 20m
        memory: 32Mi
      max:
        memory: 4Gi
      min:
        cpu: 10m
        memory: 32Mi
