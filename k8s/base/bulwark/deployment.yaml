# Bulwark webmail — JMAP-native client for Stalwart Mail Server.
#
# Master-user impersonation is handled by Bulwark's native
# /api/auth/impersonate route (upstream issue #296, shipped in v1.6.7
# stable on 2026-05-17). Our previous impersonator sidecar
# (k8s/base/bulwark-impersonator/) is retired.
#
# The Deployment ships as part of the platform base but is NOT included
# by k8s/base/kustomization.yaml — overlays opt-in.
#
# Image is pinned by digest. Source: ghcr.io/bulwarkmail/webmail (the
# stable release channel). Bump procedure documented in ADR-039.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bulwark
  namespace: mail
  labels:
    app: bulwark
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: webmail
  annotations:
    # Roll on bulwark-secrets change. The secret carries:
    #   - ADMIN_PASSWORD              admin dashboard login
    #   - SESSION_SECRET              encrypts session cookies
    #   - BULWARK_JWT_AUTH_SECRET     verifies platform-api's impersonation JWTs
    #   - BULWARK_STALWART_MASTER_USER
    #   - BULWARK_STALWART_MASTER_PASSWORD
    secret.reloader.stakater.com/reload: bulwark-secrets
    # Flux SSA: Merge so platform-api's webmail-router reconciler can
    # patch container env (e.g. on engine flip) without Flux reverting.
    kustomize.toolkit.fluxcd.io/ssa: Merge
spec:
  # Single replica, pinned to mailActiveNode by platform-api's
  # mail-stack-placement reconciler (see migration.ts:applyDeploymentAffinity).
  # The PVC is RWO so > 1 replica is structurally impossible — the
  # second pod would hang in Init forever waiting on PVC attach.
  #
  # Co-location rationale: Bulwark talks to Stalwart via JMAP; pinning
  # both to the same node minimises latency, and a shared failover
  # primitive (both Deployments move together on dr-watcher trigger)
  # keeps the mail stack as one atomic unit.
  #
  # Historical: prior config used topologySpread + replicas owned by
  # platform-storage-policy. Removed 2026-05-25 when the bulwark stuck-
  # in-Init bug was traced to that exact pattern (RWO PVC + replicas=2
  # + topologySpread = always-pending second pod).
  replicas: 1
  strategy:
    # Single-replica + Recreate. RollingUpdate with maxSurge=1 cannot
    # work — the surge pod would attempt to attach the same RWO PVC
    # while the old pod still holds it. Recreate ensures clean handoff.
    type: Recreate
  selector:
    matchLabels:
      app: bulwark
  template:
    metadata:
      labels:
        app: bulwark
        app.kubernetes.io/part-of: hosting-platform
        app.kubernetes.io/component: webmail
    spec:
      # nodeSelector is applied dynamically by platform-api's
      # applyDeploymentAffinity (see migration.ts) — same pattern as
      # the Stalwart Deployment. Bulwark follows the mailActiveNode
      # so a failover of one is a failover of both.
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        # fsGroup is critical — Bulwark writes to four subdirectories
        # under /app/data (admin/, settings/, telemetry/, version-check/).
        # A single PVC mount with fsGroup=1000 makes the entire tree
        # writable by the non-root container UID.
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # 2026-05-18: webmail feature-visibility CSS injection. Bulwark's
      # SPA <head> is React-rendered and there's no env-driven custom-
      # CSS hook in the v1.6.x image, so we append our overrides to the
      # bundled Tailwind CSS files that the SPA already loads. This
      # initContainer:
      #   1. Copies the pristine /app/.next/static/css/*.css from the
      #      image's read-only layer to an emptyDir.
      #   2. Appends the content of
      #      /feature-overrides/bulwark-overrides.css (mounted from the
      #      platform-managed ConfigMap) to every .css file in the dir.
      #   3. The main container mounts the same emptyDir at
      #      /app/.next/static/css, shadowing the image's pristine dir.
      #
      # When platform-api flips one of the feature flags, the reconciler
      # rewrites the ConfigMap content + stamps a
      # `platform.example.test/feature-css-hash` annotation on this
      # Deployment's pod template, which triggers a rolling restart that
      # re-runs this initContainer with the new ConfigMap content.
      initContainers:
        - name: feature-css-injector
          image: ghcr.io/bulwarkmail/webmail@sha256:4ee0f0b505287555f814654fec12bd07c8bde098ee80a92b2dc13d556f576431
          imagePullPolicy: IfNotPresent
          # busybox-style sh is available in the Bulwark image (Alpine
          # base). The script is intentionally tiny + has no error
          # tolerance for the original-CSS copy (if that fails the Pod
          # would serve a broken UI — fail-fast). The append step is
          # tolerant of an empty override file (cat /dev/null → no-op).
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "[feature-css-injector] copying pristine CSS to overlay…"
              cp /app/.next/static/css/*.css /css-overlay/
              if [ -f /feature-overrides/bulwark-overrides.css ]; then
                echo "[feature-css-injector] appending bulwark-overrides.css to each CSS file"
                # Bulwark concatenates all .css under that dir into the
                # request response; appending to every file makes the
                # override unconditional regardless of which chunk a
                # given page loads.
                for f in /css-overlay/*.css; do
                  echo "" >> "$f"
                  cat /feature-overrides/bulwark-overrides.css >> "$f"
                done
                echo "[feature-css-injector] override applied ($(wc -c < /feature-overrides/bulwark-overrides.css) bytes)"
              else
                echo "[feature-css-injector] no overrides ConfigMap mount — Pod will serve upstream UI"
              fi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: css-overlay
              mountPath: /css-overlay
            - name: feature-overrides
              mountPath: /feature-overrides
              readOnly: true
      containers:
        - name: bulwark
          # ghcr.io/bulwarkmail/webmail@sha256:4ee0f0b5... — Bulwark
          # v1.6.7 stable (2026-05-17). First stable release with the
          # /api/auth/impersonate route (issue #296). Bump per ADR-039.
          image: ghcr.io/bulwarkmail/webmail@sha256:4ee0f0b505287555f814654fec12bd07c8bde098ee80a92b2dc13d556f576431
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
          env:
            # JMAP server URL — must be browser-reachable because
            # Bulwark's SPA fetches `${JMAP_SERVER_URL}/.well-known/jmap`
            # tenant-side after login. Overlays override per env.
            - name: JMAP_SERVER_URL
              value: "https://stalwart.${DOMAIN}"
            - name: ALLOW_CUSTOM_JMAP_ENDPOINT
              value: "false"
            - name: STALWART_FEATURES
              value: "true"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: NODE_ENV
              value: "production"
            - name: SETTINGS_SYNC_ENABLED
              value: "true"
            - name: ADMIN_DATA_DIR
              value: "/app/data/admin"
            - name: SETTINGS_DATA_DIR
              value: "/app/data/settings"
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bulwark-secrets
                  key: ADMIN_PASSWORD
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: bulwark-secrets
                  key: SESSION_SECRET
            # Impersonation envs (Bulwark issue #296). When all three are
            # set Bulwark exposes GET /api/auth/impersonate?token=<jwt>.
            # JWT contract: HS256, ≥32-char secret, claims
            # {iss="platform-api/webmail", iat, exp, jti, mailbox};
            # lifetime ≤300s; replay-protected via in-memory jti LRU.
            # BULWARK_JWT_AUTH_SECRET MUST equal platform-api's
            # WEBMAIL_JWT_SECRET so platform-api can sign tokens Bulwark
            # verifies. bootstrap.sh generates one shared value.
            - name: BULWARK_JWT_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: bulwark-secrets
                  key: BULWARK_JWT_AUTH_SECRET
            - name: BULWARK_STALWART_MASTER_USER
              valueFrom:
                secretKeyRef:
                  name: bulwark-secrets
                  key: BULWARK_STALWART_MASTER_USER
            - name: BULWARK_STALWART_MASTER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bulwark-secrets
                  key: BULWARK_STALWART_MASTER_PASSWORD
            # Issuer claim Bulwark checks against (defaults to
            # "platform-api/webmail" in the route handler — set
            # explicitly so the contract is self-documenting on
            # both sides).
            - name: BULWARK_JWT_AUTH_ISSUER
              value: "platform-api/webmail"
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /app/data
              # A2.5 (2026-05-25): consolidated mail-stack PVC. Bulwark
              # subtree at subPath=bulwark; Stalwart sees the parent dir
              # via subPath=stalwart. Both mount the same mail-stack-data
              # PVC on the active mail node.
              subPath: bulwark
            # 2026-05-18: shadow /app/.next/static/css with the
            # initContainer-prepared CSS (pristine bundle + appended
            # feature-visibility overrides). The image's layer is read-
            # only; this mount replaces it for the running Pod.
            - name: css-overlay
              mountPath: /app/.next/static/css
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 36
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            # A2.5 (2026-05-25): switched from the old Longhorn `bulwark-data`
            # PVC to the consolidated `mail-stack-data` local-path PVC.
            # Co-located with Stalwart on mailActiveNode. Legacy bulwark-data
            # PVC is kept for 48-72h safety period (see
            # docs/02-operations/MAIL_STACK_CONSOLIDATION.md Stage 3).
            claimName: mail-stack-data
        # 2026-05-18: ephemeral scratch space the initContainer
        # populates with the modified CSS. Replaced on every Pod start.
        - name: css-overlay
          emptyDir:
            sizeLimit: 4Mi
        # Webmail feature-visibility ConfigMap, mounted into the
        # initContainer only. Reconciled by platform-api's
        # webmail-feature-css scheduler (see ADR-039 + the module at
        # backend/src/modules/webmail-feature-css/).
        - name: feature-overrides
          configMap:
            name: webmail-feature-overrides
            optional: false
