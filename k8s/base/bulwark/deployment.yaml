# Bulwark webmail — JMAP-native client for Stalwart Mail Server.
#
# Master-user impersonation is handled by Bulwark's native
# /api/auth/impersonate route (upstream issue #296, shipped in v1.6.7
# stable on 2026-05-17). Our previous impersonator sidecar
# (k8s/base/bulwark-impersonator/) is retired.
#
# The Deployment ships as part of the platform base but is NOT included
# by k8s/base/kustomization.yaml — overlays opt-in.
#
# Image is pinned by digest. Source: ghcr.io/bulwarkmail/webmail (the
# stable release channel). Bump procedure documented in ADR-039.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bulwark
  namespace: mail
  labels:
    app: bulwark
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: webmail
  annotations:
    # Roll on bulwark-secrets OR mail-secrets change.
    #   bulwark-secrets carries Bulwark-specific credentials:
    #     - ADMIN_PASSWORD              admin dashboard login
    #     - SESSION_SECRET              encrypts session cookies
    #     - BULWARK_JWT_AUTH_SECRET     verifies platform-api's impersonation JWTs
    #   mail-secrets carries Stalwart master credentials shared with
    #   Roundcube + tenant-bundle Jobs:
    #     - STALWART_MASTER_USER
    #     - STALWART_MASTER_PASSWORD
    #   When rotateWebmailMasterPassword updates mail-secrets, Reloader
    #   rolls Bulwark automatically (2026-05-28: replaced the
    #   bulwark-secrets mirror that drifted on every rotation).
    secret.reloader.stakater.com/reload: "bulwark-secrets,mail-secrets"
    # Flux SSA: Merge so platform-api's webmail-router reconciler can
    # patch container env (e.g. on engine flip) without Flux reverting.
    kustomize.toolkit.fluxcd.io/ssa: Merge
spec:
  # Single replica, pinned to mailActiveNode by platform-api's
  # mail-stack-placement reconciler (see migration.ts:applyDeploymentAffinity).
  # The PVC is RWO so > 1 replica is structurally impossible — the
  # second pod would hang in Init forever waiting on PVC attach.
  #
  # Co-location rationale: Bulwark talks to Stalwart via JMAP; pinning
  # both to the same node minimises latency, and a shared failover
  # primitive (both Deployments move together on dr-watcher trigger)
  # keeps the mail stack as one atomic unit.
  #
  # Historical: prior config used topologySpread + replicas owned by
  # platform-storage-policy. Removed 2026-05-25 when the bulwark stuck-
  # in-Init bug was traced to that exact pattern (RWO PVC + replicas=2
  # + topologySpread = always-pending second pod).
  replicas: 1
  strategy:
    # Single-replica + Recreate. RollingUpdate with maxSurge=1 cannot
    # work — the surge pod would attempt to attach the same RWO PVC
    # while the old pod still holds it. Recreate ensures clean handoff.
    type: Recreate
  selector:
    matchLabels:
      app: bulwark
  template:
    metadata:
      labels:
        app: bulwark
        app.kubernetes.io/part-of: hosting-platform
        app.kubernetes.io/component: webmail
    spec:
      # nodeSelector is applied dynamically by platform-api's
      # applyDeploymentAffinity (see migration.ts) — same pattern as
      # the Stalwart Deployment. Bulwark follows the mailActiveNode
      # so a failover of one is a failover of both.
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        # fsGroup is critical — Bulwark writes to four subdirectories
        # under /app/data (admin/, settings/, telemetry/, version-check/).
        # A single PVC mount with fsGroup=1000 makes the entire tree
        # writable by the non-root container UID.
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # 2026-05-18: webmail feature-visibility CSS injection. Bulwark's
      # SPA <head> is React-rendered and there's no env-driven custom-
      # CSS hook in the v1.6.x image, so we append our overrides to the
      # bundled Tailwind CSS files that the SPA already loads. This
      # initContainer:
      #   1. Copies the pristine /app/.next/static/css/*.css from the
      #      image's read-only layer to an emptyDir.
      #   2. Appends the content of
      #      /feature-overrides/bulwark-overrides.css (mounted from the
      #      platform-managed ConfigMap) to every .css file in the dir.
      #   3. The main container mounts the same emptyDir at
      #      /app/.next/static/css, shadowing the image's pristine dir.
      #
      # When platform-api flips one of the feature flags, the reconciler
      # rewrites the ConfigMap content + stamps a
      # `insula.host/feature-css-hash` annotation on this
      # Deployment's pod template, which triggers a rolling restart that
      # re-runs this initContainer with the new ConfigMap content.
      initContainers:
        # A4 (2026-05-25): restore-state with FAST PATH from standby
        # DaemonSet + restic fallback (added 2026-05-25 follow-up).
        # Bulwark's /app/data subPath is empty on a fresh PVC
        # (failover landed on a new node, local-path provisioner
        # created a fresh dir). Cascade:
        #   1. FAST PATH from /standby-data/bulwark/ (sub-second copy).
        #   2. Restic restore from the same stalwart-snapshot-restic-repo
        #      Secret as Stalwart (slower but offsite-durable).
        #   3. Fresh-start (admin password reset; writes a
        #      `.fresh-started-at` sentinel that platform-api detects +
        #      surfaces to the operator).
        #
        # Image is mail-backup-tools (has restic + GNU date) instead
        # of alpine — needed for the restic fallback. Init runs once
        # + exits so image size is irrelevant.
        - name: restore-state
          image: ghcr.io/insulahq/insula/mail-backup-tools:latest # {"$imagepolicy": "flux-system:mail-backup-tools"}
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: stalwart-snapshot-restic-repo
                optional: true
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              SENTINEL=/app/data/admin/admin.json
              if [ -f "$$SENTINEL" ]; then
                echo "restore-state: admin.json exists — skipping restore"
                exit 0
              fi
              STANDBY=/standby-data/bulwark
              STANDBY_COMPLETE=/standby-data/.standby-complete
              # Gate on BOTH the admin.json sentinel AND the
              # .standby-complete marker — the marker is only written
              # by the A3 DaemonSet after both subtrees finish copying.
              # Protects against an interrupted DaemonSet run leaving
              # half a bulwark/ tree on disk (Bulwark would either
              # crash on missing settings/* or worse, accept a
              # zero-length admin.json).
              #
              # Max-age gate: same as Stalwart's restore-state. If the
              # standby DaemonSet has been down longer than the limit
              # (default 30 min), refuse the FAST PATH — fall through
              # to Bulwark's fresh-start path. Admin reset is annoying
              # but better than restoring frozen-state data without
              # the operator knowing.
              #
              # $$ ESCAPING: Bulwark's manifest goes through Flux
              # postBuild substituteFrom. Plain ${VAR} gets substituted
              # away (live bug observed 2026-05-25 — age + limit
              # appeared as empty in the rejection log). Double-$$
              # tells Flux to emit a literal $; the shell sees $VAR
              # at runtime.
              STANDBY_MAX_AGE_SECONDS=$${FAST_PATH_MAX_AGE_SECONDS:-1800}
              standby_age_ok=true
              if [ -f "$$STANDBY_COMPLETE" ]; then
                sentinel_epoch=$$(cat "$$STANDBY_COMPLETE" 2>/dev/null | tr -dc 0-9)
                : $${sentinel_epoch:=0}
                now_epoch=$$(date +%s)
                age=$$((now_epoch - sentinel_epoch))
                if [ "$$sentinel_epoch" = "0" ] || [ "$$age" -gt "$$STANDBY_MAX_AGE_SECONDS" ]; then
                  echo "restore-state: standby marker is $${age}s old (limit $${STANDBY_MAX_AGE_SECONDS}s) — rejecting FAST PATH, Bulwark fresh-starts"
                  standby_age_ok=false
                fi
              fi
              if [ "$$standby_age_ok" = "true" ] && [ -f "$$STANDBY_COMPLETE" ] && [ -d "$$STANDBY" ] && [ -f "$$STANDBY/admin/admin.json" ]; then
                echo "restore-state: FAST PATH — found pre-staged standby data at $$STANDBY (complete marker present, age within limit)"
                # Copy preserving ownership so Bulwark's UID 1000 can
                # read its own files (standby-replicate.sh ran the
                # earlier copy with -a preserving original UIDs).
                if cp -a "$$STANDBY/." /app/data/; then
                  echo "restore-state: standby-data copy complete ($$(find /app/data -type f -not -path '*/lost+found/*' | wc -l) files)"
                  exit 0
                fi
                echo "restore-state: standby-data copy failed — falling through to restic"
              fi
              # FAST PATH unavailable or copy-failed — try restic
              # restore from the offsite repo. Same path-detection
              # logic as Stalwart's restore-state (post-A2.5 snapshots
              # contain /var/lib/mail-stack/bulwark/).
              if [ -z "$$RESTIC_REPOSITORY" ]; then
                echo "RESTORE-STATE-WARNING: no standby + no RESTIC_REPOSITORY — Bulwark will FRESH-START (admin password reset). Operator action required."
                mkdir -p /app/data/admin
                echo "$$(date -Iseconds) reason=no-standby-no-restic" > /app/data/.fresh-started-at
                exit 0
              fi
              echo "restore-state: standby unavailable — attempting restic restore"
              mkdir -p /restore-tmp
              if ! restic restore latest --target /restore-tmp 2>&1; then
                echo "RESTORE-STATE-WARNING: restic restore failed — Bulwark will FRESH-START. Restic repo may be unreachable; check network + Secret."
                mkdir -p /app/data/admin
                echo "$$(date -Iseconds) reason=restic-restore-failed" > /app/data/.fresh-started-at
                exit 0
              fi
              RESTORED_BULWARK=/restore-tmp/var/lib/mail-stack/bulwark
              if [ ! -d "$$RESTORED_BULWARK" ]; then
                echo "RESTORE-STATE-WARNING: restic snapshot has no bulwark/ subdir (pre-A2.5 layout?) — Bulwark will FRESH-START"
                mkdir -p /app/data/admin
                echo "$$(date -Iseconds) reason=restic-no-bulwark-subdir" > /app/data/.fresh-started-at
                exit 0
              fi
              if ! cp -a "$$RESTORED_BULWARK/." /app/data/; then
                echo "RESTORE-STATE-WARNING: restic→PVC copy failed — Bulwark will FRESH-START"
                mkdir -p /app/data/admin
                echo "$$(date -Iseconds) reason=restic-copy-failed" > /app/data/.fresh-started-at
                exit 0
              fi
              echo "restore-state: restic restore complete ($$(find /app/data -type f -not -path '*/lost+found/*' | wc -l) files)"
              exit 0
          securityContext:
            # No runAsUser override — the Pod-level securityContext
            # (runAsNonRoot:true, runAsUser:1000) applies. Source
            # files in /standby-data/bulwark/ are already owned by
            # UID 1000 (restic restore preserved ownership; Bulwark
            # writes everything as 1000). cp -a from UID 1000 to a
            # 1000-owned dir produces 1000-owned files — no root
            # needed for ownership.
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: data
              mountPath: /app/data
              subPath: bulwark
            - name: standby-data
              mountPath: /standby-data
              readOnly: true
            # Scratch dir for restic restore. emptyDir because the
            # init container has readOnlyRootFilesystem:true.
            - name: restore-tmp
              mountPath: /restore-tmp
        - name: feature-css-injector
          image: ghcr.io/bulwarkmail/webmail@sha256:4ee0f0b505287555f814654fec12bd07c8bde098ee80a92b2dc13d556f576431
          imagePullPolicy: IfNotPresent
          # busybox-style sh is available in the Bulwark image (Alpine
          # base). The script is intentionally tiny + has no error
          # tolerance for the original-CSS copy (if that fails the Pod
          # would serve a broken UI — fail-fast). The append step is
          # tolerant of an empty override file (cat /dev/null → no-op).
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "[feature-css-injector] copying pristine CSS to overlay…"
              cp /app/.next/static/css/*.css /css-overlay/
              if [ -f /feature-overrides/bulwark-overrides.css ]; then
                echo "[feature-css-injector] appending bulwark-overrides.css to each CSS file"
                # Bulwark concatenates all .css under that dir into the
                # request response; appending to every file makes the
                # override unconditional regardless of which chunk a
                # given page loads.
                for f in /css-overlay/*.css; do
                  echo "" >> "$f"
                  cat /feature-overrides/bulwark-overrides.css >> "$f"
                done
                echo "[feature-css-injector] override applied ($(wc -c < /feature-overrides/bulwark-overrides.css) bytes)"
              else
                echo "[feature-css-injector] no overrides ConfigMap mount — Pod will serve upstream UI"
              fi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: css-overlay
              mountPath: /css-overlay
            - name: feature-overrides
              mountPath: /feature-overrides
              readOnly: true
      containers:
        - name: bulwark
          # ghcr.io/bulwarkmail/webmail@sha256:4ee0f0b5... — Bulwark
          # v1.6.7 stable (2026-05-17). First stable release with the
          # /api/auth/impersonate route (issue #296). Bump per ADR-039.
          image: ghcr.io/bulwarkmail/webmail@sha256:4ee0f0b505287555f814654fec12bd07c8bde098ee80a92b2dc13d556f576431
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
          env:
            # JMAP server URL — must be browser-reachable because
            # Bulwark's SPA fetches `${JMAP_SERVER_URL}/.well-known/jmap`
            # tenant-side after login. Overlays override per env.
            - name: JMAP_SERVER_URL
              value: "https://stalwart.${DOMAIN}"
            - name: ALLOW_CUSTOM_JMAP_ENDPOINT
              value: "false"
            - name: STALWART_FEATURES
              value: "true"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: NODE_ENV
              value: "production"
            - name: SETTINGS_SYNC_ENABLED
              value: "true"
            - name: ADMIN_DATA_DIR
              value: "/app/data/admin"
            - name: SETTINGS_DATA_DIR
              value: "/app/data/settings"
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bulwark-secrets
                  key: ADMIN_PASSWORD
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: bulwark-secrets
                  key: SESSION_SECRET
            # Impersonation envs (Bulwark issue #296). When all three are
            # set Bulwark exposes GET /api/auth/impersonate?token=<jwt>.
            # JWT contract: HS256, ≥32-char secret, claims
            # {iss="platform-api/webmail", iat, exp, jti, mailbox};
            # lifetime ≤300s; replay-protected via in-memory jti LRU.
            # BULWARK_JWT_AUTH_SECRET MUST equal platform-api's
            # WEBMAIL_JWT_SECRET so platform-api can sign tokens Bulwark
            # verifies. bootstrap.sh generates one shared value.
            - name: BULWARK_JWT_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: bulwark-secrets
                  key: BULWARK_JWT_AUTH_SECRET
            # 2026-05-28: read Stalwart master credentials DIRECTLY
            # from mail-secrets — same Secret that Roundcube and the
            # tenant-bundle Jobs use. Previously these two keys were
            # mirrored into bulwark-secrets at bootstrap and the mirror
            # could drift on every rotation (rotateWebmailMasterPassword
            # only patches mail-secrets). With a direct reference the
            # mirror disappears entirely.
            #
            # Env var names are STALWART_MASTER_USER + STALWART_MASTER_PASSWORD
            # (NOT prefixed BULWARK_*) — that's what the upstream Bulwark
            # /api/auth/impersonate route reads (see
            # docs/06-features/BULWARK_UPSTREAM_ISSUE.md). The
            # BULWARK_STALWART_* names previously here were wrapper-
            # invented and Bulwark would not have found them.
            - name: STALWART_MASTER_USER
              valueFrom:
                secretKeyRef:
                  name: mail-secrets
                  key: STALWART_MASTER_USER
            - name: STALWART_MASTER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mail-secrets
                  key: STALWART_MASTER_PASSWORD
            # Issuer claim Bulwark checks against (defaults to
            # "platform-api/webmail" in the route handler — set
            # explicitly so the contract is self-documenting on
            # both sides).
            - name: BULWARK_JWT_AUTH_ISSUER
              value: "platform-api/webmail"
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /app/data
              # A2.5 (2026-05-25): consolidated mail-stack PVC. Bulwark
              # subtree at subPath=bulwark; Stalwart sees the parent dir
              # via subPath=stalwart. Both mount the same mail-stack-data
              # PVC on the active mail node.
              subPath: bulwark
            # 2026-05-18: shadow /app/.next/static/css with the
            # initContainer-prepared CSS (pristine bundle + appended
            # feature-visibility overrides). The image's layer is read-
            # only; this mount replaces it for the running Pod.
            - name: css-overlay
              mountPath: /app/.next/static/css
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 36
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            # A2.5 (2026-05-25): switched from the old Longhorn `bulwark-data`
            # PVC to the consolidated `mail-stack-data` local-path PVC.
            # Co-located with Stalwart on mailActiveNode. Legacy bulwark-data
            # PVC is kept for 48-72h safety period (see
            # docs/02-operations/MAIL_STACK_CONSOLIDATION.md Stage 3).
            claimName: mail-stack-data
        # 2026-05-18: ephemeral scratch space the initContainer
        # populates with the modified CSS. Replaced on every Pod start.
        - name: css-overlay
          emptyDir:
            sizeLimit: 4Mi
        # Webmail feature-visibility ConfigMap, mounted into the
        # initContainer only. Reconciled by platform-api's
        # webmail-feature-css scheduler (see ADR-039 + the module at
        # backend/src/modules/webmail-feature-css/).
        - name: feature-overrides
          configMap:
            name: webmail-feature-overrides
            optional: false
        # A4 (2026-05-25): standby DaemonSet's hostPath. Only mounted
        # into the restore-state init container — main Bulwark
        # container does NOT see it (data is copied into the PVC).
        - name: standby-data
          hostPath:
            path: /var/lib/mail-stack-standby
            type: DirectoryOrCreate
        # Scratch dir for restic restore (init container only).
        # Sized 200Mi — Bulwark's bulwark/ subtree is ~60 KB; restic
        # restore writes nested var/lib/mail-stack/ tree then we cp
        # to /app/data. Pod-lifecycle ephemeral.
        - name: restore-tmp
          emptyDir:
            sizeLimit: 200Mi
