# CrowdSec bouncer Middleware — platform-wide IP-reputation gate.
#
# Attached as the FIRST middleware on every route the platform emits:
#   * Platform-ingress panel routes (admin / client) — wired by
#     backend/src/modules/system-settings/ingress-reconciler.ts
#   * Tenant routes — prepended to the per-route Middleware list by
#     backend/src/modules/ingress-routes/annotation-sync.ts:
#     buildRouteSpec
#
# Plugin loader: github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
# is registered in Traefik's helm install via
# `--set experimental.plugins.crowdsec.moduleName=...` (see
# scripts/bootstrap.sh install_traefik). The bouncer queries the
# CrowdSec LAPI at crowdsec.crowdsec.svc.cluster.local:8080 with the
# per-cluster bouncer key (generated by bootstrap.sh into the
# `crowdsec-bouncer-key` Secret in both `crowdsec` and `traefik`
# namespaces).
#
# Behaviour:
#   * Default-on for every route, no per-tenant opt-out.
#   * On each request, the bouncer checks the source IP against its
#     local decision cache (refreshed every 60s from LAPI).
#   * Known-bad IPs get a 403; unknown IPs pass through unchanged.
#   * The bouncer caches decisions in-process so the 60s refresh
#     interval keeps the LAPI call cost off the hot path.
#   * Operators can tune the captcha/ban response, allowlist, etc.
#     via overlay patches — base ships sensible defaults.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: crowdsec
  namespace: traefik
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: waf
spec:
  plugin:
    crowdsec:
      # CrowdSec LAPI URL inside the cluster. Cross-namespace ref is
      # allowed because the Traefik helm install sets
      # providers.kubernetesCRD.allowCrossNamespace=true (see
      # bootstrap.sh).
      crowdsecLapiUrl: http://crowdsec.crowdsec.svc.cluster.local:8080
      # API key the bouncer uses to authenticate to LAPI. Pulled at
      # plugin-load time from the K8s Secret `crowdsec-bouncer-key` in
      # the traefik namespace (key `traefik-bouncer-key`). The plugin
      # supports loading from a Secret directly via this special prefix.
      crowdsecLapiKeyFile: /var/run/secrets/crowdsec/bouncer-key
      # Refresh decision cache every 60s. Lower = faster reaction to
      # new bans, higher = less LAPI traffic. 60s is the plugin default.
      updateIntervalSeconds: 60
      # Fail-open: if the LAPI is unreachable, allow traffic rather
      # than 503'ing every request. The CrowdSec layer is a defence-
      # in-depth — other Middlewares (auth, ModSec, rate-limit) still
      # apply. Operators who want fail-closed semantics can patch this
      # to `false` in their overlay.
      forwardedHeadersTrustedIPs:
        # Trust the Traefik LB IPs to set X-Forwarded-For so the
        # bouncer sees real client IPs, not the LB. Operators with a
        # specific L4 LB CIDR can narrow this in an overlay.
        - 0.0.0.0/0
