# Coraza WAF Middlewares — DOCUMENTED DEAD CODE (do NOT include in
# kustomization).
#
# 2026-05-14 smoke test established that no working in-process Coraza
# plugin exists for Traefik today:
#   * Yaegi-interpreted vendored plugin (hatsat32/coraza-traefik) fails
#     to load — Coraza imports `unsafe` which Yaegi does not implement.
#   * WASM plugin (corazawaf/coraza-http-wasm v0.2.2 + v0.3.0) loads
#     successfully but Traefik panics on startup with
#     `runtime: split stack overflow` (wazero × Coraza incompatibility).
# See docker/traefik-plugin-coraza/README.md for the full trace.
#
# The production WAF path now runs through:
#   * k8s/base/modsecurity-crs/        — OWASP ModSecurity-CRS sidecar
#   * k8s/base/traefik/middlewares-modsecurity.yaml — madebymode plugin
#     fronting the sidecar
# annotation-sync.ts emits `modsecurity-crs@traefik` for wafEnabled
# routes; the per-route Coraza emitter is gone.
#
# This file remains in tree as documented dead code: when upstream
# Coraza-on-Traefik stabilises (the WASM crash is fixed, OR a Yaegi-
# compatible Coraza fork lands), the migration path is:
#   1. Re-add middlewares-waf.yaml to kustomization.yaml resources.
#   2. Flip annotation-sync's WAF branch back to option-C hybrid
#      (per-route Middlewares + shared coraza-base).
#   3. Flip the platform WAF middleware ref from `modsecurity-crs` back
#      to `coraza-platform` in ingress-reconciler.ts.
# No schema / DB / API contract change needed.
#
# ORIGINAL HEADER (preserved for context — IGNORE the directives, they
# don't load at runtime today):
#
# Coraza is the open-source ModSecurity-compatible WAF engine; we run
# it inside Traefik via the Coraza HTTP WASM Traefik plugin (enabled in
# the Helm chart values — see `experimental.plugins.coraza` in
# scripts/bootstrap.sh install_traefik()).
#
# Two base Middlewares — option-C hybrid design:
#   * coraza-base@traefik   — shared OWASP CRS for tenant routes that
#                              opt in (wafEnabled=1) without per-route
#                              overrides. Every tenant route that toggles
#                              WAF on (and has no excluded rules / non-
#                              default threshold) references THIS name.
#                              One Coraza engine instance covers all of
#                              them, keeping per-pod memory bounded.
#   * coraza-platform@traefik — platform-ingress (admin / client panel)
#                              variant. Same CRS but with the
#                              platform-specific exclusions baked in:
#                                - 911100 (Method Not Allowed) — admin
#                                  uses DELETE/PATCH/PUT
#                                - 920420 (Disallowed Content-Type) —
#                                  the File Manager streams binary
#                                  uploads as application/octet-stream
#
# Tenant routes that DO have per-route customisation (wafExcludedRules
# or wafAnomalyThreshold != 10) get a `coraza-r-<routeId>` Middleware
# emitted by annotation-sync.ts; the cost is one extra Coraza engine
# per customised route, paid in trade for cleaner schema mapping.
#
# Directives use the OWASP CRS v4 distribution that ships with the
# Coraza plugin. Operators with stricter requirements can patch the
# directives in their overlay; the base values target the cluster's
# default profile.
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: coraza-base
  namespace: traefik
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: waf
spec:
  plugin:
    coraza:
      directives: |
        Include @coraza.conf-recommended
        Include @crs-setup.conf.example
        Include @owasp_crs/*.conf
        SecRuleEngine On
        SecResponseBodyAccess Off
        SecRequestBodyAccess On
        SecRequestBodyLimit 52428800
        SecRequestBodyNoFilesLimit 131072
        # Anomaly-scoring threshold. Lower = stricter.
        SecAction "id:900110,phase:1,nolog,pass,t:none,setvar:tx.inbound_anomaly_score_threshold=10"
        SecAction "id:900120,phase:1,nolog,pass,t:none,setvar:tx.outbound_anomaly_score_threshold=5"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: coraza-platform
  namespace: traefik
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: waf
spec:
  plugin:
    coraza:
      directives: |
        Include @coraza.conf-recommended
        Include @crs-setup.conf.example
        Include @owasp_crs/*.conf
        SecRuleEngine On
        SecResponseBodyAccess Off
        SecRequestBodyAccess On
        SecRequestBodyLimit 52428800
        SecRequestBodyNoFilesLimit 131072
        # Admin panel uses DELETE/PATCH/PUT — relax CRS 911100.
        SecRuleRemoveById 911100
        # File-manager upload-raw uses application/octet-stream —
        # relax CRS 920420.
        SecRuleRemoveById 920420
        SecAction "id:900110,phase:1,nolog,pass,t:none,setvar:tx.inbound_anomaly_score_threshold=10"
        SecAction "id:900120,phase:1,nolog,pass,t:none,setvar:tx.outbound_anomaly_score_threshold=5"
