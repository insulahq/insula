# Production Flux Kustomization — tracks a TAG-PINNED GitRepository
# (ADR-045 Decision 10: the `stable` branch is retired).
#
# Deployment flow (pull model):
#   1. Operator cuts a release (scripts/cut-release.sh) → release.yml
#      builds + cosign-signs images/binaries → GitHub Release vYYYY.M.PATCH.
#   2. The W11 version-poller on each production cluster fetches Releases
#      hourly, signature-verifies, and surfaces `available` in
#      /platform/upgrades.
#   3. Operator clicks Apply (or `platform-ops cluster upgrade`) →
#      pre-flight gates → W13 re-pins the GitRepository spec.ref.tag →
#      Flux rolls → post-flight convergence check (abort → rollback).
#
# The operator approval IS the gate — no branch merge, no
# suspend/unsuspend needed.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: hosting-platform-production
  namespace: flux-system
spec:
  interval: 5m
  path: ./k8s/overlays/production
  prune: true
  sourceRef:
    kind: GitRepository
    name: hosting-platform-production
  # Operator-domain templating — same path staging uses (see
  # kustomization-staging.yaml). Production overlay's ingress-patch.yaml
  # and platform-config-patch.yaml already reference ${DOMAIN}, so the
  # ConfigMap is required for those to render correctly. bootstrap.sh
  # creates platform-cluster-config in the flux-system namespace at
  # install time.
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: platform-cluster-config
        optional: false
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: platform-api
      namespace: platform
    - apiVersion: apps/v1
      kind: Deployment
      name: admin-panel
      namespace: platform
    - apiVersion: apps/v1
      kind: Deployment
      name: tenant-panel
      namespace: platform
  timeout: 5m
