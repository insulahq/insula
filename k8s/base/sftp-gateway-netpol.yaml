# NetworkPolicy: restrict access to the backend's internal SFTP routes.
# Only the sftp-gateway pod is allowed to reach the backend on port 3000
# for /api/v1/internal/sftp/* endpoints. This is enforced at the network
# layer (Calico/Cilium) in addition to the X-Internal-Auth header check.
#
# NOTE: This policy restricts ingress to the backend pod. Since the backend
# also serves public API traffic, this policy ALLOWS traffic from all pods
# with the app=sftp-gateway label AND from the ingress controller. Adjust
# the ingress-controller selector for your CNI.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-allow-sftp-gateway
  namespace: platform
spec:
  podSelector:
    matchLabels:
      app: platform-api
  policyTypes:
    - Ingress
  ingress:
    # Allow sftp-gateway → backend (internal SFTP auth).
    # The gateway runs in the `platform-system` namespace, so the peer
    # MUST scope by namespaceSelector AND podSelector together. A bare
    # podSelector (no namespaceSelector) only matches pods in the policy's
    # OWN namespace (`platform`), where no sftp-gateway pod ever runs — so
    # this rule previously matched nothing and the gateway reached the
    # backend only via the broader intra-platform allow, leaving the
    # internal SFTP endpoints unscoped at the network layer (the
    # X-Internal-Auth header was the only gate). Scoping it correctly
    # restores defense-in-depth.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform-system
          podSelector:
            matchLabels:
              app: sftp-gateway
      ports:
        - port: 3000
          protocol: TCP
    # Allow ingress controller → backend (public API).
    # Traefik migration 2026-05-15: scoped to the `traefik` namespace +
    # Traefik DS pods (was `ingress-nginx` ns + `app.kubernetes.io/name=
    # ingress-nginx` pod selector). Traefik runs as a DaemonSet labelled
    # `app.kubernetes.io/name=traefik`.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - port: 3000
          protocol: TCP
