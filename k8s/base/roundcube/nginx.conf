# nginx sidecar config for the Roundcube fpm-alpine pod.
#
# Phase 4 (2026-06-20): Roundcube moved from the official apache image
# (Debian base → 700+ HIGH/CRITICAL base-OS CVEs) to the fpm-alpine image
# (0 CVE) + this nginx:alpine sidecar (also 0 CVE). nginx serves the static
# webroot and proxies *.php to php-fpm on 127.0.0.1:9000 over the shared
# `install` emptyDir, so SCRIPT_FILENAME paths match in both containers.
#
# Listens on 8080 (unprivileged) so the sidecar needs no NET_BIND_SERVICE.
# The Service's named `targetPort: http` resolves to the container port named
# `http` (8080) — no Service change needed.
server {
    listen 8080;
    server_name _;

    # Roundcube 1.6 reorganised its front controller under public_html/.
    root /var/www/html/public_html;
    index index.php;

    # Mail attachments — the apache image defaulted higher than nginx's 1m.
    client_max_body_size 25M;

    # nginx-only liveness endpoint: answers without touching php-fpm, so a
    # cold/restarting fpm doesn't cause the kubelet to kill nginx too.
    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        # Roundcube can be slow on large IMAP folder syncs / attachment sends.
        fastcgi_read_timeout 300;
    }

    # Defence-in-depth: Roundcube's sensitive dirs already live OUTSIDE
    # public_html (one level up, unreachable via the docroot), but deny them
    # explicitly in case a future layout change exposes them.
    location ~ ^/(config|temp|logs|SQL|bin|vendor)/ { deny all; }
    location ~ /\.(?!well-known) { deny all; }
}
