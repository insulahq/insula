apiVersion: apps/v1
kind: Deployment
metadata:
  name: roundcube
  namespace: mail
  labels:
    app: roundcube
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: webmail
  annotations:
    # 2026-05-18: Flux SSA merge mode lets platform-api stamp
    # spec.template.metadata.annotations[insula.host/feature-css-hash]
    # (set by webmail-feature-css reconciler) without Flux reverting
    # it on the next sync. Without this annotation Flux would
    # overwrite the pod-template annotation every ~60s, preventing
    # rolling restarts when the feature-visibility CSS changes —
    # the same arrangement Bulwark already has.
    kustomize.toolkit.fluxcd.io/ssa: Merge
spec:
  # Cut 3 (2026-05-04): replicas removed from manifest — owned by the
  # platform-storage-policy reconciler. Apply HA scales Roundcube to
  # readyServerCount (capped at MAX_HA_REPLICAS). Fresh clusters land
  # at k8s default = 1 until the policy fires.
  strategy:
    # Phase 3.A.5: RollingUpdate is safe because session state lives in
    # the shared Postgres DB, not on a RWO PVC. maxSurge=1/Unavailable=0
    # gives zero-downtime rollouts on multi-replica deployments.
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: roundcube
  template:
    metadata:
      labels:
        app: roundcube
        app.kubernetes.io/part-of: hosting-platform
        app.kubernetes.io/component: webmail
    spec:
      # Spread replicas across server-role nodes so a node failure
      # leaves at least one Roundcube pod scheduled. DoNotSchedule
      # (changed from ScheduleAnyway 2026-05-07): keeps placement
      # strictly one-per-node so a node-failure window doesn't leave
      # 2 pods on one surviving node + 0 on another. Single-node /
      # under-populated clusters still come up cleanly because Apply
      # HA pegs replicas=readyServerCount; replicas <= node count
      # means DoNotSchedule never blocks.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: roundcube
      terminationGracePeriodSeconds: 30
      containers:
        # ── php-fpm: Roundcube application (fpm-alpine, 0 base CVEs) ──
        # Phase 4 (2026-06-20): migrated off the official apache image
        # (Debian base = 700+ HIGH/CRITICAL base-OS CVEs) to fpm-alpine
        # (0 CVE) served by the nginx:alpine sidecar below. php-fpm listens
        # on 127.0.0.1:9000; nginx serves the static webroot + proxies *.php.
        - name: roundcube
          # Pinned by sha256 digest so a same-tag re-push can't silently
          # change the running image. Bump this when an upstream release
          # fixes a CVE or ships a feature we want. Get the digest:
          #   docker pull roundcube/roundcubemail:1.6.16-fpm-alpine
          #   docker inspect --format='{{index .RepoDigests 0}}' roundcube/roundcubemail:1.6.16-fpm-alpine
          image: roundcube/roundcubemail@sha256:bde2220178fdaf78c8217d10d8bae6536076af1d8a91c69911b464d18fb4977c
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            # php-fpm master runs as root and drops workers to www-data
            # (SETUID/SETGID); the wrapper chowns plugin/branding files into
            # the webroot (CHOWN/DAC_OVERRIDE). No NET_BIND_SERVICE — fpm
            # binds the unprivileged port 9000, not 80.
            capabilities:
              drop:
                - ALL
              add:
                - SETUID
                - SETGID
                - CHOWN
                - DAC_OVERRIDE
          # Custom command: run the original entrypoint, then asynchronously
          # install the jwt_auth plugin once /var/www/html is populated. The
          # plugin must exist before any request hits the login form.
          command:
            - /bin/sh
            - -c
            - |
              set -e
              (
                while [ ! -f /var/www/html/index.php ]; do sleep 0.5; done
                mkdir -p /var/www/html/plugins/jwt_auth
                cp -f /jwt-plugin/jwt_auth.php /var/www/html/plugins/jwt_auth/jwt_auth.php
                chown -R www-data:www-data /var/www/html/plugins/jwt_auth 2>/dev/null || true
                echo "[jwt_auth] plugin installed"
                # Platform branding assets + plugin install. Apache's
                # DocumentRoot is /var/www/html/public_html/ (Roundcube
                # 1.6 reorganised). Roundcube's .htaccess sets
                # `Options +SymLinksIfOwnerMatch` which refuses to
                # follow symlinks whose target is owned by a different
                # uid than the link itself — so we copy the assets
                # DIRECTLY into the docroot rather than maintaining a
                # parallel /var/www/html/branding/ + symlink.
                mkdir -p /var/www/html/public_html/branding /var/www/html/plugins/platform_branding
                cp -f /branding-src/branding.css /var/www/html/public_html/branding/branding.css
                cp -f /branding-src/logo.svg /var/www/html/public_html/branding/logo.svg
                cp -f /branding-src/platform_branding.php /var/www/html/plugins/platform_branding/platform_branding.php
                # 2026-05-18: webmail feature-visibility CSS. The
                # roundcube-overrides.css key in the
                # webmail-feature-overrides ConfigMap is filled by
                # platform-api's reconciler based on platform_settings
                # webmail_show_{contacts,calendar,files}. Append it to
                # branding.css so it gets injected on every page via
                # the platform_branding plugin's existing add_header
                # hook. Empty file = upstream UI ships unchanged.
                if [ -f /feature-overrides/roundcube-overrides.css ]; then
                  echo "" >> /var/www/html/public_html/branding/branding.css
                  cat /feature-overrides/roundcube-overrides.css >> /var/www/html/public_html/branding/branding.css
                  echo "[branding] feature-css overrides appended ($(wc -c < /feature-overrides/roundcube-overrides.css) bytes)"
                fi
                chown -R www-data:www-data /var/www/html/public_html/branding /var/www/html/plugins/platform_branding 2>/dev/null || true
                echo "[branding] assets + plugin installed"
              ) &
              exec /docker-entrypoint.sh php-fpm
          env:
            # Stalwart connection details (IMAPS and submission, both go to
            # the same in-cluster service in the mail namespace)
            - name: ROUNDCUBEMAIL_DEFAULT_HOST
              value: "ssl://stalwart-mail.mail.svc.cluster.local"
            - name: ROUNDCUBEMAIL_DEFAULT_PORT
              value: "993"
            - name: ROUNDCUBEMAIL_SMTP_SERVER
              value: "ssl://stalwart-mail.mail.svc.cluster.local"
            - name: ROUNDCUBEMAIL_SMTP_PORT
              value: "465"
            # Phase 3.A.5: Postgres backend for Roundcube session /
            # contacts / identities / cache. Replaces the old SQLite
            # on RWO PVC, which blocked RollingUpdate deploys.
            # The `roundcube` database and user are created by the
            # postgres initdb script in scripts/postgres-initdb/
            # (dev) or by operator bootstrap (prod).
            - name: ROUNDCUBEMAIL_DB_TYPE
              value: "pgsql"
            - name: ROUNDCUBEMAIL_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: mail-secrets
                  key: ROUNDCUBEMAIL_DB_HOST
            - name: ROUNDCUBEMAIL_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: mail-secrets
                  key: ROUNDCUBEMAIL_DB_PORT
            - name: ROUNDCUBEMAIL_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: mail-secrets
                  key: ROUNDCUBEMAIL_DB_NAME
            - name: ROUNDCUBEMAIL_DB_USER
              valueFrom:
                secretKeyRef:
                  name: mail-secrets
                  key: ROUNDCUBEMAIL_DB_USER
            - name: ROUNDCUBEMAIL_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mail-secrets
                  key: ROUNDCUBEMAIL_DB_PASSWORD
            # Plugins to enable (comma-separated). jwt_auth is what makes SSO work.
            - name: ROUNDCUBEMAIL_PLUGINS
              value: "archive,zipdownload,jwt_auth"
            - name: ROUNDCUBEMAIL_SKIN
              value: "elastic"
            # Cosmetic
            - name: ROUNDCUBEMAIL_USERNAME_DOMAIN
              value: ""
            # JWT plugin secrets
            - name: JWT_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: mail-secrets
                  key: JWT_AUTH_SECRET
            - name: STALWART_MASTER_USER
              valueFrom:
                secretKeyRef:
                  name: mail-secrets
                  key: STALWART_MASTER_USER
            - name: STALWART_MASTER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mail-secrets
                  key: STALWART_MASTER_PASSWORD
            # Roundcube session/cred encryption key
            - name: ROUNDCUBEMAIL_DES_KEY
              valueFrom:
                secretKeyRef:
                  name: mail-secrets
                  key: ROUNDCUBEMAIL_DES_KEY
          ports:
            - containerPort: 9000
              name: fpm
              protocol: TCP
          volumeMounts:
            # Roundcube install dir — emptyDir, repopulated by the entrypoint
            # on every boot from /usr/src/roundcubemail/. The plugin gets
            # injected by our wrapper script. Shared (read-only) with the
            # nginx sidecar so it can serve the static webroot.
            - name: install
              mountPath: /var/www/html
            # Phase 3.A.5: ephemeral scratch dir where the Roundcube
            # entrypoint writes its config files. Previously a RWO PVC
            # holding SQLite; now an emptyDir since session state lives
            # in Postgres. This unblocks RollingUpdate deploys.
            - name: data
              mountPath: /var/roundcube
            # Mount the plugin source as a read-only file (the wrapper script
            # copies it to the install dir at startup)
            - name: jwt-plugin
              mountPath: /jwt-plugin
              readOnly: true
            # Extra config files (entrypoint includes anything matching
            # /var/roundcube/config/*.php). We use a subPath mount so other
            # writable files in /var/roundcube/config/ aren't shadowed.
            - name: config-extra
              mountPath: /var/roundcube/config/jwt_auth.inc.php
              subPath: jwt_auth.inc.php
              readOnly: true
            # Platform branding bundle. The CSS + SVG get copied into
            # /var/www/html/branding/ at startup by the wrapper script;
            # the .inc.php is loaded by the Roundcube entrypoint via
            # the same `*.inc.php` glob that picks up jwt_auth.inc.php
            # (subPath again so it doesn't shadow the writable dir).
            - name: branding-src
              mountPath: /branding-src
              readOnly: true
            - name: branding-config
              mountPath: /var/roundcube/config/branding.inc.php
              subPath: branding.inc.php
              readOnly: true
            # 2026-05-18: webmail feature-visibility CSS, written by
            # platform-api's webmail-feature-css reconciler. Appended
            # to /var/www/html/public_html/branding/branding.css by
            # the wrapper script so the platform_branding plugin's
            # existing <link> tag picks up the hide rules.
            - name: feature-overrides
              mountPath: /feature-overrides
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              # 2026-05-07: dropped from 128Mi → 64Mi after staging
              # measurement showed idle pods at 36-39Mi resident.
              # Roundcube is sessionless (Phase 3.A.5 moved sessions
              # to Postgres) so memory scales with concurrent active
              # webmail users, not total mailboxes. The 512Mi limit
              # gives headroom for burst load; the request only
              # needs to cover idle + a few connections.
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # startupProbe uses exec to wait for Roundcube's files to be
          # populated in /var/www/html AND our jwt_auth + branding assets to
          # be copied into place by the wrapper script. This closes the race
          # where php-fpm could answer /?_jwt=... before the background copy
          # finished. nginx's readiness (below) gates user-facing traffic on
          # top of this. The image ships no wget/curl, so file tests only.
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  test -f /var/www/html/index.php \
                    && test -f /var/www/html/plugins/jwt_auth/jwt_auth.php \
                    && test -f /var/www/html/plugins/platform_branding/platform_branding.php \
                    && test -f /var/www/html/public_html/branding/branding.css \
                    && test -f /var/www/html/public_html/branding/logo.svg
            failureThreshold: 30
            periodSeconds: 5
          # php-fpm speaks FastCGI, not HTTP — probe the TCP socket. The pod
          # only becomes Ready once BOTH this and nginx's HTTP readiness pass.
          readinessProbe:
            tcpSocket:
              port: fpm
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: fpm
            initialDelaySeconds: 30
            periodSeconds: 30
        # ── nginx: 0-CVE static server + FastCGI proxy to php-fpm ──
        - name: nginx
          image: nginx:1.30-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            # Listens on 8080 (unprivileged); the master spawns workers as
            # the `nginx` user (SETUID/SETGID). No NET_BIND_SERVICE needed.
            capabilities:
              drop:
                - ALL
              add:
                - SETUID
                - SETGID
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          volumeMounts:
            # Shared webroot (read-only) — populated by the php-fpm container's
            # entrypoint + wrapper. Same path in both containers so FastCGI
            # SCRIPT_FILENAME resolves identically.
            - name: install
              mountPath: /var/www/html
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          # readiness hits `/` → proxied to php-fpm, so the pod is Ready only
          # when the app actually serves. liveness uses the nginx-only health
          # endpoint so a cold php-fpm doesn't trigger an nginx restart loop.
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: install
          emptyDir: {}
        - name: data
          emptyDir: {}
        # nginx sidecar config (generated ConfigMap — hash change rolls pods).
        - name: nginx-conf
          configMap:
            name: roundcube-nginx
            items:
              - key: nginx.conf
                path: default.conf
        - name: jwt-plugin
          configMap:
            name: roundcube-jwt-plugin
            items:
              - key: jwt_auth.php
                path: jwt_auth.php
        - name: config-extra
          configMap:
            name: roundcube-config-extra
            items:
              - key: jwt_auth.inc.php
                path: jwt_auth.inc.php
        # Platform branding — single ConfigMap holds CSS + SVG +
        # branding.inc.php; mounted twice so the assets land in the
        # webroot copy-source dir while branding.inc.php lands in
        # /var/roundcube/config/ for the entrypoint loader.
        - name: branding-src
          configMap:
            name: roundcube-branding
            items:
              - key: branding.css
                path: branding.css
              - key: logo.svg
                path: logo.svg
              - key: platform_branding.php
                path: platform_branding.php
        - name: branding-config
          configMap:
            name: roundcube-branding
            items:
              - key: branding.inc.php
                path: branding.inc.php
        # 2026-05-18: webmail feature-visibility CSS overrides.
        # Reconciled by platform-api (see ADR-039 +
        # backend/src/modules/webmail-feature-css/). Empty default
        # ships unchanged upstream UI.
        - name: feature-overrides
          configMap:
            name: webmail-feature-overrides
            optional: false
