<?xml version="1.0" encoding="UTF-8"?>
<!--
  Placeholder platform wordmark. Renders at the elastic skin's logo
  slot (login page header + top-bar). Swap in a real SVG when a
  designer-produced asset arrives — same path/dimensions and the
  skin_logo config in branding.inc.php picks it up automatically.

  Brand colors: #0066cc primary (matches admin panel brand-500),
  with #00663d accent on the envelope motif.

  Viewbox sized 240×60 so it slots into elastic's default logo
  height (~40px) without distortion.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60" role="img" aria-label="Hosting Platform Webmail">
  <!-- Mail-envelope mark -->
  <g transform="translate(8 14)">
    <rect x="0" y="0" width="32" height="22" rx="3" fill="#0066cc"/>
    <path d="M0 2 L16 14 L32 2" fill="none" stroke="#ffffff" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="28" cy="6" r="3" fill="#00663d" stroke="#ffffff" stroke-width="1"/>
  </g>
  <!-- Wordmark -->
  <text x="48" y="30" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="600" fill="#0066cc" letter-spacing="-0.01em">Hosting Platform</text>
  <text x="48" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Webmail</text>
</svg>
