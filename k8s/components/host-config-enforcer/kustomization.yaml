# host-config-enforcer — Kustomize Component (W10 / ADR-045).
#
# OPT-IN privileged host-config converger. Include this component in an overlay
# to enable host-config ENFORCEMENT on that environment:
#
#   # k8s/overlays/<env>/kustomization.yaml
#   components:
#     - ../../components/host-config-enforcer
#
# It deploys a privileged DaemonSet (HOSTCONFIG_ROLE=converge) ALONGSIDE the
# always-on observe-only detector. Even when enabled, it DRY-RUNS until the
# operator sets host-config-desired.data.mode=enforce. NOT in any default base
# or overlay — a default install has no privileged host-writer.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
  - rbac.yaml
  - daemonset.yaml
