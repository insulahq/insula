# host-config-enforcer — OPT-IN PRIVILEGED host-config converger (W10 / ADR-045).
#
# This is the WRITE half of the host-config-reconciler, deliberately shipped as
# a SEPARATE, OPT-IN kustomize component (k8s/components/host-config-enforcer/)
# that is NOT in the default base. The locked-down observe-only detector
# (k8s/base/host-config-reconciler/) keeps running everywhere and writes NO host
# state; this enforcer is deployed ONLY on clusters that explicitly opt into
# convergence. So a default install has NO privileged host-writer at all.
#
# TWO independent gates before any host byte is written:
#   1. This component must be enabled (opt-in) — otherwise the enforcer pod does
#      not exist.
#   2. host-config-desired.data.mode must equal "enforce" — otherwise this pod
#      DRY-RUNS (reports what it would converge, writes nothing). Default is
#      dry-run, so even a freshly enabled enforcer never writes until the
#      operator flips the policy.
#
# In-code safety (enforcer.go): only allow-listed sysctls (net/vm/fs/kernel) are
# ever written; the write path re-checks the allow-list + a /proc/sys path-
# containment guard, so a non-allow-listed or path-escaping key is refused even
# if the converge loop is buggy.
#
# Privilege: the SAME image as the detector, run with HOSTCONFIG_ROLE=converge.
# It needs CAP_SYS_ADMIN (write global vm/fs/kernel sysctls) + CAP_NET_ADMIN
# (write net.* in the host netns) + hostNetwork (so net.* targets the host's
# netns) + a RW /proc/sys mount. NOTHING else: no /etc, no /lib/modules, no
# hostPID/hostIPC, no full `privileged`. readOnlyRootFilesystem stays on.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: host-config-enforcer
  namespace: platform-system
  labels:
    app: host-config-enforcer
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: host-config-enforcer
spec:
  selector:
    matchLabels:
      app: host-config-enforcer
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: host-config-enforcer
    spec:
      serviceAccountName: host-config-enforcer
      # net.* sysctls are netns-scoped — write them in the HOST netns.
      hostNetwork: true
      hostPID: false
      hostIPC: false
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      priorityClassName: system-node-critical
      containers:
        - name: enforcer
          image: ghcr.io/insulahq/insula/host-config-reconciler:latest # {"$imagepolicy": "flux-system:host-config-reconciler"}
          imagePullPolicy: Always
          env:
            - name: HOSTCONFIG_ROLE
              value: "converge"
            # hostNetwork → the health server binds the HOST's loopback, so use a
            # distinct port from the observe detector's :8083.
            - name: HEALTH_PORT
              value: "8084"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HOSTCONFIG_INTERVAL_SECONDS
              value: "60"
          ports:
            - name: healthz
              containerPort: 8084
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          securityContext:
            # Least privilege for sysctl writes — NOT full `privileged`.
            capabilities:
              drop: ["ALL"]
              add: ["SYS_ADMIN", "NET_ADMIN"]
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            privileged: false
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 96Mi
          volumeMounts:
            # The ONLY host mount: /proc/sys, READ-WRITE (the converger writes
            # the drifting allow-listed sysctls here). No /etc, no /lib/modules.
            - name: proc-sys
              mountPath: /host/proc/sys
              readOnly: false
      volumes:
        - name: proc-sys
          hostPath:
            path: /proc/sys
            type: Directory
