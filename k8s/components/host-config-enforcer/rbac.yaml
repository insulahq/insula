apiVersion: v1
kind: ServiceAccount
metadata:
  name: host-config-enforcer
  namespace: platform-system
  labels:
    app: host-config-enforcer
    app.kubernetes.io/part-of: hosting-platform
---
# RBAC for the host-config-enforcer DaemonSet (converge mode). Identical SHAPE
# to the observe detector's RBAC: READ host-config-desired (policy), WRITE this
# node's host-config-applied-<node> snapshot, GET the parent Node for the owner
# reference. NO secrets, NO exec, NO cluster-wide list/watch. The enforcer's
# elevated privilege is on the HOST (sysctl writes via caps), not the apiserver.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: host-config-enforcer
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: host-config-enforcer
  namespace: platform-system
rules:
  # get: read host-config-desired (policy). create/update: write this node's
  # host-config-applied-<node> snapshot. No `patch`, no `delete`.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: host-config-enforcer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: host-config-enforcer
subjects:
  - kind: ServiceAccount
    name: host-config-enforcer
    namespace: platform-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: host-config-enforcer
  namespace: platform-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: host-config-enforcer
subjects:
  - kind: ServiceAccount
    name: host-config-enforcer
    namespace: platform-system
