# Mail-stack affinity patch (applies to BOTH stalwart-mail and bulwark).
#
# Stalwart and Bulwark share the same local-path PVC (`mail-stack-data`)
# via different subPaths, so they MUST co-locate on the same node.
# Operators may legitimately want to pin the mail stack to a worker
# node — e.g. when a tenant customer's CIFS Storage Box is mounted on
# a specific worker, or when a worker has more local SSD for the
# RocksDB DataStore. If we restricted Bulwark to server-role (as the
# shared affinity-patch.yaml does) but allowed Stalwart on workers,
# a worker migration would leave Bulwark stuck in Pending forever and
# the migration state machine stuck in scaling-up (caught 2026-05-28
# by Phase C of the mobility E2E).
#
# Allowing both `server` and `worker` roles in the affinity means
# the placement API (backend/src/modules/mail-admin/placement.ts) can
# present both roles as candidates, and the node-selector reconciler
# (backend/src/modules/mail-admin/node-selector.ts) can pin via
# `kubernetes.io/hostname` to any eligible node without fighting the
# Flux-managed base affinity.
#
# Public-facing mail ports continue to work on a worker-pinned
# Stalwart through one of two paths:
#   • thisNodeOnly mode — Stalwart binds hostPorts directly on the
#     worker node. DNS / firewall must allow mail traffic to that
#     worker's IP.
#   • allServerNodes mode — haproxy DaemonSet stays on server-role
#     nodes (the public-facing entrypoints) and forwards to the
#     ClusterIP `stalwart-mail.mail.svc.cluster.local` via PROXY-v2.
#     Stalwart receives the connection on the worker node;
#     SystemSettings.proxyTrustedNetworks (server-role node IPs)
#     authorises the PROXY-v2 header and surfaces the real client IP.
#
# The toleration set is identical to the shared affinity-patch — the
# `platform.example.test/server-only:NoSchedule` taint exists only
# on server nodes. Workers don't carry that taint, so the toleration
# is a no-op there but harmless.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: _ignored  # targeted by kustomization.yaml
spec:
  template:
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: platform.example.test/node-role
                    operator: In
                    values: [server, worker]
      tolerations:
        - key: platform.example.test/server-only
          operator: Equal
          value: "true"
          effect: NoSchedule
