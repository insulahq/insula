apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: platform
data:
  environment: "production"
  log-level: "warn"
  default-storage-class: "longhorn"
  ingress-base-domain: "${DOMAIN}"
  cluster-issuer-name: "letsencrypt-prod-http01"
  admin-url: "https://admin.${DOMAIN}"
  tenant-url: "https://tenant.${DOMAIN}"
  cors-origins: "https://admin.${DOMAIN},https://tenant.${DOMAIN}"
  # Passkey (WebAuthn) RP — placeholder-templated. Resolved by Flux
  # postBuild.substituteFrom (or bootstrap envsubst).
  passkey-rp-id: "${DOMAIN}"
  passkey-origins: "https://admin.${DOMAIN},https://tenant.${DOMAIN}"
  # Private Worker — wildcard A record `tunnels.${DOMAIN}` must point
  # at cluster ingress (one-time DNS setup at install).
  tunnel-base-url: "wss://tunnels.${DOMAIN}"
  private-worker-frps-image: "fatedier/frps:v0.69.1"
  private-worker-agent-image: "ghcr.io/insulahq/insula/private-worker-agent:latest"
  # Per-tenant file-manager sidecar image. Without this override the base
  # ConfigMap's bare `file-manager:latest` resolves to docker.io and
  # ImagePullBackOffs — the dev overlay sets this but production didn't, so
  # file-manager was broken on every non-dev cluster (surfaced by the ADR-053
  # prod-mirror staging, 2026-06-22).
  file-manager-image: "ghcr.io/insulahq/insula/file-manager:latest"
  # Admin node-terminal (ADR-041 — super_admin-only privileged root shell
  # on cluster nodes via nsenter into host PID 1). ENABLED in production:
  # it's a break-glass tool operators need, and it's still gated by the
  # 30-min OIDC step-up freshness check + a 256-bit single-use 60s wsToken.
  # HA-safe with no extra config — the wsToken is validated against the
  # Postgres `node_terminal_sessions` table (any platform-api replica can
  # serve any session; the old "needs single-replica/stickiness" caveat was
  # the obsolete in-memory design), and base already sets the platform-api
  # Service `sessionAffinity: ClientIP`. See docs/operations/NODE_TERMINAL.md.
  node-terminal-enabled: "true"
  # Allowlist for publicWssOrigin — host portion of cors-origins.
  # Belt-and-braces against X-Forwarded-Host spoofing. Populated even
  # when the feature is disabled so flipping the flag above doesn't
  # require a second ConfigMap edit.
  platform-public-hosts: "admin.${DOMAIN},tenant.${DOMAIN}"
