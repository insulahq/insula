# Production overlay — Flux pull-based deployment from `stable` branch.
#
# Image tags are pinned to semver. The release.yml workflow creates a PR to
# the `stable` branch with updated tags. Human merges the PR → Flux deploys.
#
# NEVER use :latest here. ADR-053: scripts/cut-release.sh stamps these
# newTags as part of cutting a release (the 3 platform images → the release
# version; the internal DaemonSet/sidecar images → a snapshot of the current
# development-overlay pins, since those are timestamp-sha tagged by their own
# CI, never the release version). The immutable, cosign-signed tag therefore
# fully describes its own image set. The `0.0.0` values are pre-first-release
# placeholders, overwritten on the next cut.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  # Longhorn manifests (StorageClasses + RecurringJobs + CSI snapshot
  # CRDs + Longhorn UI ingress). System workloads (CNPG postgres,
  # mail-pg) require `longhorn-system-local` SC. Without this include
  # the postgres-1 PVC stays Pending forever on a fresh bootstrap.
  - ../../base/longhorn
  # VictoriaMetrics vmsingle monitoring stack (ADR-051) — single
  # ~128Mi pod: scrape + TSDB + VMUI at metrics.${DOMAIN} (admin-gated).
  - ../../base/monitoring
  # DR backup CronJobs (etcd/postgres/cluster-state/secrets/hostpath/audit).
  # Included in production + staging only — dev DinD has no real etcd and
  # backups-against-local-path would be noise.
  - ../../base/backup
  # Cut 3 (2026-05-04): Stalwart 0.16 mail server. Cutover from v015
  # is operator-driven via scripts/cutover-stalwart-v015-to-v016.sh
  # — when production cuts over, leave this entry uncommented.
  - stalwart-mail/
  # Roundcube webmail — always deployed alongside Stalwart on
  # staging+production. Operator-bootstrap step creates the
  # `mail-secrets` Secret + the `roundcube` PG database/role on
  # the platform CNPG cluster (scripts/bootstrap.sh:create_roundcube_db).
  - roundcube/
  # ADR-039 — Bulwark webmail (JMAP-native). Shipped alongside Roundcube so
  # the webmail-router reconciler runs whichever engine
  # `platform_settings.default_webmail_engine` selects and scales the other to
  # 0 (only one webmail pod ever runs). Without this a fresh prod cluster
  # whose default engine is `bulwark` 404'd on webmail.${DOMAIN} (reconciler
  # had no Deployment to scale). Staging inherits this via ../production.
  - bulwark/
  # 2026-05-18: webmail feature-visibility ConfigMap. Mounted by BOTH the
  # roundcube and bulwark Pods. The data keys are reconciler-owned — Flux is
  # told to skip them.
  - ../../base/mail-feature-css
  # Cross-namespace NetworkPolicy so mail-namespace pods (Stalwart,
  # Roundcube, future MTA components) can reach platform Postgres.
  - allow-mail-to-postgres-netpol.yaml
  # Public-facing Ingress for webmail.${DOMAIN}. Substituted via Flux
  # postBuild substituteFrom (platform-cluster-config / DOMAIN key).
  - webmail-ingress.yaml

# M1: pin all system workloads to nodes labelled
# insula.host/node-role=server. Operators MUST have
# relabeled every control-plane node before this overlay reconciles
# or the scheduler evicts every platform pod. See
# docs/architecture/NODE_ROLE_TAXONOMY.md.
components:
  - ../../components/system-node-affinity
  # Admin-only UIs (Stalwart web-admin, Longhorn, future) MUST be
  # gated by an auth-gate component. Production currently uses the
  # cookie-based gate (matches staging); flip to admin-auth-gate-oauth2
  # when production cuts over to oauth2-proxy. Without one of these
  # the ci-admin-auth-check.sh guardrail fails the build.
  - ../../components/admin-auth-gate-cookie

patches:
  - path: platform-config-patch.yaml
  # ingress-patch.yaml was REMOVED in the Traefik migration. platform-ingress
  # is now reconciler-managed (backend/src/modules/system-settings/
  # ingress-reconciler.ts creates the IngressRoute from system_settings on
  # startup). Per-environment TLS settings flow through the reconciler
  # via the platform-cluster-config ConfigMap (Phase 2).

images:
  - name: ghcr.io/insulahq/insula/backend
    newTag: "2026.6.17-rc.6"
  - name: ghcr.io/insulahq/insula/admin-panel
    newTag: "2026.6.17-rc.6"
  - name: ghcr.io/insulahq/insula/tenant-panel
    newTag: "2026.6.17-rc.6"
  # Internal DaemonSet/sidecar images — timestamp-sha tagged by each image's own
  # CI (.github/scripts/pin-image-tag.sh pins them in overlays/development).
  # cut-release.sh snapshots the current development pins here at cut time so the
  # release tag is reproducible (placeholders until the first cut).
  - name: ghcr.io/insulahq/insula/security-probe
    newTag: "20260610095807-ab58b4d"
  - name: ghcr.io/insulahq/insula/firewall-reconciler
    newTag: "20260624145651-862bae3"
  - name: ghcr.io/insulahq/insula/host-config-reconciler
    newTag: "20260610095804-ab58b4d"
  - name: ghcr.io/insulahq/insula/backup-rclone
    newTag: "20260610095620-ab58b4d"
  - name: ghcr.io/insulahq/insula/sftp-gateway
    newTag: "20260610095545-ab58b4d"
  - name: ghcr.io/insulahq/insula/tenant-backup-tools
    newTag: "20260616013149-3c95ecd"
