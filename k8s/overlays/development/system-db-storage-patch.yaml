# Development-overlay patch: keep system-db at 20Gi instead of the 2Gi base.
#
# Background: CNPG's webhook rejects any spec.storage decrease, so this
# overlay must declare the LARGEST live size among the clusters that
# consume it (staging + testing). The staging cluster's system-db was
# emergency-grown 10Gi → 20Gi during the 2026-06-02 WAL-archive-runaway
# incident; Flux dry-run failed on every reconcile until git matched
# (observed 2026-06-05 when the post-incident Kustomization suspension
# was lifted). Growing the smaller clusters 10Gi → 20Gi is an ONLINE
# zero-downtime expansion (CNPG + Longhorn volume resize, thin-
# provisioned) — the documented right-size mechanism in
# k8s/base/database.yaml.
#
# When these clusters are wiped + rebootstrapped fresh, this overlay can
# be deleted — a new install picks up the 2Gi base default and operators
# grow via Settings → System DB Storage / SystemPvcResize as needed.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: system-db
  namespace: platform
spec:
  storage:
    size: 20Gi
