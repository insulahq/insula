apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: platform
data:
  environment: "staging"
  log-level: "info"
  default-storage-class: "longhorn"
  ingress-base-domain: "staging.example.test"
  cluster-issuer-name: "letsencrypt-prod-http01"
  admin-url: "https://admin.staging.example.test"
  client-url: "https://client.staging.example.test"
  cors-origins: "https://admin.staging.example.test,https://client.staging.example.test"
  # Per-client sidecar image — pull from GHCR on real clusters.
  file-manager-image: "ghcr.io/insulahq/hosting-platform/file-manager-sidecar:latest"
  # Longhorn dashboard URL for the Storage Configuration iframe.
  longhorn-url: "https://longhorn.staging.example.test/"
  # platform_session cookie Domain attribute. Shares the cookie across
  # all admin-only subdomains (longhorn, mail-admin, future ones) so
  # admin-panel iframes carry the auth automatically. Without this the
  # cookie is host-only to admin.<apex> and cross-subdomain iframes
  # hit the nginx auth_request gate with no cookie → redirect loop.
  session-cookie-domain: ".staging.example.test"
