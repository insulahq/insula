# Patch ingress hostnames for staging environment.
# Apex: ${DOMAIN} (A record → 89.167.3.56; wildcard
# *.${DOMAIN} CNAMEs to the apex).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-ingress
  namespace: platform
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod-http01
    # Global ssl-redirect is disabled (so cert-manager HTTP-01 solver
    # ingresses can serve /.well-known/acme-challenge on port 80) —
    # keep the redirect behaviour on the platform ingress itself.
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - admin.${DOMAIN}
        - client.${DOMAIN}
        - dex.${DOMAIN}
      secretName: platform-staging-tls
  rules:
    - host: admin.${DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-panel
                port:
                  number: 80
    - host: client.${DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client-panel
                port:
                  number: 80
    - host: dex.${DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dex
                port:
                  number: 5556
