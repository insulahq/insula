# Patch ingress hostnames for staging environment.
# Current staging uses sslip.io magic DNS (maps admin.192.0.2.56.sslip.io
# directly to 192.0.2.56). Swap these when you move to a real DNS apex.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-ingress
  namespace: platform
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging-http01
    # Global ssl-redirect is disabled (so cert-manager HTTP-01 solver
    # ingresses can serve /.well-known/acme-challenge on port 80) —
    # keep the redirect behaviour on the platform ingress itself.
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - admin.192.0.2.56.sslip.io
        - client.192.0.2.56.sslip.io
      secretName: platform-staging-tls
  rules:
    - host: admin.192.0.2.56.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-panel
                port:
                  number: 80
    - host: client.192.0.2.56.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client-panel
                port:
                  number: 80
