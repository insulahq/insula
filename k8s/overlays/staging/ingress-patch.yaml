# Patch ingress hostnames for staging environment.
# Apex: staging.example.test (A record → 192.0.2.56; wildcard
# *.staging.example.test CNAMEs to the apex).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-ingress
  namespace: platform
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging-http01
    # Global ssl-redirect is disabled (so cert-manager HTTP-01 solver
    # ingresses can serve /.well-known/acme-challenge on port 80) —
    # keep the redirect behaviour on the platform ingress itself.
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - admin.staging.example.test
        - client.staging.example.test
        - dex.staging.example.test
      secretName: platform-staging-tls
  rules:
    - host: admin.staging.example.test
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-panel
                port:
                  number: 80
    - host: client.staging.example.test
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client-panel
                port:
                  number: 80
    - host: dex.staging.example.test
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dex
                port:
                  number: 5556
