# Staging overlay (ADR-053) — the RELEASE-VALIDATION cluster.
#
# Tracks release TAGS via Flux `spec.ref.semver: ">=0.0.0-0"` (RC + stable), so
# every manual `scripts/cut-release.sh [--prerelease]` rolls here automatically.
# It MIRRORS production (bases on ../production) so staging exercises the exact
# signed artifact production will later pull — image pins included (cut-release
# stamps them in ../production; this overlay inherits them).
#
# Staging-ONLY deltas live below. Today: an in-cluster Dex (identity provider)
# so OIDC integration is testable on staging. Production legitimately runs NO
# in-cluster Dex (external IAM), and `ci-no-dex-in-production.sh` enforces that
# by rendering ONLY ../production — which never references this overlay, so Dex
# stays out of the production render. Restoring Dex here also un-sticks the base
# oauth2-proxy on staging (its `wait-for-dex-discovery` initContainer was
# blocking forever on a pruned issuer). The dex manifests are copied verbatim
# from k8s/overlays/development/dex (both ${DOMAIN}-templated; copied, not
# shared, so editing the running dev overlay carries no risk, and bootstrap's
# dex-config secret-sync finds ${overlay_dir}/dex/config.yaml).
# node-terminal-enabled is now ON in production, so staging inherits it.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../production
  - dex/

patches:
  # Same affinity patch the dev overlay carries (development/kustomization.yaml):
  # dex is overlay-only, so it can't ride the shared system-node-affinity
  # component (which ../production pulls in but must exclude dex from). Inlined
  # rather than `path:` because Kustomize refuses patch files outside the
  # overlay root.
  - target: { kind: Deployment, name: dex, namespace: platform }
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: dex
        namespace: platform
      spec:
        template:
          spec:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: insula.host/node-role
                          operator: In
                          values: [server]
            tolerations:
              - key: insula.host/server-only
                operator: Equal
                value: "true"
                effect: NoSchedule

  # Integration-test rate-limit headroom (STAGING ONLY — production keeps the
  # defaults; this overlay never feeds the production render). `integration-all.sh`
  # runs 12 suites in PARALLEL, all authenticating as the ONE shared admin token,
  # so the global limiter's per-user bucket (keyGenerator = user.sub, default
  # 100/min) and the per-IP /auth/login limit saturate under a synthetic burst
  # that no real operator produces (root-caused 2026-06-27). Raise both so the
  # harness has headroom. The rate-limit-TESTING suites are unaffected: waf-crowdsec
  # L6 exercises a per-route INGRESS limit, and no suite asserts these globals.
  #   • AUTH_LOGIN_RATE_LIMIT_MAX is env-only (auth/routes.ts, read at boot) →
  #     effective the moment this rolls.
  #   • API_RATE_LIMIT only SEEDS a fresh DB: system_settings.api_rate_limit is
  #     NOT NULL default 100 and WINS at runtime (app.ts resolveRateLimitMax reads
  #     the DB first), so this covers fresh staging rebuilds; an ALREADY-seeded
  #     staging also needs a one-time Settings PATCH (apiRateLimit=1000), which the
  #     next platform-api roll then reads.
  - target: { kind: Deployment, name: platform-api, namespace: platform }
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: platform-api
        namespace: platform
      spec:
        template:
          spec:
            containers:
              - name: api
                env:
                  - name: API_RATE_LIMIT
                    value: "1000"
                  - name: AUTH_LOGIN_RATE_LIMIT_MAX
                    value: "1000"
