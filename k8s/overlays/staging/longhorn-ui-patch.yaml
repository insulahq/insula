# Longhorn dashboard on staging — longhorn.${DOMAIN}
#
# Gated by k8s/components/admin-auth-gate-cookie (see
# staging/kustomization.yaml components: block). Switch to
# admin-auth-gate-oauth2 when oauth2-proxy is wired into the admin
# panel's public ingress.
#
# This patch overrides ONLY the base Certificate's issuerRef so staging
# uses letsencrypt-prod-http01 (Flux postBuild substituteFrom doesn't
# populate CLUSTER_ISSUER_NAME on staging — same gotcha as the webmail
# overlay). The secretName stays `longhorn-ui-tls` to match the base
# IngressRoute + Certificate — the previous `longhorn-ui-staging-tls`
# leaked the literal environment name onto every cluster that uses this
# overlay (incl. testing) and diverged from the base secret the
# IngressRoute reads.
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: longhorn-ui
  namespace: longhorn-system
spec:
  secretName: longhorn-ui-tls
  issuerRef:
    name: letsencrypt-prod-http01
    kind: ClusterIssuer
    group: cert-manager.io
---
# Re-assert the base IngressRoute's tls.secretName (unchanged from base)
# so a strategic-merge patch doesn't drop it. Other fields (entryPoints,
# routes, middlewares) come from k8s/base/longhorn/ui-ingress.yaml.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: longhorn-ui
  namespace: longhorn-system
spec:
  tls:
    secretName: longhorn-ui-tls
